<svg width="600" height="600">
<rect x="0" y="0" width="600" height="600" style="fill:white"/> 
<rect x="440" y="0" width="160" height="50" style="fill:white;fill-opacity:0"/>  
<path id="objet" d="M 370 248 452 264 515 152 423 50 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 332 194 348 112 236 49 134 141 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<circle id="A" cx="324" cy="240" r="3" style="stroke:red; fill:red"/>
<text x="324" y="240" dx="5" dy="10">C</text>
<circle id="F" cx="423" cy="50" r="3" style="stroke:red; fill:red"/>
<text x="423" y="50" dy="-10">M</text>
<circle id="F1" cx="134" cy="141" r="3" style="stroke:blue; fill:blue"/>  
<text x="134" y="141" dx="-15" dy="-5">M'</text>
<path d="M423 50L324 240 134 141" style="stroke-dasharray:3 3;stroke:green;stroke-width:1;fill:none"/>
<path d="M423 50A214 214 0 0 0 134 141" style="stroke-dasharray:3 3;stroke:green;stroke-width:1;fill:none"/>


<text x="20" y="250" font-size="15" fill="black">Rotation
<tspan x="20" dy="1.5em">Angle is A - Center is C</tspan>
<tspan x="20" dy="1.5em">To build M' image of M in rotation :</tspan>
<tspan x="20" dy="1.5em">- we draw circle centered in C and with CM as radius</tspan>
<tspan x="20" dy="1.5em">- on this circle, M' is the point with angle (CM,CM') = A</tspan>
<tspan x="20" dy="1.5em">Rotation is metric : keep lengths, angles and direction</tspan>
<tspan x="20" dy="1.5em">To retrieve M' from M, we use same rotation with opposite angle</tspan>
<tspan x="20" dy="1.5em">When we composite two rotations, we get a rotation :</tspan>
<tspan x="20" dy="1.5em">- angle is sum of angles</tspan>
<tspan x="20" dy="1.5em">- if rotations had same center, this point is also center for composite</tspan>
<tspan x="20" dy="1.5em">- if centers are different, we can build center of composite</tspan>
<tspan x="30" dy="1.5em">or on matrix find invariant point</tspan>

</text>
</svg>
