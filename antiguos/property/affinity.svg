<circle id="K" cx="74" cy="356" r="3" style="stroke:red; fill:red"/>
<text x="74" y="356" dx="-15" dy="5">k</text>
<circle id="a" cx="112" cy="215" r="3" style="stroke:green; fill:green"/>
<text x="112" y="215" dx="-5" dy="-5">f</text>

<text x="124" y="93" dx="-15" dy="5">F</text>
