<text x="350" y="250" font-size="15" fill="black">Affinity on shape
<tspan x="310" dy="2em">Affinity need axis (ab) and direction (hk) - Ratio is k</tspan>
<tspan x="310" dy="2em">To build image of point F :</tspan>
<tspan x="310" dy="1.5em">- we draw parallel to (hk) by F</tspan>
<tspan x="310" dy="1.5em">- this parallel cross axis in f</tspan>
<tspan x="310" dy="1.5em">- we draw vector fF' = k * fF</tspan>
<tspan x="310" dy="1.5em">On this example k is around - 0.5</tspan>
<tspan x="20" dy="1.5em">For most case, affinity keep only parallelism for shape </tspan>
<tspan x="20" dy="1.5em">On this example rectangle become parallelogram</tspan>
<tspan x="20" dy="1.5em">Inverse of this transformation</tspan>
<tspan x="50" dy="1.5em">To retrieve F from F', we use affinity with same axis and direction but with 1 / k as ratio</tspan>
<tspan x="20" dy="1.5em">Composite affinities</tspan>
<tspan x="50" dy="1.5em">We get affinity but it's not easy to retrieve axis, direction and ratio</tspan>

</text>
