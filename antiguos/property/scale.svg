<svg width="600" height="600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect x="0" y="0" width="600" height="600" style="fill:white"/> 
<g transform="translate(0,-75)">
<path id="objet" d="M 432 240 533 269 568 163 400 100 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 201 270 126 285 100 232 225 200 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<circle id="origin" cx="300" cy="300" r="3" style="stroke:black; fill:red"/>
<text x="300" y="300" dx="5" dy="15">C</text>
<circle id="F" cx="400" cy="100" r="3" style="stroke:red; fill:red"/>
<text x="400" y="100" dx="-15">M</text>
<circle id="F1" cx="225" cy="200" r="3" style="stroke:blue; fill:blue"/>  
<text x="225" y="200" dx="5">M'</text>
<path d="M400 100V300H225V200H400" style="stroke-dasharray:3 3;stroke:green;stroke-width:1;fill:none"/>
</g>
<text x="20" y="250" font-size="15" fill="black">Scale 
<tspan x="20" dy="1.5em">Center is C - ratios are k<tspan baseline-shift="sub">x</tspan> and k<tspan baseline-shift="sub">y</tspan></tspan>
<tspan x="20" dy="2em">To draw M' image of M in scaling :</tspan>
<tspan x="20" dy="1.5em">- we multiply x-coordinate of x by k<tspan baseline-shift="sub">x</tspan> ( - 0.75 in our example )</tspan>
<tspan x="20" dy="1.5em">- we multiply y-coordinate of y by k<tspan baseline-shift="sub">y</tspan> ( 0.5 in our example)</tspan>
<tspan x="20" dy="2em">Properties depend of values for ratios</tspan>
<tspan x="20" dy="1.5em">- playing with 1 and -1 we get reflection by vertical axis scale( - 1 , 1 )</tspan>
<tspan x="30" dy="1.5em">reflection by horizontal axis scale( 1 , - 1 ) or symetry with scale ( - 1 , - 1 )</tspan>
<tspan x="20" dy="1.5em">- if k<tspan baseline-shift="sub">x</tspan> = k<tspan baseline-shift="sub">y</tspan> we have uniform scale and transformation preserve angles</tspan>
<tspan x="20" dy="1.5em">- if other cases, as for our example, only parallelism is preserved</tspan>
<tspan x="20" dy="1.5em">To retrieve M' from M, we need only to take inverse values for ratios</tspan>
<tspan x="20" dy="1.5em">When we composite two transformations we can get any affine transformation</tspan>
<tspan x="20" dy="1.5em">if centers are not same point. With same center, we multiply ratios only</tspan>

</text>
</svg>
