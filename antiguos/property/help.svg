<svg width="700" height="600">
<defs>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
</defs>
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<g transform="translate(0,-80)">
<path id="objet" d="M 349 208 451 261 530 158 400 100 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 265 140 163 87 84 190 214 248 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<circle id="A" cx="307" cy="174" r="3" style="stroke:red; fill:red"/>
<circle id="E" cx="530" cy="158" r="3" style="stroke:red; fill:red"/>
<circle id="E1" cx="84" cy="190" r="3" style="stroke:blue; fill:blue"/>
<path d="M530 158L84 190" style="stroke-dasharray:3 3;stroke:green;stroke-width:1;fill:none"/>
<text x="307" y="174" dy="-5">C</text>
<text x="530" y="158" dy="-5">M</text>
<text x="84" y="190" dy="-5" dx="-15">M'</text>
</g>
<text x="20" y="250" font-size="15" fill="black">Symetry 
<tspan x="20" dy="1.5em">Center is C</tspan>
<tspan x="20" dy="1.5em">To draw M' image of M in transformation :</tspan>
<tspan x="20" dy="1.5em">- we draw line (CM)</tspan>
<tspan x="20" dy="1.5em">- we put M' so C is midpoint of (MM')</tspan>
<tspan x="20" dy="1.5em">This symetry is also scale( - 1 , - 1 )</tspan>
<tspan x="20" dy="1.5em">This transformation preserve length, angle and direction</tspan>
<tspan x="20" dy="1.5em">To retrieve M from M', we have only to apply same transformation. Symetry is its own inverse</tspan>
<tspan x="20" dy="1.5em">If we composite two symetries, we get a translation of 2 * vector C<tspan baseline-shift="sub" font-size="9">1</tspan>C<tspan baseline-shift="sub" font-size="9">2</tspan>, C<tspan baseline-shift="sub" font-size="9">1</tspan> and C<tspan baseline-shift="sub" font-size="9">2</tspan> centers of symetries</tspan>
</text>
<line marker-end="url(#red)" x1="300" y1="185" x2="300" y2="100" style="stroke:red;stroke-width:3"/> 
<text x="250" y="200" fill="red" font-size="15">Example for properties</text>
<line marker-end="url(#red)" x1="340" y1="280" x2="300" y2="320" style="stroke:red;stroke-width:3"/> 
<text x="350" y="280" fill="red" font-size="15">How build image</text>
<line marker-end="url(#red)" x1="340" y1="480" x2="300" y2="450" style="stroke:red;stroke-width:3"/> 
<text x="350" y="480" fill="red" font-size="15">Composite tansformations</text>
<line marker-end="url(#red)" x1="390" y1="330" x2="300" y2="350" style="stroke:red;stroke-width:3"/> 
<text x="400" y="330" fill="red" font-size="15">Transformation's properties</text>
</svg>
