<svg width="700" height="600">
<rect x="0" y="0" width="600" height="600" style="fill:white"/> 
<path d="M52 86 L146 21 L473 248 L503 98" style="stroke:green;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<path d="M99 53 L309 134 L488 173" style="stroke:red;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<path d="M204 93 L398 153" style="stroke:blue;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<circle id="D1" cx="99" cy="53" r="3" style="stroke:green; fill:green"/>
<circle id="D2" cx="309" cy="134" r="3" style="stroke:green; fill:green"/>
<circle id="D3" cx="488" cy="173" r="3" style="stroke:green; fill:green"/>
<circle id="D4" cx="204" cy="93" r="3" style="stroke:fuchsia; fill:fuchsia"/>
<circle id="D5" cx="398" cy="153" r="3" style="stroke:fuchsia; fill:fuchsia"/>
<path d="M52 86C146,21 473,248 503,98" style="stroke:blue;fill-opacity:0.3; fill:none"/>
<path d="M52 86 L503 98" style="stroke:green;fill-opacity:0.3; fill:none"/>
<circle id="M" cx="301" cy="123" r="3" style="stroke:blue; fill:blue"/>
<circle id="A1" cx="52" cy="86" r="3" style="stroke:red; fill:red"/>
<circle id="C1" cx="146" cy="21" r="3" style="stroke:red; fill:red"/>
<circle id="C2" cx="473" cy="248" r="3" style="stroke:red; fill:red"/>
<circle id="A2" cx="503" cy="98" r="3" style="stroke:red; fill:red"/>
<text x="301" y="123" dx="10">M</text>
<text x="52" y="86" dx="-10" dy="-5">A</text>
<text x="503" y="98" dx="10" dy="-5">D</text>
<text x="146" y="21" dx="-10" dy="-5">B</text>
<text x="473" y="248" dx="10" dy="-5">C</text>
<text x="99" y="53" dx="-10" dy="-5">P</text>
<text x="309" y="134" dx="-10" dy="10">Q</text>
<text x="488" y="173" dx="10" dy="-5">R</text>
<text x="204" y="93" dx="5" dy="-5">S</text>
<text x="398" y="153" dx="5" dy="-5">T</text>
<text x="20" y="180" font-size="14">Construction :
<tspan x="20" dy="1.5em">Bezier cubic is defined by 4 points A B C and D.</tspan>
<tspan x="20" dy="1.5em">B and C are control points.</tspan>
<tspan x="20" dy="1.5em">For a value of k, we place point P barycenter of A ( 1 - k ) and B ( k )</tspan>
<tspan x="20" dy="1.5em">We place point Q barycenter of B ( 1 - k ) and C ( k )</tspan>
<tspan x="20" dy="1.5em">We place point R barycenter of C ( 1 - k ) and D ( k )</tspan>
<tspan x="20" dy="1.5em">We place point S barycenter of P ( 1 - k ) and Q ( k )</tspan>
<tspan x="20" dy="1.5em">We place point T barycenter of Q ( 1 - k ) and R ( k )</tspan>
<tspan x="20" dy="1.5em">We place point M barycenter of S ( 1 - k ) and T ( k )</tspan>
<tspan x="20" dy="1.5em">When k take values from 0 to 1, M describe the blue curve, a Bezier cubic</tspan>
<tspan x="20" dy="1.5em">It's easy to find parametric equation for this curve</tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">P</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">A</tspan> + k * x<tspan baseline-shift="sub" font-size="10">B</tspan> ; y<tspan baseline-shift="sub" font-size="10">P</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">A</tspan> + k * y<tspan baseline-shift="sub" font-size="10">B</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">Q</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">B</tspan> + k * x<tspan baseline-shift="sub" font-size="10">C</tspan> ; y<tspan baseline-shift="sub" font-size="10">Q</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">B</tspan> + k * y<tspan baseline-shift="sub" font-size="10">C</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">R</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">C</tspan> + k * x<tspan baseline-shift="sub" font-size="10">D</tspan> ; y<tspan baseline-shift="sub" font-size="10">R</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">C</tspan> + k * y<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">S</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">P</tspan> + k * x<tspan baseline-shift="sub" font-size="10">Q</tspan> ; y<tspan baseline-shift="sub" font-size="10">S</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">P</tspan> + k * y<tspan baseline-shift="sub" font-size="10">Q</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">T</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">Q</tspan> + k * x<tspan baseline-shift="sub" font-size="10">R</tspan> ; y<tspan baseline-shift="sub" font-size="10">T</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">Q</tspan> + k * y<tspan baseline-shift="sub" font-size="10">R</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">S</tspan> + k * x<tspan baseline-shift="sub" font-size="10">T</tspan> ; y<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">S</tspan> + k * y<tspan baseline-shift="sub" font-size="10">T</tspan></tspan>
<tspan x="20" dy="1.5em">We replace values and calculate :</tspan>
<tspan x="20" dy="1.5em" fill="blue" >x<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k )<tspan baseline-shift="super" font-size="10">3</tspan> * x<tspan baseline-shift="sub" font-size="10">A</tspan> + 3 * k * ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">B</tspan> + 3 * k<tspan baseline-shift="super" font-size="10">2</tspan> * (1 - k) * x<tspan baseline-shift="sub" font-size="10">C</tspan> + k<tspan baseline-shift="super" font-size="10">3</tspan> * x<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue" >y<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k )<tspan baseline-shift="super" font-size="10">3</tspan> * y<tspan baseline-shift="sub" font-size="10">A</tspan> + 3 * k * ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">B</tspan> + 3 * k<tspan baseline-shift="super" font-size="10">2</tspan> * (1 - k) * y<tspan baseline-shift="sub" font-size="10">C</tspan> + k<tspan baseline-shift="super" font-size="10">3</tspan> * y<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
</text>
</svg>
