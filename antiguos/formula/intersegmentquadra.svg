<svg width="700" height="600" viewBox="0 0 700 600">
<rect width="700" height="600" fill="white"/>
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="292" y="122" dx="-14" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="625" y="67" dx="14" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:14;fill:blue" x="629" y="130" dx="-14" dy="-5" startOffset="0">C</text>
<text id="d" style="text-anchor:middle;font-size:14;fill:blue" x="373" y="128" dx="14" dy="-5" startOffset="0">D</text>
<text id="e" style="text-anchor:middle;font-size:14;fill:blue" x="561" y="18" dx="14" dy="-5" startOffset="0">E</text>
<line id="line1" x1="292" y1="122" x2="625" y2="67" fill="none" stroke="green" stroke-width="2"/>
<path id="quadra" d="M629,130Q561,18 373,128" fill="none" stroke="green" stroke-width="2"/>
<text id="f" style="text-anchor:middle;font-size:14;fill:blue" x="427.552" y="99.6115" dx="14" dy="-5" startOffset="0">F</text>
<text id="g" style="text-anchor:middle;font-size:14;fill:blue" x="561.907" y="77.4208" dx="14" dy="-5" startOffset="0">G</text>
<circle id="p6" cx="427.552" cy="99.6115" r="4" fill="blue"/>
<circle id="p7" cx="561.907" cy="77.4208" r="4" fill="blue"/>
<circle id="p1" cx="292" cy="122" r="4" fill="red"/>
<circle id="p2" cx="625" cy="67" r="4" fill="red"/>
<circle id="p3" cx="629" cy="130" r="4" fill="red"/>
<circle id="p4" cx="373" cy="128" r="4" fill="red"/>
<circle id="p5" cx="561" cy="18" r="4" fill="red"/>
<text x="20" y="20" font-size="14">Bezier quadratic is defined by three points C D and E. E is control point.
<tspan x="20" dy="1.5em">Parametric equation for Bezier is :</tspan>
<tspan x="20" dy="1.5em" fill="blue" >x = ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">C</tspan> + 2 * k * ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">E</tspan> + k<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue" >y = ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">C</tspan> + 2 * k * ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">E</tspan> + k<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
<tspan x="20" dy="1.5em">For segment AB :</tspan>
<tspan x="20" dy="1.5em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) with t from 0 to 1</tspan>
<tspan x="20" dy="1.5em" fill="blue">y = y<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>
<tspan x="20" dy="1.5em">We get two equations of second degree with k and t as variables</tspan>
<tspan x="20" dy="1.5em" fill="blue">( x<tspan baseline-shift="sub" font-size="8">D</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">E</tspan> + x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k<tspan baseline-shift="super" font-size="10">2</tspan> + 2 * ( x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k - ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) * t + x<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> = 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">( y<tspan baseline-shift="sub" font-size="8">D</tspan> - 2 * y<tspan baseline-shift="sub" font-size="8">E</tspan> + y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k<tspan baseline-shift="super" font-size="10">2</tspan> + 2 * ( y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k - ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) * t + y<tspan baseline-shift="sub" font-size="8">C</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> = 0</tspan>
<tspan x="20" dy="1.5em">We get equation of second degree with k as variable by linear computation of equations</tspan>
<tspan x="20" dy="1.5em" fill="blue">(( x<tspan baseline-shift="sub" font-size="8">D</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">E</tspan> + x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">D</tspan> - 2 * y<tspan baseline-shift="sub" font-size="8">E</tspan> + y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) ) * k<tspan baseline-shift="super" font-size="10">2</tspan></tspan> 
<tspan x="20" dy="1.5em" fill="blue">+ 2 * ( ( x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) ) * k</tspan>
<tspan x="20" dy="1.5em" fill="blue">+ ( x<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">C</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) = 0</tspan>
<tspan x="20" dy="1.5em">With a = ( x<tspan baseline-shift="sub" font-size="8">D</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">E</tspan> + x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">D</tspan> - 2 * y<tspan baseline-shift="sub" font-size="8">E</tspan> + y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan> 
<tspan x="40" dy="1.5em">b = 2 * ( ( x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) )</tspan>
<tspan x="40" dy="1.5em">c = ( x<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">C</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>
<tspan x="20" dy="1.5em">We calculate solutions of this equation</tspan>
<tspan x="20" dy="1.5em">If a is not equal to 0, discriminant = b<tspan baseline-shift="super" font-size="10">2</tspan> - 4 * a * c</tspan>
<tspan x="20" dy="1.5em">If discriminant &gt;= 0, we have two solutions</tspan>
<tspan x="20" dy="1.5em">With solutions for k, we calculate value for t</tspan>
<tspan x="20" dy="2.5em">We must verify that solutions for k and t are between 0 and 1</tspan>
<tspan x="20" dy="1.5em" fill="blue">If ( ( k &gt;= 0 ) &amp;&amp; ( k &lt;= 1 ) &amp;&amp;( t &gt;= 0 ) &amp;&amp; ( t &lt;= 1 ) )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">F</tspan> = x<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>
<tspan x="20" dy="1.5em" fill="blue">y<tspan baseline-shift="sub" font-size="8">F</tspan> = y<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>


</text>
</svg>
