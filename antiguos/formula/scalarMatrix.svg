<svg width="700" height="600">
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<text x="20" y="20" font-size="15" fill="black">Product of matrix by scalar
<tspan x="20" dy="2em">Matrix A :</tspan>
<tspan x="50" dy="1em">a<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="20" dy="3em">Scalar is k</tspan>
<tspan x="20" dy="3em">Matrix k * A :</tspan>
<tspan x="50" dy="1em">k * a<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="200">k * a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="350">k * a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">k * a<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="200">k * a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="350">k * a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="20" dy="3em">Properties</tspan>
<tspan x="20" dy="2em">1 * A = A</tspan>
<tspan x="20" dy="2em">( - 1 ) * A = - A</tspan>
<tspan x="20" dy="2em">k * ( A + B ) = k * A + k * B</tspan>

</text>
</svg>
