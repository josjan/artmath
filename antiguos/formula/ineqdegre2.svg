<text x="20" y="20" font-size="14" fill="black">Solve a * x<tspan baseline-shift="super" font-size="8">2</tspan> + b * x + c &gt; 0
<tspan x="20" dy="1.5em">We suppose that a is not equal to 0</tspan>
<tspan x="20" dy="1.5em">We solve equation</tspan>
<tspan x="20" dy="1.5em">All depend of sign of b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c</tspan>
<tspan x="20" dy="1.5em">If b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c &gt; 0, we have two solutions</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">1</tspan> = ( - b - . b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c ) / ( 2 * a )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">2</tspan> = ( - b + . b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c ) / ( 2 * a )</tspan>
<tspan x="20" dy="1.5em">If a is positive</tspan>
<tspan x="20" dy="1.5em">polynom is also positive for</tspan>
<tspan x="20" dy="1.5em">x &lt; x<tspan baseline-shift="sub" font-size="8">1</tspan> or x &gt; x<tspan baseline-shift="sub" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.5em">On example a is negative</tspan>
<tspan x="20" dy="1.5em">polynom is positive for</tspan>
<tspan x="20" dy="1.5em">x between x<tspan baseline-shift="sub" font-size="8">1</tspan> and x<tspan baseline-shift="sub" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.5em">If b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c is equal to 0</tspan>
<tspan x="20" dy="1.5em">we have only a solution</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">12</tspan> = - b / ( 2 * a )</tspan>
<tspan x="20" dy="1.5em">If a is positive</tspan>
<tspan x="20" dy="1.5em">polynom is always positive ( 0 for x = - b / ( 2 * a ) )</tspan>
<tspan x="20" dy="1.5em">If a is negative</tspan>
<tspan x="20" dy="1.5em">polynom is always negative ( 0 for x = - b / ( 2 * a ) )</tspan>
<tspan x="20" dy="1.5em">If b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c &lt; 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">No real value for x is solution</tspan>
<tspan x="20" dy="1.5em">If a is positive</tspan>
<tspan x="20" dy="1.5em">polynom is always positive</tspan>
<tspan x="20" dy="1.5em">If a is negative</tspan>
<tspan x="20" dy="1.5em">polynom is always negative</tspan>


</text>
