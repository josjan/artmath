<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<rect x="325" y="125" width="351" height="451" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="d1" x1="606.111" y1="575" x2="406.111" y2="125" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="551" y="451" dx="-20" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="451" y="226" dx="-20" dy="-5" startOffset="0">B</text>
<text x="420" y="20" font-size="15" startOffset="0">Equation : <tspan id="u1">9</tspan> * x <tspan id="v1"> + 4</tspan> * y <tspan id="w1"> - 56.2</tspan> &gt; 0</text>
<text x="420" y="40" font-size="15" startOffset="0">Solution for x and y is red area</text>
<rect x="325" y="125" width="351" height="451" fill="yellow" fill-opacity="0.1"/>
<path id="solu" d="M675,575 675,125 406.1111111111111,125 606.1111111111111,575 675,575 " fill="red" fill-opacity="0.2"/>
<circle id="p1" cx="551" cy="451" r="4" fill="red"/>
<circle id="p2" cx="451" cy="226" r="4" fill="red"/>
<text x="20" y="20" font-size="14" fill="black">Solve linear inequation
<tspan x="20" dy="1.5em">a * x + b * y + c &gt; 0</tspan>
<tspan x="20" dy="1.5em">We draw line with equation :</tspan>
<tspan x="20" dy="1.5em">a * x + b * y + c = 0</tspan>
<tspan x="20" dy="1.5em">This line divides plane in two half-planes</tspan>
<tspan x="20" dy="1.5em">In a half-plane</tspan>
<tspan x="20" dy="1.5em">a * x + b * y + c &gt; 0</tspan>
<tspan x="20" dy="1.5em">In other half-plane</tspan>
<tspan x="20" dy="1.5em">a * x + b * y + c &lt; 0</tspan>
<tspan x="20" dy="1.5em">To know which half-plane is solution</tspan>
<tspan x="20" dy="1.5em">We test for a point</tspan>
<tspan x="20" dy="1.5em">If line don't pass through origin</tspan>
<tspan x="20" dy="1.5em">calculation is easier for origin</tspan>
<tspan x="20" dy="1.5em">On example, if we replace x  and y  by 0</tspan>
<tspan x="20" dy="1.5em">- 56.2 &gt; 0 is false</tspan>
<tspan x="20" dy="1.5em" fill="blue">Half-plane containing origin is not solution</tspan>
<tspan x="20" dy="1.5em">Other half-plane is solution</tspan>
<tspan x="20" dy="1.5em" fill="blue">any point in this half-plane is solution</tspan>
<tspan x="20" dy="1.5em">We color this half-plane in red</tspan>

</text>
</svg>
