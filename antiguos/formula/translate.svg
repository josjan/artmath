<text x="20" y="300" font-size="15" fill="blue">Translation :
<tspan x="20" dy="2em" fill="black">Vector is U<tspan baseline-shift="sub">x</tspan> , U<tspan baseline-shift="sub">y</tspan></tspan>
<tspan x="20" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> + U<tspan baseline-shift="sub">x</tspan></tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  y<tspan baseline-shift="sub">m</tspan> + U<tspan baseline-shift="sub">y</tspan></tspan>
<tspan x="20" dy="2em" fill="black">Matrix for translation is : </tspan>
<tspan x="100" dy="2em">1</tspan>
<tspan x="220">0</tspan>
<tspan x="330">U<tspan baseline-shift="sub">x</tspan></tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="220">1</tspan>
<tspan x="330">U<tspan baseline-shift="sub">y</tspan></tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="220">0</tspan>
<tspan x="340">1</tspan>
</text>
</svg>
