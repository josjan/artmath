<text id="matrix_f" x="520" y="50" startOffset="0">0</text>
</g>
<path id="objet" d="M 350 250 451 263 597 135 400 100 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 110 250 211 263 357 135 160 100 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<path id="axe" d="M 501 28 261 28" style="stroke:black; fill:none" marker-end="url(#endArrow)"/>
<text x="50" y="40" startOffset="0">transform="translate(<tspan id="angle_val">-240,0</tspan>)"</text>
<circle id="A" cx="501" cy="28" r="3" style="stroke:red; fill:red"/>
<circle id="B" cx="261" cy="28" r="3" style="stroke:red; fill:red"/>
<circle id="C" cx="350" cy="250" r="3" style="stroke:red; fill:red"/>
<circle id="D" cx="451" cy="263" r="3" style="stroke:red; fill:red"/>
<circle id="E" cx="597" cy="135" r="3" style="stroke:red; fill:red"/>
<circle id="F" cx="400" cy="100" r="3" style="stroke:red; fill:red"/>
