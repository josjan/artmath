<svg width="700" height="600">
<defs>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
</defs>
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<line marker-end="url(#green)" x1="50" y1="85" x2="210" y2="175" style="stroke:green;stroke-width:1"/> 
<line marker-end="url(#green)" x1="50" y1="113" x2="210" y2="203" style="stroke:green;stroke-width:1"/> 
<line marker-end="url(#green)" x1="50" y1="141" x2="210" y2="231" style="stroke:green;stroke-width:1"/> 
<line marker-end="url(#red)" x1="50" y1="145" x2="210" y2="55" style="stroke:red;stroke-width:1"/> 
<line marker-end="url(#red)" x1="50" y1="173" x2="210" y2="83" style="stroke:red;stroke-width:1"/> 
<line marker-end="url(#red)" x1="50" y1="201" x2="210" y2="111" style="stroke:red;stroke-width:1"/> 

<text x="20" y="20" font-size="15" fill="black">Determinant of matrix
<tspan x="20" dy="2em">Matrix need to be square matrix with same number of rows and columns</tspan>
<tspan x="20" dy="1em">Matrix A :</tspan>
<tspan x="50" dy="1.5em">a<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">3 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">3 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">3 3</tspan></tspan>
<tspan x="50" dy="2em" fill="blue">a<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="100" fill="blue">a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="150" fill="blue">a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em" fill="blue">a<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="100" fill="blue">a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="150" fill="blue">a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>

<tspan x="20" dy="3em">Determinant is sum of all diagonal products</tspan>
<tspan x="20" dy="3em">If product go from bottom to top, we multiply it by - 1</tspan>
<tspan x="20" dy="1.2em">Determinant D :</tspan>
<tspan x="20" dy="2em">a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">2 2</tspan> * a<tspan baseline-shift="sub" font-size="10">3 3</tspan> + a<tspan baseline-shift="sub" font-size="10">2 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 2</tspan> * a<tspan baseline-shift="sub" font-size="10">1 3</tspan> + a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 2</tspan> * a<tspan baseline-shift="sub" font-size="10">2 3</tspan> - a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 2</tspan> * a<tspan baseline-shift="sub" font-size="10">2 3</tspan> - a<tspan baseline-shift="sub" font-size="10">2 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 2</tspan> * a<tspan baseline-shift="sub" font-size="10">3 3</tspan> - a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">2 2</tspan> * a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>

<tspan x="20" dy="3em">Properties</tspan>
<tspan x="20" dy="2em">det ( k * A ) = k<tspan baseline-shift="super" font-size="10"> n </tspan> * det ( A ) with n number of rows and columns</tspan>

</text>

</svg>
