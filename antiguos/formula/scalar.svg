<svg width="600" height="500" viewBox="0 0 600 500">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="600" height="500" fill="url(#Pat01)"/>
<use x="50" y="250" xlink:href="#system" fill="blue"/>
<line id="v1" marker-end="url(#Marker01)" x1="300" y1="250" x2="400" y2="175" style="stroke:black;stroke-width:4"/> 
<line id="v2" marker-end="url(#green)" x1="300" y1="250" x2="100" y2="400" style="stroke:green;stroke-width:4"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="300" y="250" dx="-20" dy="-10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="175" dx="20" dy="-10" startOffset="0">B</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">10 ; 0</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">14 ; 3</tspan></text>
<text x="220" y="20" font-size="15" startOffset="0">Vector AB</text>
<text x="220" y="40" font-size="15" startOffset="0">Vector Vx : <tspan id="vxt">4</tspan></text>
<text x="220" y="60" font-size="15" startOffset="0">Vector Vy : <tspan id="vyt">3</tspan></text>
<text x="220" y="80" font-size="15" startOffset="0">Vector length : <tspan id="vl">5</tspan></text>
<text x="420" y="20" font-size="15" startOffset="0">Vector <tspan id="kt">-2</tspan>* AB</text>
<text x="420" y="40" font-size="15" startOffset="0">Vector Vx : <tspan id="vxt2">-8</tspan></text>
<text x="420" y="60" font-size="15" startOffset="0">Vector Vy : <tspan id="vyt2">-6</tspan></text>
<text x="420" y="80" font-size="15" startOffset="0">Vector length : <tspan id="vl2">10</tspan></text>
<circle id="p1" cx="300" cy="250" r="4" fill="red"/>
<circle id="p2" cx="400" cy="175" r="4" fill="red"/>

<text x="350" y="300" font-size="18" fill="blue">Vector W = k * V</text>
<text x="350" y="325" font-size="18" fill="blue">W<tspan baseline-shift="sub">x</tspan> = k * V<tspan baseline-shift="sub">x</tspan></text>
<text x="350" y="350" font-size="18" fill="blue">W<tspan baseline-shift="sub">y</tspan> = k * V<tspan baseline-shift="sub">y</tspan></text>
<text x="350" y="375" font-size="18" fill="blue">L<tspan baseline-shift="sub">w</tspan> = | k | * L<tspan baseline-shift="sub">V</tspan></text>

</svg>