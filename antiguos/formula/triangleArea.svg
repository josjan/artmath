<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="url(#Pat01)"/>
<path d="M50 150L425 75 475 225z" fill="yellow" fill-opacity="0.1"/>
<line id="AB" x1="50" y1="150" x2="425" y2="75" style="stroke:black;stroke-width:4"/> 
<line id="AC" x1="50" y1="150" x2="475" y2="225" style="stroke:black;stroke-width:4"/> 
<line id="BC" x1="425" y1="75" x2="475" y2="225" style="stroke:black;stroke-width:4"/> 
<path id="ag" marker-end="url(#green)" d="M123.8702201622248 163.0359212050985A 75 75 0 0 0 123.5775016350556 135.2844996729889" style="stroke:green;stroke-width:2;fill:none"/>
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="50" y="150" dx="-15" dy="-10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="425" y="75" dx="15" dy="-10" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:15;fill:blue" x="475" y="225" dx="15" dy="-10" startOffset="0">C</text>
<text x="20" y="20" font-size="15" startOffset="0">Vector AB</text>
<text x="20" y="40" font-size="15" startOffset="0">Ux : <tspan id="vxt">15</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Uy : <tspan id="vyt">3</tspan></text>
<text x="20" y="80" font-size="15" startOffset="0">Length : <tspan id="vl">15.29</tspan></text>
<text x="150" y="20" font-size="15" startOffset="0">Vector AC :</text>
<text x="150" y="40" font-size="15" startOffset="0">Ux : <tspan id="vxt2">17</tspan></text>
<text x="150" y="60" font-size="15" startOffset="0">Uy : <tspan id="vyt2">-3</tspan></text>
<text x="150" y="80" font-size="15" startOffset="0">Length : <tspan id="vl2">17.26</tspan></text>
<text x="280" y="20" font-size="15" startOffset="0">Vector BC :</text>
<text x="280" y="40" font-size="15" startOffset="0">Ux : <tspan id="vxt3">2</tspan></text>
<text x="280" y="60" font-size="15" startOffset="0">Uy : <tspan id="vyt3">-6</tspan></text>
<text x="280" y="80" font-size="15" startOffset="0">Length : <tspan id="vl3">6.32</tspan></text>
<text x="480" y="20" font-size="15" startOffset="0">Vector W = AB ^ AC :</text>
<text x="480" y="40" font-size="15" startOffset="0">Uz : <tspan id="vxs">-96</tspan></text>
<text x="480" y="60" font-size="15" startOffset="0">Vector length : <tspan id="vls">96</tspan></text>
<text x="480" y="80" font-size="15" fill="blue" startOffset="0">Area ABC : <tspan id="area">48</tspan></text>
<text x="480" y="100" font-size="15" fill="blue" startOffset="0">Angle A : <tspan id="ang">21</tspan> degrees</text>
<text x="480" y="120" font-size="15" fill="blue" startOffset="0">Perimeter ABC : <tspan id="peri">38.87</tspan></text>
<circle id="p1" cx="50" cy="150" r="4" fill="red"/>
<circle id="p2" cx="425" cy="75" r="4" fill="red"/>
<circle id="p3" cx="475" cy="225" r="4" fill="red"/>
<text x="20" y="260" font-size="15" fill="black">Area of triangle :
<tspan x="20" dy="2em">We can use cross product of vectors AB and AC</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ABC = 0.5 * length ( AB ^ AC )</tspan>
<tspan x="20" dy="2em">With coordinates of A B and C we have this formula</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ABC = 0.5 * | ( x<tspan baseline-shift="sub" font-size="9">B</tspan> - x<tspan baseline-shift="sub" font-size="9">A</tspan> ) * ( y<tspan baseline-shift="sub" font-size="9">C</tspan> - y<tspan baseline-shift="sub" font-size="9">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="9">B</tspan> - y<tspan baseline-shift="sub" font-size="9">A</tspan> ) * ( x<tspan baseline-shift="sub" font-size="9">C</tspan> - x<tspan baseline-shift="sub" font-size="9">A</tspan> ) |</tspan>
<tspan x="20" dy="2em">We can use length of AB and AC with angle in A</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ABC = 0.5 * length AB * length AC * | sin ( A ) |</tspan>
<tspan x="20" dy="3em">Perimeter of triangle</tspan>
<tspan x="20" dy="1.5em" fill="blue">perimeter ABC = length AB + length BC + length AC</tspan>

</text>
</svg>
