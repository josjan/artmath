<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="475" y="350" dx="-20" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="600" y="350" dx="-20" dy="-5" startOffset="0">B</text>
<text style="text-anchor:middle;font-size:15;fill:blue" x="517.192" y="350" dx="-20" dy="-5" startOffset="0">m</text>
<text style="text-anchor:middle;font-size:15;fill:blue" x="552.729" y="350" dx="-20" dy="-5" startOffset="0">n</text>
<text x="420" y="20" font-size="15" startOffset="0">Calcul on [ <tspan id="deb" fill="blue">5</tspan> ; <tspan id="fin" fill="blue">10</tspan> ] </text>
<text x="420" y="40" font-size="15" startOffset="0">Length for search : <tspan id="ecart" fill="blue">1.77636e-015</tspan></text>
<text x="420" y="60" font-size="15" startOffset="0">Approximation for x : <tspan id="sol" fill="blue">8.9973</tspan></text>
<text x="420" y="80" font-size="15" startOffset="0">f(x) : <tspan id="f_x" fill="blue">2.66454e-015</tspan></text>
