<circle id="p2" cx="600" cy="350" r="4" fill="red"/>
<text x="20" y="20" font-size="14" fill="black">Solve equation using secante method
<tspan x="20" dy="1.5em">We search solution between A and B</tspan>
<tspan x="20" dy="1.5em">For A, f ( x<tspan baseline-shift="sub" font-size="8">A</tspan> ) &lt; 0</tspan>
<tspan x="20" dy="1.5em">For B, f ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ) &gt; 0</tspan>
<tspan x="20" dy="1.5em">We suppose that function is continue on [x<tspan baseline-shift="sub" font-size="8">A</tspan> ; x<tspan baseline-shift="sub" font-size="8">B</tspan> ]</tspan>
<tspan x="20" dy="1.5em">We join points (x<tspan baseline-shift="sub" font-size="8">A</tspan> ; f ( x<tspan baseline-shift="sub" font-size="8">A</tspan> ) ) and ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ; f ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ) )</tspan>
<tspan x="20" dy="1.5em">We take m intersection with x axis</tspan>
<tspan x="20" dy="1.5em">For m, f ( x<tspan baseline-shift="sub" font-size="8">m</tspan> ) &lt; 0</tspan>
<tspan x="20" dy="1.5em">As f ( x<tspan baseline-shift="sub" font-size="8">m</tspan> ) * f ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ) &lt; 0</tspan>
<tspan x="20" dy="1.5em">we join points (x<tspan baseline-shift="sub" font-size="8">m</tspan> ; f ( x<tspan baseline-shift="sub" font-size="8">m</tspan> ) ) and ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ; f ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ) )</tspan>
<tspan x="20" dy="1.5em">We take n intersection with x axis</tspan>
<tspan x="20" dy="1.5em">For n, f ( x<tspan baseline-shift="sub" font-size="8">n</tspan> ) &lt; 0</tspan>
<tspan x="20" dy="1.5em">As f ( x<tspan baseline-shift="sub" font-size="8">n</tspan> ) * f ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ) &lt; 0</tspan>
<tspan x="20" dy="1.5em">we join points (x<tspan baseline-shift="sub" font-size="8">n</tspan> ; f ( x<tspan baseline-shift="sub" font-size="8">n</tspan> ) ) and ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ; f ( x<tspan baseline-shift="sub" font-size="8">B</tspan> ) ) ...</tspan>
<tspan x="20" dy="3.5em">We stop when length of segment is smaller</tspan>
<tspan x="20" dy="1.5em">than value choosed</tspan>
<tspan x="20" dy="1.5em">On example, we choose 0.001</tspan>
<tspan x="20" dy="1.5em">We get approached value for solution</tspan>
<tspan x="20" dy="1.5em">We can see that we are near exact value</tspan>
<tspan x="20" dy="1.5em">after only about 30 operations</tspan>

<tspan x="20" dy="3.5em">We can also choosed to stop when absolute</tspan>
<tspan x="20" dy="1.5em">value of f ( x<tspan baseline-shift="sub" font-size="8">point</tspan> ) is smaller than value choosed</tspan>
</text>


</svg>
