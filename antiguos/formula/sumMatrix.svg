<svg width="700" height="600">
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<text x="20" y="20" font-size="15" fill="black">Sum of matrix
<tspan x="20" dy="2em">Matrix need to have same size, same number of rows and same number of columns</tspan>
<tspan x="20" dy="1em">Matrix A :</tspan>
<tspan x="50" dy="1em">a<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="20" dy="3em">Matrix B :</tspan>
<tspan x="50" dy="1em">b<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="100">b<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="150">b<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">b<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="100">b<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="150">b<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="20" dy="3em">Matrix A + B :</tspan>
<tspan x="50" dy="1em">a<tspan baseline-shift="sub" font-size="10">1 1</tspan> + b<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="200">a<tspan baseline-shift="sub" font-size="10">1 2</tspan> + b<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="350">a<tspan baseline-shift="sub" font-size="10">1 3</tspan> + b<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 1</tspan> + b<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="200">a<tspan baseline-shift="sub" font-size="10">2 2</tspan> + b<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="350">a<tspan baseline-shift="sub" font-size="10">2 3</tspan> + b<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="20" dy="3em">Properties</tspan>
<tspan x="20" dy="2em">A + B = B + A</tspan>
<tspan x="20" dy="2em">k * ( A + B ) = k * A + k * B</tspan>
<tspan x="20" dy="2em">A - B = A + ( - 1 ) * B</tspan>

</text>
</svg>
