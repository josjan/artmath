<text id="m" style="text-anchor:middle;font-size:15;fill:blue" x="579.981" y="350" dx="-20" dy="-5" startOffset="0">M</text>
<text id="n" style="text-anchor:middle;font-size:15;fill:blue" x="424.238" y="350" dx="-20" dy="-5" startOffset="0">N</text>
<text id="p" style="text-anchor:middle;font-size:15;fill:blue" x="478.123" y="350" dx="-20" dy="-5" startOffset="0">P</text>
<rect x="325" y="125" width="351" height="451" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="460" cy="374" r="4" fill="red"/>
<circle id="p2" cx="513" cy="286" r="4" fill="red"/>
