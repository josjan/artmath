<circle id="p4" cx="599" cy="474" r="4" fill="red"/>
<text x="20" y="20" font-size="14" fill="black">Solve a * x<tspan baseline-shift="super" font-size="8">3</tspan> + b * x<tspan baseline-shift="super" font-size="8">2</tspan> + c * x + d = 0
<tspan x="20" dy="1.5em">We suppose that a is not equal to 0, we divise all terms by a</tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="super" font-size="8">3</tspan> + b' * x<tspan baseline-shift="super" font-size="8">2</tspan> + c' * x + d' = 0</tspan>
<tspan x="20" dy="1.5em">We replace x by x - b' / 3 to eliminate term of second degree</tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="super" font-size="8">3</tspan> + p * x + q = 0</tspan>
<tspan x="20" dy="1.5em">We know particular equation of this type :</tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="super" font-size="8">3</tspan> - 3 * b * c * x + b<tspan baseline-shift="super" font-size="8">3</tspan> + c<tspan baseline-shift="super" font-size="8">3</tspan> is divisible by x + b + c</tspan>
<tspan x="20" dy="1.5em" fill="blue">We solve - 3 * b * c = p and b<tspan baseline-shift="super" font-size="8">3</tspan> + c<tspan baseline-shift="super" font-size="8">3</tspan> = q</tspan>
<tspan x="20" dy="1.5em" fill="blue">We get b<tspan baseline-shift="super" font-size="8">6</tspan> - b<tspan baseline-shift="super" font-size="8">3</tspan> * q - p<tspan baseline-shift="super" font-size="8">3</tspan> / 27 = 0</tspan>
<tspan x="20" dy="1.5em">All depend of sign of D = q<tspan baseline-shift="super" font-size="8">2</tspan> / 4 + p<tspan baseline-shift="super" font-size="8">3</tspan> / 27</tspan>
<tspan x="20" dy="1.5em">If D is positive we have two solutions for b<tspan baseline-shift="super" font-size="8">3</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">b<tspan baseline-shift="super" font-size="8">3</tspan> = - q / 2 - . D and b<tspan baseline-shift="super" font-size="8">3</tspan> = - q / 2 + . D</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">1</tspan> = ( - q / 2 - . D )<tspan baseline-shift="super" font-size="8">1/3</tspan> + ( - q / 2 + . D )<tspan baseline-shift="super" font-size="8">1/3</tspan></tspan>
<tspan x="20" dy="1.5em">is single solution for equation</tspan>
<tspan x="20" dy="1.5em">If D is equal to 0, curve is tangent to x axis</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">12</tspan> = ( b / 2 )<tspan baseline-shift="super" font-size="8">1/3</tspan> and x<tspan baseline-shift="sub" font-size="8">3</tspan> = - 2 * ( b / 2 )<tspan baseline-shift="super" font-size="8">1/3</tspan></tspan>
<tspan x="20" dy="1.5em">If D is negative, we have three solutions</tspan>
<tspan x="20" dy="1.5em">We use complex numbers</tspan>
<tspan x="20" dy="1.5em" fill="blue">b<tspan baseline-shift="super" font-size="8">3</tspan> = - q / 2 + i * . - D = r * exp( i * A )</tspan>
<tspan x="20" dy="1.5em">With cubic root, we get three real solutions for x</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">1</tspan> = 2 * ( r )<tspan baseline-shift="super" font-size="8">1/3</tspan> * cos ( A / 3 )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">2</tspan> = - r<tspan baseline-shift="super" font-size="8">1/3</tspan> * ( cos ( A / 3 ) + . 3 * sin ( A / 3 ) )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">1</tspan> = - r<tspan baseline-shift="super" font-size="8">1/3</tspan> * ( cos ( A / 3 ) - . 3 * sin ( A / 3 ) )</tspan>
<tspan x="20" dy="1.5em">To write solutions for original equation</tspan>
<tspan x="20" dy="1.5em">we add - b' / 3 or - b / ( 3 * a )</tspan>
</text>
