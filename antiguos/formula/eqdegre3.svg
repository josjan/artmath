,276.60245915581606 559.999999999999,281.4474948116889 562.4999999999989,287.05509585020615 564.9999999999989,293.45419726827833 567.4999999999989,300.67373406281314 569.9999999999989,308.74264123071776 572.4999999999989,317.6898537689016 574.9999999999989,327.5443066742721 577.4999999999989,338.3349349437342 579.9999999999989,350.09067357420315 582.4999999999989,362.84045756258115 584.9999999999989,376.6132219057784 587.4999999999989,391.4379016007029 589.9999999999989,407.34343164426326 592.4999999999989,424.35874703336685 594.9999999999989,442.5127827649209 597.4999999999989,461.83447383583563 599.9999999999989,482.3527552430189 602.4999999999989,504.0965619833759 604.9999999999987,527.094829053819 607.4999999999987,551.3764914512546 609.9999999999987,576.9704841725886 612.4999999999987,603.9057422147341 614.9999999999987,632.2112005745919 617.4999999999987,661.915794249079 619.9999999999987,693.048458235096 622.4999999999987,725.6381275295556 624.9999999999986,759.7137371293616 627.4999999999986,795.3042220314262 629.9999999999986,832.438517232659 632.4999999999986,871.1455577299621 634.9999999999986,911.4542785202492 637.4999999999986,953.393614600424 639.9999999999986,996.9925009673961 642.4999999999986,1042.2798726180763 644.9999999999986,1089.2846645493666 647.4999999999986,1138.0358117581854 649.9999999999986,1188.5622492414318 652.4999999999986,1240.8929119960166 654.9999999999986,1295.0567350188466 657.4999999999986,1351.0826533068316 659.9999999999986,1408.9996018568815 662.4999999999986,1468.8365156659006 664.9999999999986,1530.6223297307997 667.4999999999986,1594.385979048487 669.9999999999986,1660.156398615867 672.4999999999985,1727.962523429854 674.9999999999985,1797.8332884873498 " style="stroke:blue;stroke-width:2;fill:none"/> 
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="460" y="374" dx="-20" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="513" y="286" dx="-20" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:15;fill:blue" x="401" y="251" dx="-20" dy="-5" startOffset="0">C</text>
<text id="d" style="text-anchor:middle;font-size:15;fill:blue" x="599" y="474" dx="-20" dy="-5" startOffset="0">D</text>
<text x="420" y="20" font-size="15" startOffset="0">Equation :</text>
<text x="420" y="40" font-size="15" startOffset="0"><tspan id="u1">-0.19</tspan> * x<tspan baseline-shift="super" font-size="9">3</tspan> <tspan id="v1"> + 3.34</tspan> * x<tspan baseline-shift="super" font-size="9">2</tspan> <tspan id="w1">-17.3</tspan> * x <tspan id="z1"> + 27.01</tspan> = 0</text>
<text x="420" y="60" font-size="15" startOffset="0">Solution for x : <tspan id="sol1" fill="blue">9.199</tspan></text>
<text x="420" y="80" font-size="15" startOffset="0">Solution for x : <tspan id="sol2" fill="blue">2.97</tspan></text>
<text x="420" y="100" font-size="15" startOffset="0">Solution for x : <tspan id="sol3" fill="blue">5.125</tspan></text>
<circle id="p5" cx="579.981" cy="350" r="4" fill="blue"/>
<circle id="p6" cx="424.238" cy="350" r="4" fill="blue"/>
