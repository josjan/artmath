<svg width="600" height="600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect x="0" y="0" width="600" height="600" style="fill:white"/> 
<use x="300" y="200" xlink:href="#system" fill="blue"/>
<text x="20" y="20" startOffset="0">Matrix : </text>
<g text-anchor="middle" transform="translate(-280,0)">
<text id="matrix_a" x="380" y="20" startOffset="0">-1</text>
<text id="matrix_c" x="450" y="20" startOffset="0">0</text>
<text id="matrix_e" x="520" y="20" startOffset="0">0</text>
<text id="matrix_b" x="380" y="50" startOffset="0">0</text>
<text id="matrix_d" x="450" y="50" startOffset="0">1</text>
<text id="matrix_f" x="520" y="50" startOffset="0">0</text>
</g>
<path id="objet" d="M 327 223 443 214 530 103 400 100 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 273 223 157 214 70 103 200 100 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<text x="350" y="40" startOffset="0">transform="scale(<tspan id="angle_val">-1,1</tspan>)"</text>
<circle id="C" cx="327" cy="223" r="3" style="stroke:red; fill:red"/>
<circle id="D" cx="443" cy="214" r="3" style="stroke:red; fill:red"/>
<circle id="E" cx="530" cy="103" r="3" style="stroke:red; fill:red"/>
<circle id="F" cx="400" cy="100" r="3" style="stroke:red; fill:red"/>
<circle id="C1" cx="273" cy="223" r="3" style="stroke:blue; fill:blue"/>
<circle id="D1" cx="157" cy="214" r="3" style="stroke:blue; fill:blue"/>
<circle id="E1" cx="70" cy="103" r="3" style="stroke:blue; fill:blue"/>
<circle id="F1" cx="200" cy="100" r="3" style="stroke:blue; fill:blue"/>  
<text x="20" y="250" font-size="15" fill="blue">Scale shape
<tspan x="20" dy="2em" fill="black">Center is in x<tspan baseline-shift="sub">c</tspan> , y<tspan baseline-shift="sub">c</tspan> - Ratios are k<tspan baseline-shift="sub">x</tspan> and k<tspan baseline-shift="sub">y</tspan></tspan>
<tspan x="20" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * k<tspan baseline-shift="sub">x</tspan> + x<tspan baseline-shift="sub">c</tspan> * ( 1 - k<tspan baseline-shift="sub">x</tspan> )</tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  y<tspan baseline-shift="sub">m</tspan> * k<tspan baseline-shift="sub">y</tspan> + y<tspan baseline-shift="sub">c</tspan> * ( 1 - k<tspan baseline-shift="sub">y</tspan> )</tspan>
<tspan x="20" dy="2em" fill="black">Matrix for scale is : </tspan>
<tspan x="100" dy="2em">k<tspan baseline-shift="sub">x</tspan></tspan>
<tspan x="200">0 </tspan>
<tspan x="300">x<tspan baseline-shift="sub">c</tspan> * ( 1 - k<tspan baseline-shift="sub">x</tspan> )</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="200">k<tspan baseline-shift="sub">y</tspan> </tspan>
<tspan x="300">y<tspan baseline-shift="sub">c</tspan> * ( 1 - k<tspan baseline-shift="sub">y</tspan> )</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="200">0</tspan>
<tspan x="340">1</tspan>
<tspan x="20" dy="3em" fill="black">Example above is a reflection by y-axis</tspan>

</text>
</svg>
