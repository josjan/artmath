<text x="20" y="250" font-size="15" fill="blue">SkewX :
<tspan x="20" dy="2em" fill="black">Angle is A</tspan>
<tspan x="20" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> + y<tspan baseline-shift="sub">m</tspan> * tan ( A )</tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  y<tspan baseline-shift="sub">m</tspan></tspan>
<tspan x="20" dy="2em" fill="black">Matrix for skewX is : </tspan>
<tspan x="100" dy="2em">1 </tspan>
<tspan x="200">tan ( A ) </tspan>
<tspan x="330">0</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="220">1</tspan>
<tspan x="330">0</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="220">0</tspan>
<tspan x="330">1</tspan>
</text>
