<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="25" y1="203.571" x2="675" y2="296.429" style="stroke:green;stroke-width:2"/> 
<line id="v2" x1="250" y1="325" x2="275" y2="150" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="250" y="325" dx="-20" dy="20" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="275" y="150" dx="20" dy="-10" startOffset="0">B</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">-4 ; 1</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">-3 ; 8</tspan></text>
<text x="320" y="20" font-size="15" startOffset="0">Vector AB Vx : <tspan id="vxt">1</tspan></text>
<text x="320" y="40" font-size="15" startOffset="0">Vector AB Vy : <tspan id="vyt">7</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Mediatrix for AB equation : <tspan id="ut">1* x + 7 * y -28 = 0</tspan></text>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="250" cy="325" r="4" fill="red"/>
<circle id="p2" cx="275" cy="150" r="4" fill="red"/>
<circle cx="262.5" cy="237.5" r="4" fill="green"/>
<text style="text-anchor:middle;font-size:20;fill:blue" x="263" y="238" dx="20" dy="-5" startOffset="0">O</text>
<text x="50" y="400" font-size="15" fill="black">Equation of mediatrix
<tspan x="50" dy="1.5em">We know coordinates of A : x<tspan baseline-shift="sub" font-size="9">A</tspan> , y<tspan baseline-shift="sub" font-size="9">A</tspan> and B : x<tspan baseline-shift="sub" font-size="9">B</tspan> , y<tspan baseline-shift="sub" font-size="9">B</tspan></tspan>
<tspan x="50" dy="1.5em">If M ( x , y ) is on mediatrix, length AM and BM are same but we can also use other method</tspan>
<tspan x="50" dy="1.5em">We use midpoint of AB, O and dot product for OM and AB is null:</tspan>
<tspan x="50" dy="1.5em" fill="blue">( x - ( x<tspan baseline-shift="sub" font-size="9">A</tspan> + x<tspan baseline-shift="sub" font-size="9">B</tspan> ) / 2 ) * ( x<tspan baseline-shift="sub" font-size="9">A</tspan> - x<tspan baseline-shift="sub" font-size="9">B</tspan> ) + ( y - ( y<tspan baseline-shift="sub" font-size="9">A</tspan> + y<tspan baseline-shift="sub" font-size="9">B</tspan> ) / 2 ) * ( y<tspan baseline-shift="sub" font-size="9">A</tspan> - y<tspan baseline-shift="sub" font-size="9">B</tspan> ) = 0</tspan>
<tspan x="50" dy="1.5em" fill="blue">( x<tspan baseline-shift="sub" font-size="9">A</tspan> - x<tspan baseline-shift="sub" font-size="9">B</tspan> ) * x + ( y<tspan baseline-shift="sub" font-size="9">A</tspan> - y<tspan baseline-shift="sub" font-size="9">B</tspan> ) * y - ( x<tspan baseline-shift="sub" font-size="9">A</tspan><tspan baseline-shift="super" font-size="9">2</tspan> - x<tspan baseline-shift="sub" font-size="9">B</tspan><tspan baseline-shift="super" font-size="9">2</tspan> + y<tspan baseline-shift="sub" font-size="9">A</tspan><tspan baseline-shift="super" font-size="9">2</tspan> - y<tspan baseline-shift="sub" font-size="9">B</tspan><tspan baseline-shift="super" font-size="9">2</tspan> ) / 2 = 0</tspan>
</text>
</svg>
