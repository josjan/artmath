<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="url(#Pat01)"/>
<path d="M36 170 L352 51 443 130 127 249z" fill="yellow" fill-opacity="0.2"/>
<line id="AB" x1="36" y1="170" x2="352" y2="51" style="stroke:black;stroke-width:4"/> 
<line id="AC" x1="36" y1="170" x2="127" y2="249" style="stroke:black;stroke-width:4"/> 
<line id="BD" x1="352" y1="51" x2="443" y2="130" style="stroke:black;stroke-width:4"/> 
<line id="CD" x1="127" y1="249" x2="443" y2="130" style="stroke:black;stroke-width:4"/> 
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="36" y="170" dx="-15" dy="-10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="352" y="51" dx="15" dy="-10" startOffset="0">B</text>
<text id="d" style="text-anchor:middle;font-size:15;fill:blue" x="443" y="130" dx="15" dy="-10" startOffset="0">C</text>
<text id="c" style="text-anchor:middle;font-size:15;fill:blue" x="127" y="249" dx="15" dy="15" startOffset="0">D</text>
<text x="20" y="20" font-size="15" startOffset="0">Vector AB</text>
<text x="20" y="40" font-size="15" startOffset="0">Ux : <tspan id="vxt">12.64</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Uy : <tspan id="vyt">4.76</tspan></text>
<text x="20" y="80" font-size="15" startOffset="0">Length : <tspan id="vl">13.5</tspan></text>
<text x="150" y="20" font-size="15" startOffset="0">Vector AD :</text>
<text x="150" y="40" font-size="15" startOffset="0">Ux : <tspan id="vxt2">3.64</tspan></text>
<text x="150" y="60" font-size="15" startOffset="0">Uy : <tspan id="vyt2">-3.16</tspan></text>
<text x="150" y="80" font-size="15" startOffset="0">Length : <tspan id="vl2">4.82</tspan></text>
<text x="480" y="20" font-size="15" startOffset="0">Vector W = AB ^ AD :</text>
<text x="480" y="40" font-size="15" startOffset="0">Uz : <tspan id="vxs">-57.2688</tspan></text>
<text x="480" y="60" font-size="15" startOffset="0">Vector length : <tspan id="vls">57.2688</tspan></text>
<text x="480" y="80" font-size="15" fill="blue" startOffset="0">Area ABCD : <tspan id="area">57.2688</tspan></text>
<text x="480" y="100" font-size="15" fill="blue" startOffset="0">Angle A : <tspan id="ang">61</tspan> degrees</text>
<text x="480" y="120" font-size="15" fill="blue" startOffset="0">Perimeter ABCD : <tspan id="peri">36.64</tspan></text>
<circle id="p4" cx="443" cy="130" r="4" fill="red"/>
<circle id="p1" cx="36" cy="170" r="4" fill="red"/>
<circle id="p2" cx="352" cy="51" r="4" fill="red"/>
<circle id="p3" cx="127" cy="249" r="4" fill="red"/>
<text x="20" y="320" font-size="15" fill="black">Area of parallelogram :
<tspan x="20" dy="2em">We can use cross product of vectors AB and AD</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ABCD = length ( AB ^ AD )</tspan>
<tspan x="20" dy="2em">With coordinates of A B D we have this formula</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ABCD = | ( x<tspan baseline-shift="sub" font-size="9">B</tspan> - x<tspan baseline-shift="sub" font-size="9">A</tspan> ) * ( y<tspan baseline-shift="sub" font-size="9">D</tspan> - y<tspan baseline-shift="sub" font-size="9">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="9">B</tspan> - y<tspan baseline-shift="sub" font-size="9">A</tspan> ) * ( x<tspan baseline-shift="sub" font-size="9">D</tspan> - x<tspan baseline-shift="sub" font-size="9">A</tspan> ) |</tspan>
<tspan x="20" dy="2em">We can use length of AB and AC with angle in A</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ABCD = length AB * length AD * | sin ( A ) |</tspan>
<tspan x="20" dy="3em">Perimeter of parallelogram</tspan>
<tspan x="20" dy="1.5em" fill="blue">perimeter ABC = 2 * ( length AB + length AD ) </tspan>

</text>
</svg>
