<text x="20" y="20" font-size="14" fill="black">Solve a * x<tspan baseline-shift="super" font-size="8">4</tspan> + b * x<tspan baseline-shift="super" font-size="8">3</tspan> + c * x<tspan baseline-shift="super" font-size="8">2</tspan> + d * x + e = 0
<tspan x="20" dy="1.5em">We suppose that a is not equal to 0, we divise all terms by a</tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="super" font-size="8">4</tspan> + b' * x<tspan baseline-shift="super" font-size="8">3</tspan> + c' * x<tspan baseline-shift="super" font-size="8">2</tspan> + d' * x + e = 0</tspan>
<tspan x="20" dy="1.5em">We use y solution of equation of degree 3</tspan>
<tspan x="20" dy="1.5em" fill="blue">y<tspan baseline-shift="super" font-size="8">3</tspan> - b' * y<tspan baseline-shift="super" font-size="8">2</tspan> + (a' * c' - 4 * d') * y + 4 * b' * d' - a'<tspan baseline-shift="super" font-size="8">2</tspan> * d' - c'<tspan baseline-shift="super" font-size="8">2</tspan> = 0</tspan>
<tspan x="20" dy="1.5em">We define R by R<tspan baseline-shift="super" font-size="8">2</tspan> = a'<tspan baseline-shift="super" font-size="8">2</tspan> / 4 - b' + y</tspan>
<tspan x="20" dy="1.5em">If R<tspan baseline-shift="super" font-size="8">2</tspan> is &gt; 0</tspan>
<tspan x="20" dy="1.5em">We define D by D<tspan baseline-shift="super" font-size="8">2</tspan> = 3 * a'<tspan baseline-shift="super" font-size="8">2</tspan> / 4 - R<tspan baseline-shift="super" font-size="8">2</tspan> - 2 * b'</tspan>
<tspan x="20" dy="1.5em">+ (4 * a' * b' - 8 * c' - a'<tspan baseline-shift="super" font-size="8">3</tspan>) / (4 * R)</tspan>
<tspan x="20" dy="1.5em">We define E by E<tspan baseline-shift="super" font-size="8">2</tspan> = 3 * a'<tspan baseline-shift="super" font-size="8">2</tspan> / 4 - R<tspan baseline-shift="super" font-size="8">2</tspan> - 2 * b'</tspan>
<tspan x="20" dy="1.5em">- (4 * a' * b' - 8 * c' - a'<tspan baseline-shift="super" font-size="8">3</tspan>) / (4 * R)</tspan>
<tspan x="20" dy="1.5em">If R<tspan baseline-shift="super" font-size="8">2</tspan> is equal to 0</tspan>
<tspan x="20" dy="1.5em">We define D by D<tspan baseline-shift="super" font-size="8">2</tspan> = 3 * a'<tspan baseline-shift="super" font-size="8">2</tspan> / 4 - 2 * b'</tspan>
<tspan x="20" dy="1.5em">+ 2 * . y<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * d'</tspan>
<tspan x="20" dy="1.5em">We define E by E<tspan baseline-shift="super" font-size="8">2</tspan> = 3 * a'<tspan baseline-shift="super" font-size="8">2</tspan> / 4 - 2 * b'</tspan>
<tspan x="20" dy="1.5em">- 2 * . y<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * d'</tspan>
<tspan x="20" dy="1.5em">If R<tspan baseline-shift="super" font-size="8">2</tspan> is &lt; 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">There is no real solution for x</tspan>
<tspan x="20" dy="1.5em">Number of solutions depend of sign of D<tspan baseline-shift="super" font-size="8">2</tspan> and E<tspan baseline-shift="super" font-size="8">2</tspan></tspan>

<tspan x="20" dy="1.5em" fill="blue">First group of solutions is - a' / 4 + R / 2 - D / 2</tspan>
<tspan x="20" dy="1.5em" fill="blue">and - a' / 4 + R / 2 + D / 2</tspan>
<tspan x="20" dy="1.5em" fill="blue">Second group is - a' / 4 + R / 2 - E / 2</tspan>
<tspan x="20" dy="1.5em" fill="blue">and - a' / 4 + R / 2 + E / 2</tspan>
</text>
