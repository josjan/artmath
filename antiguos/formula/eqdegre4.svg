<text x="340" y="20" font-size="11" startOffset="0">Equation : <tspan id="u1">0.03</tspan> * x<tspan baseline-shift="super" font-size="9">4</tspan> <tspan id="v1">-0.755</tspan> * x<tspan baseline-shift="super" font-size="9">3</tspan> <tspan id="w1"> + 6.191</tspan> * x<tspan baseline-shift="super" font-size="9">2</tspan> <tspan id="z1">-18.995</tspan> * x <tspan id="t1"> + 17.169</tspan> = 0</text>
<text x="420" y="40" font-size="15" startOffset="0">Solution for x : <tspan id="sol1" fill="blue">7.528</tspan></text>
