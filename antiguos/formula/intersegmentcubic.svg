<svg width="700" height="600" viewBox="0 0 700 600">
<rect width="700" height="600" fill="white"/>
<text style="text-anchor:middle;font-size:14;fill:blue" x="355" y="84" dx="-14" dy="-5" startOffset="0">A</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="666" y="55" dx="14" dy="-5" startOffset="0">B</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="637" y="75" dx="-14" dy="-5" startOffset="0">C</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="361" y="47" dx="14" dy="-5" startOffset="0">D</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="564" y="16" dx="14" dy="-5" startOffset="0">E</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="476" y="144" dx="14" dy="-5" startOffset="0">F</text>
<line x1="355" y1="84" x2="666" y2="55" fill="none" stroke="green" stroke-width="2"/>
<path d="M637,75C564,16 436,144 361,47" fill="none" stroke="green" stroke-width="2"/>
<text style="text-anchor:middle;font-size:14;fill:blue" x="404.45403016947006" y="79.38853094882755" dx="14" dy="-5" startOffset="0">M</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="606.0835460218344" y="60.58706484040772" dx="14" dy="-5" startOffset="0">N</text>
<text style="text-anchor:middle;font-size:14;fill:blue" x="529.2790947834628" y="67.74889469864816" dx="14" dy="-5" startOffset="0">P</text>
<circle cx="404.45403016947006" cy="79.38853094882755" r="4" fill="blue"/>
<circle cx="606.0835460218344" cy="60.58706484040772" r="4" fill="blue"/>
<circle cx="529.2790947834628" cy="67.74889469864816" r="4" fill="blue"/>
<circle cx="355" cy="84" r="4" fill="red"/>
<circle cx="666" cy="55" r="4" fill="red"/>
<circle cx="637" cy="75" r="4" fill="red"/>
<circle cx="361" cy="47" r="4" fill="red"/>
<circle cx="564" cy="16" r="4" fill="red"/>
<circle cx="476" cy="144" r="4" fill="red"/>

<text x="20" y="20" font-size="14">Bezier cubic is defined by 4 points C D E and F. E F are control points.
<tspan x="20" dy="1.5em">For segment AB :</tspan>
<tspan x="20" dy="1.5em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) with t from 0 to 1</tspan>
<tspan x="20" dy="1.5em" fill="blue">y = y<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>
<tspan x="20" dy="1.5em">Parametric equation for Bezier is :</tspan>
<tspan x="20" dy="1.5em" fill="blue" >x = ( 1 - k )<tspan baseline-shift="super" font-size="10">3</tspan> * x<tspan baseline-shift="sub" font-size="10">C</tspan> + 3 * k * ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">E</tspan> + 3 * (1 - k) * k<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">F</tspan> + k<tspan baseline-shift="super" font-size="10">3</tspan> * x<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue" >y = ( 1 - k )<tspan baseline-shift="super" font-size="10">3</tspan> * y<tspan baseline-shift="sub" font-size="10">C</tspan> + 3 * k * ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">E</tspan> + 3 * (1 - k) * k<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">F</tspan> + k<tspan baseline-shift="super" font-size="10">3</tspan> * y<tspan baseline-shift="sub" font-size="10">D</tspan></tspan>
<tspan x="20" dy="1.5em">We get two equations of third degree with k and t as variables</tspan>
<tspan x="20" dy="1.5em" fill="blue">( x<tspan baseline-shift="sub" font-size="8">D</tspan> - 3 * x<tspan baseline-shift="sub" font-size="8">F</tspan> + 3 * x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k<tspan baseline-shift="super" font-size="10">3</tspan> + 3 * ( x<tspan baseline-shift="sub" font-size="8">F</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">E</tspan> + x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k<tspan baseline-shift="super" font-size="10">2</tspan> + 3 * ( x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k - ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) * t + x<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> = 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">( y<tspan baseline-shift="sub" font-size="8">D</tspan> - 3 * y<tspan baseline-shift="sub" font-size="8">F</tspan> + 3 * y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k<tspan baseline-shift="super" font-size="10">3</tspan> + 3 * ( y<tspan baseline-shift="sub" font-size="8">F</tspan> - 2 * y<tspan baseline-shift="sub" font-size="8">E</tspan> + y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k<tspan baseline-shift="super" font-size="10">2</tspan> + 3 * ( y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * k - ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) * t + y<tspan baseline-shift="sub" font-size="8">C</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> = 0</tspan>
<tspan x="20" dy="1.5em">We get equation of third degree with k as variable by linear computation of equations</tspan>
<tspan x="20" dy="1.5em">With a = ( x<tspan baseline-shift="sub" font-size="8">D</tspan> - 3 * x<tspan baseline-shift="sub" font-size="8">F</tspan> + 3 * x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">D</tspan> - 3 * y<tspan baseline-shift="sub" font-size="8">F</tspan> + 3 * y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan> 
<tspan x="40" dy="1.5em">b = 3 * ( ( x<tspan baseline-shift="sub" font-size="8">F</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">E</tspan> + x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">F</tspan> - 2 * y<tspan baseline-shift="sub" font-size="8">E</tspan> + y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) )</tspan>
<tspan x="40" dy="1.5em">c = 3 * ( ( x<tspan baseline-shift="sub" font-size="8">E</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">E</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) )</tspan>
<tspan x="40" dy="1.5em">d = ( x<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) - ( y<tspan baseline-shift="sub" font-size="8">C</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> ) * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> ) )</tspan>
<tspan x="20" dy="1.5em">We solve equation a * k<tspan baseline-shift="super" font-size="10">3</tspan> + b * k<tspan baseline-shift="super" font-size="10">2</tspan> + c * k + d = 0 ( see method in equations item )</tspan>
<tspan x="20" dy="1.5em">We get one or three solutions for k</tspan>
<tspan x="20" dy="1.5em">With solutions for k, we calculate value for t</tspan>
<tspan x="20" dy="2.5em">We must verify that solutions for k and t are between 0 and 1</tspan>
<tspan x="20" dy="1.5em" fill="blue">If ( ( k &gt;= 0 ) &amp;&amp; ( k &lt;= 1 ) &amp;&amp;( t &gt;= 0 ) &amp;&amp; ( t &lt;= 1 ) )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">F</tspan> = x<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>
<tspan x="20" dy="1.5em" fill="blue">y<tspan baseline-shift="sub" font-size="8">F</tspan> = y<tspan baseline-shift="sub" font-size="8">A</tspan> + t * ( y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan> )</tspan>


</text>
</svg>
