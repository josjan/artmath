<svg width="700" height="600" viewBox="-400 -300 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect x="-400" y="-300" width="700" height="600" style="fill:white"/> 
<use x="0" y="0" xlink:href="#system" fill="blue"/>
<text x="-380" y="-280" startOffset="0">Matrix : </text>
<g text-anchor="middle" transform="translate(-330,0)">
<text id="matrix_a" x="30" y="-280" startOffset="0">0.8</text>
<text id="matrix_c" x="100" y="-280" startOffset="0">0.5</text>
<text id="matrix_e" x="170" y="-280" startOffset="0">0</text>
<text id="matrix_b" x="30" y="-250" startOffset="0">0.9</text>
<text id="matrix_d" x="100" y="-250" startOffset="0">0</text>
<text id="matrix_f" x="170" y="-250" startOffset="0">0</text>
</g>
<path d="M 0 0 100 70 250 40 150 -30 z" style="stroke:yellow;fill-opacity:0.3; fill:orange"/>
<path transform="matrix(0.8 -0.9 -0.5 0 0 0)" id="test1" d="M 0 0 100 70 250 40 150 -30 z" style="stroke:blue;fill-opacity:0.3; fill:blue"/>
<circle id="A" cx="0" cy="0" r="3" style="stroke:red; fill:red"/>
<text x="-380" y="0" font-size="15" fill="blue">Affine transformation
<tspan x="-380" dy="2em" fill="black">We give any value for matrix with a * d - b * c not null</tspan>
<tspan x="-380" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="-380" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * a + y<tspan baseline-shift="sub">m</tspan> * c + e</tspan>
<tspan x="-380" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * b + y<tspan baseline-shift="sub">m</tspan> * d + f</tspan>
<tspan x="-380" dy="2em" fill="black">Matrix is : </tspan>
<tspan x="-350" dy="2em">a</tspan>
<tspan x="-300">c</tspan>
<tspan x="-250">e</tspan>
<tspan x="-350" dy="2em">b</tspan>
<tspan x="-300">d</tspan>
<tspan x="-250">f</tspan>
<tspan x="-350" dy="2em">0</tspan>
<tspan x="-300">0</tspan>
<tspan x="-250">1</tspan>
</text>
<line marker-end="url(#red)" x1="0" y1="-150" x2="50" y2="-100" style="stroke:red;stroke-width:3"/> 
<text x="-150" y="-150" fill="red" font-size="15">Example for formula</text>
<line marker-end="url(#red)" x1="-10" y1="150" x2="-150" y2="150" style="stroke:red;stroke-width:3"/> 
<text x="0" y="150" fill="red" font-size="15">Formula for affinity</text>
</svg>
