<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="25" y1="156.818" x2="675" y2="275" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="225" dx="-20" dy="-10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="125" y="175" dx="-20" dy="-10" startOffset="0">B</text>
<text id="m" style="text-anchor:middle;font-size:20;fill:blue" x="259.904" y="199.528" dx="-20" dy="-10" startOffset="0">M</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">2 ; 5</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">-9 ; 7</tspan></text>
<text x="320" y="20" font-size="15" startOffset="0">Vector Vx : <tspan id="vxt">-11</tspan></text>
<text x="320" y="40" font-size="15" startOffset="0">Vector Vy : <tspan id="vyt">2</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Line (AB) equation parametric : 
<tspan x="20" dy="20" id="utx"> x = 2 - t * 11</tspan>
<tspan x="20" dy="20" id="uty"> y = 5 + t * 2</tspan>
</text>
<text x="320" y="80" font-size="15" fill="blue" startOffset="0">Value of t for M : <tspan id="utm">0.5</tspan></text>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="400" cy="225" r="4" fill="red"/>
<circle id="p2" cx="125" cy="175" r="4" fill="red"/>
<circle id="p3" cx="259.904" cy="199.528" r="4" fill="red"/>
<text x="50" y="320" font-size="15" fill="black">Equation parametric for line (AB)
<tspan x="50" dy="2em">Line is defined by A and B</tspan>
<tspan x="50" dy="1.5em">If a point M ( x , y ) is on line, vectors AM and AB are colinear</tspan>
<tspan x="50" dy="1.5em">Exist number t so vector AM is t * vector AB</tspan>
<tspan x="50" dy="1.5em" fill="blue">x = x<tspan baseline-shift="sub" font-size="9">A</tspan> + t * ( x<tspan baseline-shift="sub" font-size="9">B</tspan> - x<tspan baseline-shift="sub" font-size="9">A</tspan> )</tspan>
<tspan x="50" dy="1.5em" fill="blue">y = y<tspan baseline-shift="sub" font-size="9">A</tspan> + t * ( y<tspan baseline-shift="sub" font-size="9">B</tspan> - y<tspan baseline-shift="sub" font-size="9">A</tspan> )</tspan>
<tspan x="50" dy="1.5em">If coordinates of vector AB are named U<tspan baseline-shift="sub">x</tspan> and U<tspan baseline-shift="sub">y</tspan></tspan>
<tspan x="50" dy="1.5em" fill="blue"> x= x<tspan baseline-shift="sub" font-size="9">A</tspan> + t * U<tspan baseline-shift="sub" font-size="9">x</tspan></tspan>
<tspan x="50" dy="1.5em" fill="blue"> y= y<tspan baseline-shift="sub" font-size="9">A</tspan> + t * U<tspan baseline-shift="sub" font-size="9">y</tspan></tspan>
<tspan x="50" dy="1.5em">On example above, we see that if M is midpoint for AB, t is 0.5</tspan>
</text>
</svg>
