<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="50" height="50" patternUnits="userSpaceOnUse">
	<rect width="50" height="50" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker><g id="system2">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:1"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:1"/> 
    <circle cx="0" cy="0" r="1.5" stroke="black"/>
</g>
</defs>
 <rect width="700" height="600" fill="white" onclick="alert(evt.clientX + ' ; ' + evt.clientY)"/>
  <text x="20" y="20" font-size="15">
    Function: y(x) = sin(x)
  </text>


<circle cx="150" cy="150" r="100" fill="none" stroke="green"/>
<use transform="translate(150,150) scale(2)" xlink:href="#system2" fill="blue"/>
<path marker-end="url(#green)" d="M 170 150A20 20 0 0 0 160 133" stroke="green" fill="none" stroke-width="2"/>
<circle cx="200" cy="63" r="4" fill="green"/>
<line x1="50" y1="63" x2="250" y2="63" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="50" y1="237" x2="250" y2="237" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="100" y1="237" x2="200" y2="63" stroke="green" fill="none" stroke-width="2"/>
<line x1="100" y1="50" x2="100" y2="250" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="200" y1="50" x2="200" y2="250" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line marker-end="url(#red)" x1="150" y1="150" x2="150" y2="63" stroke="red" fill="none" stroke-width="3"/>
<circle cx="100" cy="63" r="4" fill="green"/>
<circle cx="100" cy="237" r="4" fill="blue"/>
<circle cx="200" cy="237" r="4" fill="blue"/>

<g transform="translate(0,250)">
<circle cx="150" cy="150" r="100" fill="none" stroke="green"/>
<use transform="translate(150,150) scale(2)" xlink:href="#system2" fill="blue"/>
<path marker-end="url(#green)" d="M 170 150A20 20 0 0 0 160 133" stroke="green" fill="none" stroke-width="2"/>
<circle cx="200" cy="63" r="4" fill="green"/>
<circle cx="237" cy="100" r="4" fill="blue"/>
<line x1="50" y1="250" x2="250" y2="50" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="150" y1="150" x2="200" y2="63" stroke="green" fill="none" stroke-width="2"/>
<line marker-end="url(#red)" x1="150" y1="150" x2="150" y2="63" stroke="red" fill="none" stroke-width="3"/>
<line marker-end="url(#blue)" x1="150" y1="150" x2="200" y2="150" stroke="blue" fill="none" stroke-width="3"/>
</g>
<text x="300" y="50">Some properties
<tspan x="300" dy="1.5em">As sinus is y coordinate of point on unit circle :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( x ) is between - 1 and 1</tspan> 
<tspan x="300" dy="1.5em">Sinus is periodical :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( x + 2 * Pi ) = sin ( x )</tspan> 
<tspan x="300" dy="1.5em">This two green points have same y coordinate :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( Pi - x ) = sin ( x )</tspan> 
<tspan x="300" dy="1.5em">The two blue points have opposite y coordinate :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( - x ) = - sin ( x )</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( x + Pi ) = - sin ( x )</tspan> 
<tspan x="300" dy="1.5em">Some values to know :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( 0 ) = 0 ; sin ( Pi / 2 ) = 1 ; sin ( Pi / 6 ) = 0.5</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( Pi / 3 ) = . 3 / 2 ; sin ( Pi / 4 ) = . 2 / 2</tspan> 
<tspan x="300" dy="5em">If sinus is y coordinate of point on unit circle ( red vector )</tspan> 
<tspan x="300" dy="1.5em">x coordinate is cosinus ( blue vector )</tspan> 
<tspan x="300" dy="1.5em">And as radius is unit :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin<tspan baseline-shift="super" font-size="9">2</tspan> ( x ) + cos<tspan baseline-shift="super" font-size="9">2</tspan> ( x ) = 1</tspan> 
<tspan x="300" dy="1.5em">For blue and green points, coordinates are exchanged :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">sin ( Pi / 2 - x ) = cos ( x )</tspan> 
<tspan x="300" dy="1.5em" fill="blue">cos ( Pi / 2 - x ) = sin ( x )</tspan> 
<tspan x="300" dy="5em">Function sin ( x ) can be derivatived :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">Derivative function of sin ( x ) is cos ( x )</tspan> 

</text>
<path d="M372 254l3 12 3 -12h10" fill="none" stroke="blue"/>
<path d="M487 254l3 12 3 -12h10" fill="none" stroke="blue"/>
</svg>  

