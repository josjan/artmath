<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="50" height="50" patternUnits="userSpaceOnUse">
	<rect width="50" height="50" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker><g id="system2">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:1"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:1"/> 
    <circle cx="0" cy="0" r="1.5" stroke="black"/>
</g>
</defs>
 <rect width="700" height="600" fill="white"/>
  <text x="20" y="20" font-size="15">
    Function: y(x) = acos(x)
  </text>


<circle cx="150" cy="150" r="100" fill="none" stroke="green" stroke-dasharray="4 4"/>
<path d="M250 150A100 100 0 0 0 50 150" stroke="green" fill="none" stroke-width="2"/>
<use transform="translate(150,150) scale(2)" xlink:href="#system2" fill="blue"/>
<path marker-end="url(#blue)" d="M250 150A100 100 0 0 0 200 63" stroke="blue" fill="none" stroke-width="3"/>
<circle cx="200" cy="63" r="4" fill="green"/>
<line x1="150" y1="150" x2="200" y2="63" stroke="green" fill="none" stroke-width="2"/>
<line x1="200" y1="50" x2="200" y2="250" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line marker-end="url(#red)" x1="150" y1="150" x2="200" y2="150" stroke="red" fill="none" stroke-width="3"/>

<g transform="translate(0,250)">
<circle cx="150" cy="150" r="100" fill="none" stroke="green"/>
<use transform="translate(150,150) scale(2)" xlink:href="#system2" fill="blue"/>
<path marker-end="url(#blue)" d="M250 150A100 100 0 0 0 200 63" stroke="blue" fill="none" stroke-width="3"/>
<circle cx="200" cy="63" r="4" fill="green"/>
<line x1="150" y1="150" x2="200" y2="63" stroke="green" fill="none" stroke-width="2"/>
<line x1="200" y1="50" x2="200" y2="250" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line marker-end="url(#red)" x1="150" y1="150" x2="200" y2="150" stroke="red" fill="none" stroke-width="3"/>
<circle cx="200" cy="237" r="4" fill="blue"/>
</g>

<text x="300" y="50">Some properties
<tspan x="300" dy="1.5em" fill="blue">acos ( x ) is only defined when x is between - 1 and 1</tspan> 
<tspan x="300" dy="1.5em" fill="blue">acos ( x ) is between 0 and Pi </tspan> 
<tspan x="300" dy="1.5em">Some values to know :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">acos ( 0 ) = Pi / 2 ; acos ( 1 ) = 0 ; acos ( - 1 ) = Pi</tspan> 
<tspan x="300" dy="1.5em" fill="blue">acos ( 0.5 ) = Pi / 3 ; acos ( . 3 / 2 ) = Pi / 6 ; acos ( . 2 / 2 ) = Pi / 4</tspan> 
<tspan x="300" dy="15em">If we solve equation cos ( x ) = a with a between - 1 and 1</tspan> 
<tspan x="300" dy="1.5em">acos ( a ) give only solution between 0 and Pi</tspan> 
<tspan x="300" dy="1.5em">Arc defined by blue point has same value for cosinus</tspan> 
<tspan x="300" dy="1.5em">We have two groups of solutions :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">x = acos ( a ) + k * 2 * Pi ( with k integer )</tspan> 
<tspan x="300" dy="1.5em" fill="blue">x = - acos ( a ) + k * 2 * Pi ( with k integer )</tspan> 
<tspan x="300" dy="5em">Function acos ( x ) can be derivatived :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">Derivative function of acos ( x ) is - 1 / . 1 - x<tspan baseline-shift="super" font-size="9">2</tspan></tspan> 

</text>
<path d="M446 128l3 12 3 -12h10" fill="none" stroke="blue"/>
<path d="M570 128l3 12 3 -12h10" fill="none" stroke="blue"/>
<path d="M503 475l3 12 3 -12h30" fill="none" stroke="blue"/>
</svg>  

