<svg width="700" height="600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<circle cx="630" cy="70" r="50" style="stroke:green; fill:none"/>
<circle cx="630" cy="70" r="3" style="stroke:red; fill:red"/>
<circle cx="680" cy="70" r="3" style="stroke:red; fill:red"/>
<text x="630" y="70" dx="5">C</text>
<text x="680" y="70" dx="5">A</text>

<circle cx="630" cy="190" r="50" style="stroke:green; fill:none"/>
<circle cx="580" cy="190" r="3" style="stroke:red; fill:red"/>
<circle cx="680" cy="190" r="3" style="stroke:red; fill:red"/>
<text x="580" y="190" dx="5">A</text>
<text x="680" y="190" dx="5">B</text>

<circle cx="630" cy="310" r="50" style="stroke:green; fill:none"/>
<circle cx="580" cy="310" r="3" style="stroke:red; fill:red"/>
<circle cx="665" cy="345" r="3" style="stroke:red; fill:red"/>
<circle cx="665" cy="275" r="3" style="stroke:red; fill:red"/>
<text x="580" y="310" dx="5">A</text>
<text x="665" y="345" dx="5">B</text>
<text x="665" y="275" dx="5">D</text>

<text x="20" y="20" font-size="14" fill="black">Circle defined by center C and a point A
<tspan x="20" dy="1.2em">If M is on circle, length CM = length CA</tspan>
<tspan x="20" dy="1.2em">(x - x<tspan baseline-shift="sub" font-size="8">C</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> + (y - y<tspan baseline-shift="sub" font-size="8">C</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> = (x<tspan baseline-shift="sub" font-size="8">A</tspan> - x<tspan baseline-shift="sub" font-size="8">C</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> + (y<tspan baseline-shift="sub" font-size="8">A</tspan> - y<tspan baseline-shift="sub" font-size="8">C</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> = R<tspan baseline-shift="super" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="super" font-size="8">2</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">C</tspan> * x - 2 * y<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub"  font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + 2 * x<tspan baseline-shift="sub" font-size="8">A</tspan> * x<tspan baseline-shift="sub" font-size="8">C</tspan> + 2 * y<tspan baseline-shift="sub" font-size="8">A</tspan> * y<tspan baseline-shift="sub" font-size="8">C</tspan> = 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="super" font-size="8">2</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">C</tspan> * x - 2 * y<tspan baseline-shift="sub" font-size="8">C</tspan> + x<tspan baseline-shift="sub"  font-size="8">C</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">C</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - R<tspan baseline-shift="super" font-size="8">2</tspan> = 0</tspan>
<tspan x="20" dy="1.2em">We can also get parametric equation :</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + R * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + R * sin ( t ) with t from 0 to 2 * PI</tspan>
<tspan x="20" dy="3.2em">Circle defined by diameter AB</tspan>
<tspan x="20" dy="1.2em">If M is on circle, dot product of vectors AM and BM is null</tspan>
<tspan x="20" dy="1.2em">(x - x<tspan baseline-shift="sub" font-size="8">A</tspan>) * (x - x<tspan baseline-shift="sub" font-size="8">B</tspan>) + (y - y<tspan baseline-shift="sub" font-size="8">A</tspan>) * (y - y<tspan baseline-shift="sub" font-size="8">B</tspan>) = 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="super" font-size="8">2</tspan> - (x<tspan baseline-shift="sub" font-size="8">A</tspan> + x<tspan baseline-shift="sub" font-size="8">B</tspan>) * x - (y<tspan baseline-shift="sub" font-size="8">A</tspan> - y<tspan baseline-shift="sub"  font-size="8">B</tspan>) * y + x<tspan baseline-shift="sub" font-size="8">A</tspan> * x<tspan baseline-shift="sub" font-size="8">B</tspan> + y<tspan baseline-shift="sub" font-size="8">A</tspan> * y<tspan baseline-shift="sub" font-size="8">B</tspan> = 0</tspan>

<tspan x="20" dy="3.2em">Circle defined by three points A B and D</tspan>
<tspan x="20" dy="1.2em">If C is center, length CA = length CB = length CD</tspan>
<tspan x="20" dy="1.2em">With length CA = length CB we have first linear equation on coordinates of center</tspan>
<tspan x="20" dy="1.2em">(x - x<tspan baseline-shift="sub" font-size="8">A</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> + (y - y<tspan baseline-shift="sub" font-size="8">A</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> = (x - x<tspan baseline-shift="sub" font-size="8">B</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan> + (y - y<tspan baseline-shift="sub" font-size="8">B</tspan>)<tspan baseline-shift="super" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.2em">(x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan>) * x + (y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan>) * y = x<tspan baseline-shift="sub" font-size="8">B</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">B</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.2em">With length CA = length CD we have second linear equation on coordinates of center</tspan>
<tspan x="20" dy="1.2em">(x<tspan baseline-shift="sub" font-size="8">D</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan>) * x + (y<tspan baseline-shift="sub" font-size="8">D</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan>) * y = x<tspan baseline-shift="sub" font-size="8">D</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">D</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.2em">We solve this system of linear equations</tspan>
<tspan x="20" dy="1.2em">det = (x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan>) * (y<tspan baseline-shift="sub" font-size="8">D</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan>) - (x<tspan baseline-shift="sub" font-size="8">D</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan>) * (y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan>)</tspan>
<tspan x="20" dy="1.2em">If det is not null ( A B and C not on same line )</tspan>
<tspan x="20" dy="1.2em">x<tspan baseline-shift="sub" font-size="8">C</tspan> = ((x<tspan baseline-shift="sub" font-size="8">B</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">B</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan>) * (y<tspan baseline-shift="sub" font-size="8">D</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan>) - (x<tspan baseline-shift="sub" font-size="8">D</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">D</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan>) * (y<tspan baseline-shift="sub" font-size="8">B</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan>)) / det</tspan>
<tspan x="20" dy="1.2em">y<tspan baseline-shift="sub" font-size="8">C</tspan> = (- (x<tspan baseline-shift="sub" font-size="8">B</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">B</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan>) * (x<tspan baseline-shift="sub" font-size="8">D</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan>) + (x<tspan baseline-shift="sub" font-size="8">D</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="sub" font-size="8">D</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan>) * (x<tspan baseline-shift="sub" font-size="8">B</tspan> - x<tspan baseline-shift="sub" font-size="8">A</tspan>)) / det</tspan>
<tspan x="20" dy="1.2em">We know center C and point ( A B or C ) as in first case</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="super" font-size="8">2</tspan> + y<tspan baseline-shift="super" font-size="8">2</tspan> - 2 * x<tspan baseline-shift="sub" font-size="8">C</tspan> * x - 2 * y<tspan baseline-shift="sub" font-size="8">C</tspan> - x<tspan baseline-shift="sub"  font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> - y<tspan baseline-shift="sub" font-size="8">A</tspan><tspan baseline-shift="super" font-size="8">2</tspan> + 2 * x<tspan baseline-shift="sub" font-size="8">A</tspan> * x<tspan baseline-shift="sub" font-size="8">C</tspan> + 2 * y<tspan baseline-shift="sub" font-size="8">A</tspan> * y<tspan baseline-shift="sub" font-size="8">C</tspan> = 0</tspan>




</text>
</svg>
