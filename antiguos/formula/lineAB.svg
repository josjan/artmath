<?xml version="1.0" encoding="utf-8"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" width="700" height="600"
     viewBox="0 0 700 600">
  <defs>
    <pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse"
             preserveAspectRatio="xMidYMid meet">
      <rect width="25" height="25" fill="none" stroke="#000000"
            stroke-width="0.1"/>
    </pattern>
    <marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0"
            markerUnits="strokeWidth" markerWidth="10" markerHeight="6"
            orient="auto" preserveAspectRatio="xMidYMid meet">
      <path d="M 5,0 L 0,15 10,15 z" transform="rotate(90,2.5,-2.5) "/>
    </marker>
    <marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0"
            markerUnits="strokeWidth" markerWidth="20" markerHeight="12"
            orient="auto" preserveAspectRatio="xMidYMid meet">
      <path d="M 5,0 L 0,15 10,15 z" fill="green"
            transform="rotate(90,2.5,-2.5) "/>
    </marker>
    <g id="system">
      <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0"
            style="stroke:black;stroke-width:2"/>
      <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25"
            style="stroke:black;stroke-width:2"/>
      <circle cx="0" cy="0" r="3" stroke="black"/>
    </g>
  </defs>
  <rect width="700" height="600" fill="white"/>
  <use x="350" y="350" xlink:href="#system" fill="blue"/>
  <line id="v1" x1="62.5" y1="125" x2="675" y2="347.727"
        style="stroke:green;stroke-width:2"/>
  <text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="200"
        y="175" dx="-20" dy="20" startOffset="0">A
  </text>
  <text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="475"
        y="275" dx="20" dy="-10" startOffset="0">B
  </text>
  <text x="20" y="20" font-size="15" startOffset="0">Coordinates A : 
    <tspan id="xya">-6 ; 7</tspan>
  </text>
  <text x="20" y="40" font-size="15" startOffset="0">Coordinates B : 
    <tspan id="xyb">5 ; 3</tspan>
  </text>
  <text x="320" y="20" font-size="15" startOffset="0">Vector Vx : 
    <tspan id="vxt">11</tspan>
  </text>
  <text x="320" y="40" font-size="15" startOffset="0">Vector Vy : 
    <tspan id="vyt">-4</tspan>
  </text>
  <text x="20" y="60" font-size="15" startOffset="0">Line (AB) equation : 
    <tspan id="ut">-4 * x -11 * y + 53 = 0</tspan>
  </text>
  <rect x="25" y="125" width="651" height="451" fill="yellow"
        fill-opacity="0.1"/>
  <circle id="p1" cx="200" cy="175" r="4" fill="red"/>
  <circle id="p2" cx="475" cy="275" r="4" fill="red"/>
  <text x="50" y="320" font-size="15" fill="black">Equation for line (AB) 
    <tspan x="50" dy="2em">Line es definida por A y B</tspan>
     
    <tspan x="50" dy="1.5em">Si un punto M ( x , y ) esta sobre la
      linea, El producto de vectores AM y AB es nulo</tspan>
     
    <tspan x="50" dy="1.5em" fill="blue">( x - x<tspan baseline-shift="sub"
             font-size="9">A</tspan>
      ) * ( y<tspan baseline-shift="sub" font-size="9">B</tspan>
       - y<tspan baseline-shift="sub" font-size="9">A</tspan>
       ) - ( y - y<tspan baseline-shift="sub" font-size="9">A</tspan>
       ) * ( x<tspan baseline-shift="sub" font-size="9">B</tspan>
       - x<tspan baseline-shift="sub" font-size="9">A</tspan>
       ) = 0</tspan>
     
    <tspan x="50" dy="1.5em" fill="blue">( y<tspan baseline-shift="sub"
             font-size="9">B</tspan>
       - y<tspan baseline-shift="sub" font-size="9">A</tspan>
       ) * x - ( x<tspan baseline-shift="sub" font-size="9">B</tspan>
       - x<tspan baseline-shift="sub" font-size="9">A</tspan>
       ) * y + x<tspan baseline-shift="sub" font-size="9">B</tspan>
       * y<tspan baseline-shift="sub" font-size="9">A</tspan>
       - x<tspan baseline-shift="sub" font-size="9">A</tspan>
       * y<tspan baseline-shift="sub" font-size="9">B</tspan>
       = 0</tspan>
     
    <tspan x="50" dy="1.5em">Si las coordenadas del vector AB son llamadas
      U<tspan baseline-shift="sub">x</tspan>
       y U<tspan baseline-shift="sub">y</tspan>
    </tspan>
     
    <tspan x="50" dy="1.5em" fill="blue">U<tspan baseline-shift="sub">y</tspan>
       * x - U<tspan baseline-shift="sub">x</tspan>
       * y + y<tspan baseline-shift="sub" font-size="9">A</tspan>
       * U<tspan baseline-shift="sub">x</tspan>
       - x<tspan baseline-shift="sub" font-size="9">A</tspan>
       * U<tspan baseline-shift="sub">y</tspan>
       = 0</tspan>
     
    <tspan x="50" dy="1.5em">Si U<tspan baseline-shift="sub">x</tspan>
       no es nulo, podemos escibir la ecuacion como y = a x + b
    :</tspan>
     
    <tspan x="50" dy="1.5em" fill="blue">y = ( U<tspan
      baseline-shift="sub">y</tspan>
       / U<tspan baseline-shift="sub">x</tspan>
       ) * x + ( y<tspan baseline-shift="sub" font-size="9">A</tspan>
       * U<tspan baseline-shift="sub">x</tspan>
       - x<tspan baseline-shift="sub" font-size="9">A</tspan>
       * U<tspan baseline-shift="sub">y</tspan>
       ) / U<tspan baseline-shift="sub">x</tspan>
    </tspan>
     
    <tspan x="50" dy="1.5em">Si tenemos dos lineas y = a * x + b and y
      = a' * x + b'</tspan>
     
    <tspan x="50" dy="1.5em">Si a = a' ellas son paralelas - Si a * a' = - 1 son
      perpendiculares</tspan>
  </text>
</svg>
