<svg width="600" height="600" viewBox="0 0 600 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="600" height="600" fill="white"/>
<line id="v1" marker-end="url(#Marker01)" x1="51" y1="125" x2="251" y2="100" style="stroke:black;stroke-width:3"/> 
<line id="v2" marker-end="url(#Marker01)" x1="51" y1="125" x2="251" y2="175" style="stroke:black;stroke-width:3"/> 
<line id="v1b" x1="51" y1="125" x2="301" y2="93.75" style="stroke:green;stroke-width:1"/> 
<line id="v2b" x1="51" y1="125" x2="176" y2="156.25" style="stroke:green;stroke-width:1"/> 
<line id="v1c" x1="426" y1="125" x2="301" y2="93.75" style="stroke:green;stroke-width:1"/> 
<line id="v2c" x1="426" y1="125" x2="176" y2="156.25" style="stroke:green;stroke-width:1"/> 
<line id="v3" marker-end="url(#blue)" x1="51" y1="125" x2="426" y2="125" style="stroke:blue;stroke-width:3"/> 
<text id="a" style="text-anchor:middle;font-size:12;fill:blue" x="251" y="100" dx="-10" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:12;fill:blue" x="251" y="175" dx="10" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:12;fill:blue" x="426" y="125" dx="10" dy="-5" startOffset="0">C</text>
<text id="d" style="text-anchor:middle;font-size:12;fill:blue" x="51" y="125" dx="-10" dy="-5" startOffset="0">O</text>
<text x="20" y="20" font-size="15" startOffset="0">System of linear equations :</text>
<text x="20" y="40" font-size="15" startOffset="0">First equation : <tspan id="vxt" x="180">8</tspan> * x</text>
<text x="20" y="60" font-size="15" startOffset="0">Second equation : <tspan id="vyt" x="180">1</tspan> * x </text>
<text x="280" y="40" font-size="15" startOffset="0"><tspan id="vxt2">8</tspan> * y</text>
<text x="280" y="60" font-size="15" startOffset="0"><tspan id="vyt2">-2</tspan> * y</text>
<text x="380" y="40" font-size="15" startOffset="0"> = <tspan id="vxs" dx="20">15</tspan></text>
<text x="380" y="60" font-size="15" startOffset="0"> = <tspan id="vys" dx="20">0</tspan></text>
<text x="20" y="80" font-size="15" fill="blue" startOffset="0">Solution : x = <tspan id="sx">1.25</tspan>  and  y = <tspan id="sy">0.62</tspan></text>
<text x="20" y="200" font-size="15" startOffset="0">Solve system is find scalars x and y so vector OC = x * vector OA + y * vector OB</text>
<circle id="p0" cx="51" cy="125" r="4" fill="red"/>
<circle id="p1" cx="251" cy="100" r="4" fill="red"/>
<circle id="p2" cx="251" cy="175" r="4" fill="red"/>
<circle id="p3" cx="426" cy="125" r="4" fill="red"/>
<text x="20" y="220" font-size="15" startOffset="0">We use cross product to calculate x and y
<tspan x="20" dy="1.3em">Vector OC is x * OA + y * OB, OC ^ OC = 0</tspan>
<tspan x="20" dy="1.3em">OC ^ OC = ( x * OA + y * OB ) ^ OC</tspan>
<tspan x="20" dy="1.3em">OC ^ OC = x * OA ^ OC + y * OB ^ OC</tspan>
<tspan x="20" dy="1.3em">OC ^ OC = x * OA ^ ( x * OA + y * OB ) + y * OB ^ OC</tspan>
<tspan x="20" dy="1.3em">OC ^ OC = x * x * OA ^ OA +  x *y * OA ^ OB + y * OB ^ OC</tspan>
<tspan x="20" dy="1.3em">As OA ^ OA = 0, we have x * y * OA ^ OB + y * OB ^ OC = 0</tspan>
<tspan x="20" dy="1.3em">y * ( x * OA ^ OB +  OB ^ OC ) = 0</tspan>
<tspan x="20" dy="1.3em">y = 0 or x * OA ^ OB +  OB ^ OC = 0</tspan>
<tspan x="20" dy="1.3em">If OA ^ OB is not null, <tspan fill="blue"> x = OC ^ OB / OA ^ OB </tspan> is solution</tspan>
<tspan x="20" dy="1.3em">With same method <tspan fill="blue"> y = OA ^ OC / OA ^ OB </tspan> is solution</tspan>
<tspan x="20" dy="1.3em">If we write equations as a * x + b * y = c and a' * x + b' * y = c' :</tspan>
<tspan x="20" dy="1.3em">If a * b' - a' * b not null, </tspan>
<tspan x="20" dy="1.3em" fill="blue">x = ( c * b' - c' * b ) / ( a * b' - a' * b ) ; y = ( a * c' - a' * c ) / ( a * b' - a' * b )</tspan>
<tspan x="20" dy="1.3em">If a * b' - a' * b = 0, vectors OA and OB have same direction</tspan>
<tspan x="20" dy="1.3em">If vector OC has also same direction, there is infinity of values</tspan>
<tspan x="20" dy="1.3em">If vector OC has not same direction, there is no solution</tspan>
</text>
</svg>
