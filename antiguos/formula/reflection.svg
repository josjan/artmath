<text x="20" y="250" font-size="15" fill="blue">Reflection by axis
<tspan x="20" dy="2em" fill="black">Reflection need axis</tspan>
<tspan x="20" dy="1em" fill="black">Axis : u * x + v * y + w = 0</tspan>
<tspan x="20" dy="1.5em" fill="black">We calculate det = u<tspan baseline-shift="super" font-size="9">2</tspan> + v<tspan baseline-shift="super" font-size="9">2</tspan></tspan>
<tspan x="20" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * ( u<tspan baseline-shift="super" font-size="9">2</tspan> - v<tspan baseline-shift="super" font-size="9">2</tspan> ) / det + y<tspan baseline-shift="sub">m</tspan> * (2 * u * v) / det + (2 * v * w) / det</tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  y<tspan baseline-shift="sub">m</tspan> * ( 2 * u * v ) / det + y<tspan baseline-shift="sub">m</tspan> * ( v<tspan baseline-shift="super" font-size="9">2</tspan> - u<tspan baseline-shift="super" font-size="9">2</tspan> ) / det + ( - 2 * u * w) / det</tspan>
<tspan x="20" dy="2em" fill="black">Matrix for reflection ( all values have to be divised by u<tspan baseline-shift="super" font-size="9">2</tspan> + v<tspan baseline-shift="super" font-size="9">2</tspan> ) : </tspan>
<tspan x="60" dy="2em">u<tspan baseline-shift="super" font-size="9">2</tspan> - v<tspan baseline-shift="super" font-size="9">2</tspan></tspan>
<tspan x="200">2 * u * v </tspan>
<tspan x="350">2 * v *w</tspan>
<tspan x="50" dy="2em">2 * u * v</tspan>
<tspan x="210">v<tspan baseline-shift="super" font-size="9">2</tspan> - u<tspan baseline-shift="super" font-size="9">2</tspan></tspan>
<tspan x="340">- 2 * u * w</tspan>
<tspan x="80" dy="2em">0</tspan>
<tspan x="220">0</tspan>
<tspan x="370">1</tspan>
</text>
