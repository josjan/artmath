<svg width="700" height="600" viewBox="0 0 700 600">
   <defs>
    <g id="buttonGo">
      <text y="8" text-anchor="middle" font-size="16" font-weight="bold" fill="navy" stroke="gray">Go</text>
      <rect x="-30" y="-15" width="60" height="30" fill="Gainsboro" stroke="black" stroke-width="2" opacity="0.3"/>
    </g>
  </defs>
  <rect width="700" height="600" fill="white"/>
  <text x="350" y="30" style="fill:black;text-anchor:middle;font-size:15">Lissajou Example</text>

  <text x="350" y="70" font-size="15" text-anchor="middle">
    <tspan x="350" dy="0em">Lissajou figures are described by a parametric function.</tspan>
  </text>

<image xlink:href="equation/eq3.svg" width="308" height="70" x="195" y="100" />

  <g transform="translate(175,350)">
    <text x="0" y="-135" font-size="18" text-anchor="middle">Linear Interpolation</text>
    <rect x="-125" y="-125" width="250" height="250" fill="gainsboro" stroke="black"/>
    <path id="linearGraph" d="M0,0 500,0" stroke="darkblue" stroke-width="2" fill="none" />
    <path id="linearPnts"  d="M0,0 Z" stroke="darkblue" stroke-width="6" stroke-linecap="round" fill="none" />
    <use id="linearGo" xlink:href="#buttonGo" x="0" y="150" onclick="Go(evt);"/>
  </g>

  <g transform="translate(500,350)">
    <text x="0" y="-135" font-size="18" text-anchor="middle">Spline Interpolation</text>
    <rect x="-125" y="-125" width="250" height="250" fill="gainsboro" stroke="black"/>
    <path id="splineGraph" d="M0,0 500,0" stroke="indianred" stroke-width="2" fill="none" />
    <path id="splinePnts"  d="M0,0 Z" stroke="indianred" stroke-width="6" stroke-linecap="round" fill="none" />
    <use id="splineGo" xlink:href="#buttonGo" x="0" y="150" onclick="Go(evt);"/>
  </g>

</svg>
