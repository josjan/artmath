<svg width="700" height="600">
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<text x="20" y="20" font-size="15" fill="black">Product of matrix A by matrix B
<tspan x="20" dy="2em">Matrix A :</tspan>
<tspan x="50" dy="1em">a<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="100">c<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="150">e<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="50" dy="2em">b<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="100">d<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="150">f<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="50" dy="2em">0</tspan>
<tspan x="100">0</tspan>
<tspan x="150">1</tspan>
<tspan x="320" dy="-5em">Matrix B :</tspan>
<tspan x="350" dy="1em">a<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="400">c<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="450">e<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="350" dy="2em">b<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="400">d<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="450">f<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="350" dy="2em">0</tspan>
<tspan x="400">0</tspan>
<tspan x="450">1</tspan>

<tspan x="20" dy="3em">Matrix A x B :</tspan>
<tspan x="50" dy="1em">a<tspan baseline-shift="sub" font-size="10">1</tspan> * a<tspan baseline-shift="sub" font-size="10">2</tspan> + c<tspan baseline-shift="sub" font-size="10">1</tspan> * b<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="250">a<tspan baseline-shift="sub" font-size="10">1</tspan> * c<tspan baseline-shift="sub" font-size="10">2</tspan> + c<tspan baseline-shift="sub" font-size="10">1</tspan> * d<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="450">a<tspan baseline-shift="sub" font-size="10">1</tspan> * e<tspan baseline-shift="sub" font-size="10">2</tspan> + c<tspan baseline-shift="sub" font-size="10">1</tspan> * f<tspan baseline-shift="sub" font-size="10">2</tspan> + e<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="50" dy="2em">b<tspan baseline-shift="sub" font-size="10">1</tspan> * a<tspan baseline-shift="sub" font-size="10">2</tspan> + d<tspan baseline-shift="sub" font-size="10">1</tspan> * b<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="250">b<tspan baseline-shift="sub" font-size="10">1</tspan> * c<tspan baseline-shift="sub" font-size="10">2</tspan> + d<tspan baseline-shift="sub" font-size="10">1</tspan> * d<tspan baseline-shift="sub" font-size="10">2</tspan></tspan>
<tspan x="450">b<tspan baseline-shift="sub" font-size="10">1</tspan> * e<tspan baseline-shift="sub" font-size="10">2</tspan> + d<tspan baseline-shift="sub" font-size="10">1</tspan> * f<tspan baseline-shift="sub" font-size="10">2</tspan> + f<tspan baseline-shift="sub" font-size="10">1</tspan></tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="300">0</tspan>
<tspan x="510">1</tspan>
<tspan x="20" dy="3em">Properties</tspan>
<tspan x="20" dy="2em">A x B is also matrix for transformation</tspan>
<tspan x="20" dy="2em">In most cases A x B is not equal to B x A</tspan>
<tspan x="20" dy="2em">If A define transform="transfo1" and B transform="transfo2", A x B define transform="transfo1 transfo2"</tspan>
<tspan x="20" dy="2em">First transformation apply to object is transfo2</tspan>

</text>
</svg>
