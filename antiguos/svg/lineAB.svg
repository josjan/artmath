<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="325" y="125" width="351" height="251" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="372.156" y1="125" x2="675" y2="357.295" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">B</text>
<rect x="325" y="125" width="351" height="251" fill="yellow" fill-opacity="0.1"/>
<g onmousedown="click=true" onmousemove="svg_lineAB_move(evt)">
<circle id="p1" cx="423" cy="164" r="4" fill="red"/>
<circle id="p2" cx="599" cy="299" r="4" fill="red"/>
</g>
</g>
<text x="20" y="20" font-size="12">How draw line in SVG?
<tspan x="20" dy="1.5em">We have to clip line to viewport</tspan>
<tspan x="20" dy="1.5em">Suppose that line is given by equation u * x + v * y + w = 0</tspan>
<tspan x="20" dy="1.5em">We search intersection with sides of rectangle</tspan>
<tspan x="20" dy="1.5em">nb_clip = 0</tspan>
<tspan x="20" dy="1em">if (v == 0) {</tspan>
<tspan x="40" dy="1em">clip_p[0][0] = - w / u</tspan>
<tspan x="40" dy="1em">clip_p[0][1] = min_y</tspan>
<tspan x="40" dy="1em">clip_p[1][0] = - w / u</tspan>
<tspan x="40" dy="1em">clip_p[1][1] = max_y }</tspan>
<tspan x="20" dy="1em">else {</tspan>
<tspan x="40" dy="1em">if ( u == 0 ) {</tspan>
<tspan x="60" dy="1em">clip_p[0][0] = min_x</tspan>
<tspan x="60" dy="1em">clip_p[0][1] = - w / v</tspan>
<tspan x="60" dy="1em">clip_p[1][0] = max_x</tspan>
<tspan x="60" dy="1em">clip_p[1][1] = - w / v }</tspan>
<tspan x="40" dy="1em">else {</tspan>
<tspan x="60" dy="1em">x = ( - v * min_y - w ) / u</tspan>
<tspan x="60" dy="1em">if ((x &gt; min_x)&amp;&amp;(x &lt; max_x)) {</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][0] = x</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][1] = min_y</tspan>
<tspan x="80" dy="1em">nb_clip += 1 }</tspan>
<tspan x="60" dy="1em">x = ( - v * max_y - w ) / u</tspan>
<tspan x="60" dy="1em">if ((x &gt; min_x)&amp;&amp;(x &lt; max_x)) {</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][0] = x</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][1] = max_y</tspan>

<tspan x="80" dy="1em">nb_clip += 1 }</tspan>
<tspan x="60" dy="1em">y = ( - u * min_x - w ) / v</tspan>
<tspan x="60" dy="1em">if ((y &gt;= min_y)&amp;&amp;(y &lt;= max_y)&amp;&amp;(nb_clip &lt; 2)) {</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][0] = min_x</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][1] = y</tspan>
<tspan x="80" dy="1em">nb_clip += 1 }</tspan>

<tspan x="60" dy="1em">y = ( - u * max_x - w ) / v</tspan>

<tspan x="60" dy="1em">if ((y &gt;= min_y)&amp;&amp;(y &lt;= max_y)&amp;&amp;(nb_clip &lt; 2)) {</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][0] = max_x</tspan>
<tspan x="80" dy="1em">clip_p[nb_clip][1] = y</tspan>
<tspan x="80" dy="1em">nb_clip += 1 }</tspan>
<tspan x="60" dy="1em">}</tspan>
<tspan x="40" dy="1em">}</tspan>
<tspan x="20" dy="1em">We get in array clip_p the two points to draw line</tspan>
<tspan x="20" dy="1em">If nb_clip != 2, the line is outside the viewport, we don't draw it</tspan>
<tspan x="20" dy="1em">We give values to x1 y1 x2 and y2 in "line" object</tspan>

</text>
</svg>
