<svg width="600" height="600">
<g onmouseup="click=false">
<rect id="bkgrnd" x="0" y="0" width="600" height="600" style="fill:white"/> 
<text x="300" y="20" style="text-anchor:middle">Two Cubic Bezier using C and T commands</text>
<text id='long' x='10' y='40'>Curve's length</text>
<text x='10' y='60'>Blue point is at middle of curve</text>
<text id="code" x='10' y='80'>Code for path : M100 300C200,100 250,400 300,300S450,400 500,300</text>
<circle id="milieu" cx="500" cy="300" r="3" style="stroke:blue; fill:blue"/>
<rect x="0" y="0" width="600" height="100" opacity="0"/>
<path id="courbe" d="M100 300C200,100 250,400 300,300S450,400 500,300" style="stroke:blue;fill-opacity:0.3; fill:none"/>
<path id="tang" d="M100 300 L200 100 M250 400 L350 200 M450 400 L500 300" style="stroke:green;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<circle id="C3" cx="350" cy="200" r="3" style="stroke:green; fill:green"/>
<g onmousedown="click=true" onmousemove="svg_cubic_move(evt)">
<circle id="A1" cx="100" cy="300" r="3" style="stroke:red; fill:red"/>
<circle id="C1" cx="200" cy="100" r="3" style="stroke:red; fill:red"/>
<circle id="C2" cx="250" cy="400" r="3" style="stroke:red; fill:red"/>
<circle id="A2" cx="300" cy="300" r="3" style="stroke:red; fill:red"/>
<circle id="C4" cx="450" cy="400" r="3" style="stroke:red; fill:red"/>
<circle id="A3" cx="500" cy="300" r="3" style="stroke:red; fill:red"/>
</g>
</g>
</svg>

