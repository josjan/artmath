<text x="50" y="550" font-size="30">We use crossed polygon to test method 
<tspan x="50" dy="1.5em">Polygon's interior depend of choosed rule</tspan>
<tspan x="50" dy="1.5em">We draw polygon with the two rules for fill</tspan>
<tspan x="50" dy="1.5em">We try to calculate area :</tspan>
<tspan x="50" dy="1.5em">With trapezes or triangles, we get same result</tspan>
<tspan x="50" dy="1.5em" fill="red">But this result is false</tspan>

<tspan x="50" dy="2.5em">If method run, all parts of polygon must be</tspan>
<tspan x="50" dy="1.5em">more red than yellow</tspan>
<tspan x="50" dy="1.5em">By example, we can see in yellow</tspan>
<tspan x="50" dy="1.5em">left bottom triangle of polygon.</tspan>
</text>
