<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="325" y="125" width="351" height="251" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="372.156" y1="125" x2="675" y2="357.295" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">B</text>
<rect x="325" y="125" width="351" height="251" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="423" cy="164" r="4" fill="blue"/>
<circle id="p2" cx="599" cy="299" r="4" fill="blue"/>
<line id="v2" onmousedown="click=true" onmousemove="svg_lineparallel_move(evt)" x1="372.156" y1="125" x2="675" y2="357.295" style="stroke:red;stroke-width:3"/> 
</g>
<text x="20" y="20" font-size="14">How move line and keep direction in SVG?
<tspan x="20" dy="1.5em">Suppose that line is given by equation u * x + v * y + w = 0</tspan>
<tspan x="20" dy="1.5em">We calculate new equation when line pass by mouse position</tspan>
<tspan x="20" dy="1.5em">We have only to calculate w</tspan>
<tspan x="20" dy="2.5em">Script :</tspan>
<tspan x="20" dy="1.5em">// calcul for w</tspan>
<tspan x="20" dy="1.5em">xm = evt.clientX</tspan>
<tspan x="20" dy="1.5em">ym = evt.clientY</tspan>
<tspan x="20" dy="1.5em">w = - u * xm - v * ym</tspan>
<tspan x="20" dy="1.5em">// we clip this line to viewport</tspan>
<tspan x="20" dy="1.5em">// we call function clip_line()</tspan>
<tspan x="20" dy="1.5em">clip_line( u , v , w )</tspan>
<tspan x="20" dy="1.5em">// we get coordinates of points</tspan>
<tspan x="20" dy="1.5em">// in array clip_p</tspan>
<tspan x="20" dy="1.5em">// we give this new values in line object</tspan>
<tspan x="20" dy="1.5em">svgdoc = evt.target.ownerDocument</tspan>
<tspan x="20" dy="1.5em">MyLine = svgdoc.getElementById("MyLine")</tspan>
<tspan x="20" dy="1.5em">MyLine.setAttributeNS(null,"x1",clip_p[0][0])</tspan>
<tspan x="20" dy="1.5em">MyLine.setAttributeNS(null,"y1",clip_p[0][1])</tspan>
<tspan x="20" dy="1.5em">MyLine.setAttributeNS(null,"x2",clip_p[1][0])</tspan>
<tspan x="20" dy="1.5em">MyLine.setAttributeNS(null,"y2",clip_p[1][1])</tspan>
</text>
<text x="500" y="400" text-anchor="middle" fill="blue">Move red line with mouse</text> 
</svg>
