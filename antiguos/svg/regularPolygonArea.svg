<svg width="700" height="600" viewBox="0 0 700 600">
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<text x="20" y="20" font-size="14">Play with stars ...</text>
<circle id="envelop" cx="350" cy="300" r="200" fill="lightblue" stroke="blue" fill-opacity="0.2"/>
<polygon id="polygon" points="" fill="yellow" fill-opacity="0.2" stroke="blue"/>
<circle cx="350" cy="300" r="4" fill="blue"/>
<circle id="p1" onmousedown="click=true" onmousemove="svg_regularPolygonArea_move(evt)" cx="550" cy="300" r="4" fill="red"/>
</g>
<g id="compteur">
<text x="450" y="20">Change number of vertices</text>
<text id="sides_2" x="640" y="20" text-anchor="end">5</text>
<rect x="600" y="5" width="50" height="20" stroke="black" fill="none"/>
<rect x="650" y="5" width="20" height="20" stroke="black" fill="lightgray"/>
<path d="M652 7h18 l-9 6z"/>
<path d="M652 23h18 l-9 -6z"/>
<rect onclick="svg_change_sides(-1)" x="650" y="5" width="20" height="10" stroke="black" fill="white" fill-opacity="0"/>
<rect onclick="svg_change_sides(1)" x="650" y="15" width="20" height="10" stroke="black" fill="white" fill-opacity="0"/>
</g>
<g id="compteur" transform="translate(0,25)">
<text x="445" y="20">Change step to join vertices</text>
<text id="step_2" x="640" y="20" text-anchor="end">2</text>
<rect x="600" y="5" width="50" height="20" stroke="black" fill="none"/>
<rect x="650" y="5" width="20" height="20" stroke="black" fill="lightgray"/>
<path d="M652 7h18 l-9 6z"/>
<path d="M652 23h18 l-9 -6z"/>
<rect onclick="svg_change_step(-1)" x="650" y="5" width="20" height="10" stroke="black" fill="white" fill-opacity="0"/>
<rect onclick="svg_change_step(1)" x="650" y="15" width="20" height="10" stroke="black" fill="white" fill-opacity="0"/>
</g>
</svg>