<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="50" height="50" patternUnits="userSpaceOnUse">
	<rect width="50" height="50" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
<g id="system2">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:1"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:1"/> 
    <circle cx="0" cy="0" r="1.5" stroke="black"/>
</g>
</defs>
 <rect width="700" height="600" fill="white"/>
  <text x="20" y="20" font-size="15">
    How calculate values for angle C = angle A + angle B
  </text>
<g onmouseup="click=false">
<rect x="20" y="100" width="660" height="300" fill="url(#Pat01)" stroke="black"/>
<circle cx="100" cy="300" r="50" fill="none" stroke="green"/>
<use x="100" y="300" xlink:href="#system" fill="green"/>
<text x="20" y="90" fill="red">Move red circles to change values of angles</text>
<text x="50" y="120">A : <tspan id="ag1"> 0 </tspan> degrees</text>
<text x="50" y="140">cos ( A ) : <tspan id="cos1"> 1 </tspan></text>
<text x="50" y="160">sin ( A ) : <tspan id="sin1"> 0 </tspan></text>
<text x="50" y="180">tan ( A ) : <tspan id="tan1"> 0 </tspan></text>

<circle cx="250" cy="300" r="50" fill="none" stroke="green"/>
<use x="250" y="300" xlink:href="#system" fill="green"/>
<text x="200" y="120">B : <tspan id="ag2"> 0 </tspan> degrees</text>
<text x="200" y="140">cos ( B ) : <tspan id="cos2"> 1 </tspan></text>
<text x="200" y="160">sin ( B ) : <tspan id="sin2"> 0 </tspan></text>
<text x="200" y="180">tan ( B ) : <tspan id="tan2"> 0 </tspan></text>

<circle cx="450" cy="300" r="50" fill="none" stroke="green"/>
<use x="450" y="300" xlink:href="#system" fill="green"/>
<text x="400" y="120">A + B : <tspan id="ag3"> 0 </tspan> degrees</text>
<text x="400" y="140">cos ( A + B ) : <tspan id="cos3"> 1 </tspan></text>
<text x="400" y="160">sin ( A + B ) : <tspan id="sin3"> 0 </tspan></text>
<text x="400" y="180">tan ( A + B ) : <tspan id="tan3"> 0 </tspan></text>

<circle id="p3" cx="500" cy="300" r="4" fill="green"/>

<g onmousedown="click=true" onmousemove="sumangles_move(evt)">
<circle id="p1" cx="150" cy="300" r="4" fill="red"/>
<circle id="p2" cx="300" cy="300" r="4" fill="red"/>
</g>
</g>
<text x="20" y="450">sin ( A + B ) = sin ( A ) * cos ( B ) + cos ( A ) * sin ( B )
<tspan x="20" dy="1.5em">cos ( A + B ) = cos ( A ) * cos ( B ) - sin ( A ) * sin ( B )</tspan>
<tspan x="20" dy="1.5em">tan ( A + B ) = ( tan ( A ) + tan ( B ) ) / ( 1 - tan ( A ) * tan ( B ) )</tspan>
</text>
</svg>  

