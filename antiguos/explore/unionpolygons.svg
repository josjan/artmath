<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
</defs>
<g onmouseup="interpolygons_up()">
<rect width="700" height="600" fill="url(#Pat01)"/>
<polygon id="polygo1" points="225,150 175,300 350,425 450,275 425,175" stroke="black" fill="red" fill-opacity="0.1"/>
<polygon id="polygo2" points="225,150 175,300 350,425 450,275 425,175" stroke="black" fill="green" fill-opacity="0.1"/>
<path id="polygo3" d="M 0 0" stroke="red" fill="yellow" fill-opacity="0.6"/>
<g id="main">
<g id="names">
</g>
</g>
<rect width="700" height="600" fill="white" fill-opacity="0"/>
<g id="pts" onmousedown="interpolygons_click()" onmousemove="interpolygons_move(evt)">
</g>
</g>
<circle cx="50" cy="520" r="6" fill="white" stroke="black"/>
<text x="70" y="525">Intersection</text>
<circle cx="50" cy="545" r="6" fill="white" stroke="black"/>
<text x="70" y="550">Union</text>
<circle id="choice" cx="50" cy="545" r="3" fill="black" stroke="black"/>
<rect onclick="interpolygons_choice(0)" x="40" y="510" width="20" height="20" fill="white" fill-opacity="0"/>
<rect onclick="interpolygons_choice(1)" x="40" y="535" width="20" height="20" fill="white" fill-opacity="0"/>
<text x="420" y="525" text-anchor="middle">Add point P</text>
<rect onclick="interpolygons_addpoint(1)" x="370" y="510" width="100" height="20" fill="red" fill-opacity="0.2"/>
<text x="420" y="550" text-anchor="middle">Remove point P</text>
<rect onclick="interpolygons_removepoint(1)" x="370" y="535" width="100" height="20" fill="red" fill-opacity="0.2"/>
<text x="540" y="525" text-anchor="middle">Add point Q</text>
<rect onclick="interpolygons_addpoint(2)" x="490" y="510" width="100" height="20" fill="red" fill-opacity="0.2"/>
<text x="540" y="550" text-anchor="middle">Remove point Q</text>
<rect onclick="interpolygons_removepoint(2)" x="490" y="535" width="100" height="20" fill="red" fill-opacity="0.2"/>
</svg>