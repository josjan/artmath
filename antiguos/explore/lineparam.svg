<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="25" y="125" width="651" height="451" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="200" y1="400" x2="400" y2="200" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="200" y="400" dx="-20" dy="-10">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="200" dx="-20" dy="-10">B</text>
<text id="m" style="text-anchor:middle;font-size:20;fill:blue" x="250" y="300" dx="-20" dy="-10">M</text>
<text x="20" y="20" font-size="15">Coordinates A : <tspan id="xya"> 6 ; -6 </tspan></text>
<text x="20" y="40" font-size="15">Coordinates B : <tspan id="xyb"> 10 ; 2 </tspan></text>
<text x="320" y="20" font-size="15">Vector Vx : <tspan id="vxt"> 4 </tspan></text>
<text x="320" y="40" font-size="15">Vector Vy : <tspan id="vyt"> 8 </tspan></text>
<text x="20" y="60" font-size="15">Line (AB) equation parametric : 
<tspan x="20" dy="20" id="utx">x = k * t + a</tspan>
<tspan x="20" dy="20" id="uty">y = h * t + b </tspan>
</text>
<text x="320" y="80" font-size="15" fill="blue">Value of t for M : <tspan id="utm"> 4 </tspan></text>
<text x="320" y="115" font-size="12" fill="red">Move M to see value of parameter t</text>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<g onmousedown="click=true" onmousemove="lineparam_move(evt)">
<circle id="p1" cx="200" cy="400" r="4" fill="red"/>
<circle id="p2" cx="300" cy="200" r="4" fill="red"/>
<circle id="p3" cx="250" cy="300" r="4" fill="red"/>
</g>
</g>
</svg>