<path id="axe" d="M 500 10 300 110" style="stroke:black; fill:none" marker-end="url(#endArrow)"/>
<text x="50" y="40">transform="translate(<tspan id="angle_val">-200,-100</tspan>)"</text>
<circle id="A" cx="500" cy="10" r="3" style="stroke:red; fill:red"/>
<circle id="B" cx="300" cy="110" r="3" style="stroke:red; fill:red"/>
<circle id="C" cx="350" cy="250" r="3" style="stroke:red; fill:red"/>
