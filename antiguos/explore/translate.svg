<svg width="800" height="600">
<defs>
<marker id="endArrow" viewBox="-20 -10 20 20" markerUnits="userSpaceOnUse"
            refX="0" refY="0" markerWidth="20" markerHeight="20" orient="auto">
      <path d="M-20,-10 L0,0 -20,10 z"/>
</marker>
</defs>

<g onmousedown="trans_cliquer(evt)" onmousemove="trans_bouger(evt)" onmouseup="appui=false">

<rect id="bkgrnd" x="0" y="0" width="800" height="600" style="fill:#E0E0E0"/> 
<text x="300" y="520">Matrix : </text>
<g text-anchor="middle" transform="translate(0,500)">
<text id="matrix_a" x="380" y="20"> : </text>
<text id="matrix_c" x="450" y="20"> : </text>
<text id="matrix_e" x="520" y="20"> : </text>
