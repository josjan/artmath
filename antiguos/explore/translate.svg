<text id="matrix_d" x="450" y="50"> : </text>
<text id="matrix_f" x="520" y="50"> : </text>
</g>
<path id="objet" d="M 350 250 450 320 550 290 400 100 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
