<circle id="C1" cx="250" cy="250" r="3" style="stroke:blue; fill:blue"/>
<circle id="D1" cx="150" cy="320" r="3" style="stroke:blue; fill:blue"/>
<circle id="E1" cx="50" cy="290" r="3" style="stroke:blue; fill:blue"/>
