<svg width="600" height="500" viewBox="0 0 600 500">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="600" height="500" fill="url(#Pat01)"/>
<line id="v1" marker-end="url(#Marker01)" x1="300" y1="250" x2="425" y2="150" style="stroke:black;stroke-width:3"/> 
<line id="v2" marker-end="url(#Marker01)" x1="300" y1="250" x2="175" y2="350" style="stroke:black;stroke-width:3"/> 
<line id="v1b" x1="200" y1="350" x2="425" y2="150" style="stroke:green;stroke-width:1"/> 
<line id="v2b" x1="200" y1="350" x2="175" y2="350" style="stroke:green;stroke-width:1"/> 
<line id="v1c" x1="200" y1="350" x2="425" y2="150" style="stroke:green;stroke-width:1"/> 
<line id="v2c" x1="200" y1="350" x2="175" y2="350" style="stroke:green;stroke-width:1"/> 
<line id="v3" marker-end="url(#blue)" x1="200" y1="350" x2="175" y2="350" style="stroke:blue;stroke-width:3"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="200" y="400" dx="-20" dy="-10">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="200" dx="20" dy="-10">B</text>
<text id="c" style="text-anchor:middle;font-size:20;fill:blue" x="200" y="400" dx="-20" dy="-10">C</text>
<text id="d" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="200" dx="20" dy="-10">O</text>
<text x="20" y="20" font-size="15">System of linear equations :</text>
<text x="20" y="40" font-size="15">First equation : <tspan id="vxt" x="180"> 8 </tspan> * x</text>
<text x="20" y="60" font-size="15">Second equation : <tspan id="vyt" x="180"> 8 </tspan> * x </text>
<text x="280" y="40" font-size="15"><tspan id="vxt2"> 8 </tspan> * y</text>
<text x="280" y="60" font-size="15"><tspan id="vyt2"> 8 </tspan> * y</text>
<text x="380" y="40" font-size="15"> = <tspan id="vxs" dx="20"> 8 </tspan></text>
<text x="380" y="60" font-size="15"> = <tspan id="vys" dx="20"> 8 </tspan></text>
<text x="20" y="80" font-size="15" fill="blue">Solution : x = <tspan id="sx"> 8 </tspan>  and  y = <tspan id="sy"> 8 </tspan></text>
<text x="20" y="480" font-size="15">Solve system is find scalars x and y so vector OC = x * vector OA + y * vector OB</text>
<g onmousedown="click=true" onmousemove="systvect_move(evt)">
<circle id="p0" cx="200" cy="350" r="4" fill="red"/>
<circle id="p1" cx="300" cy="200" r="4" fill="red"/>
<circle id="p2" cx="400" cy="100" r="4" fill="red"/>
<circle id="p3" cx="300" cy="200" r="4" fill="red"/>
</g>
</g>
</svg>