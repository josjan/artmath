<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="url(#Pat01)"/>
<use x="50" y="250" xlink:href="#system" fill="blue"/>
<text x="20" y="20" font-size="15">Areas for triangles : <tspan id="area_t" font-size="12">1</tspan> </text>
<text x="20" y="40" font-size="15">Area for polygone : <tspan id="area">1</tspan> </text>
<text x="20" y="60" font-size="15">Perimeter for polygone : <tspan id="peri">1</tspan> </text>
<g id="name_pts">
<text id="n0" style="text-anchor:middle;font-size:15;fill:blue" x="200" y="400" dx="-15" dy="-10">A</text>
<text id="n1" style="text-anchor:middle;font-size:15;fill:blue" x="200" y="400" dx="-15" dy="-10">P<tspan baseline-shift="sub" font-size="9">1</tspan></text>
<text id="n2" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="200" dx="15" dy="-10">P<tspan baseline-shift="sub" font-size="9">2</tspan></text>
<text id="n3" style="text-anchor:middle;font-size:15;fill:blue" x="200" y="400" dx="15" dy="-10">P<tspan baseline-shift="sub" font-size="9">3</tspan></text>
<text id="n4" style="text-anchor:middle;font-size:15;fill:blue" x="200" y="400" dx="15" dy="15">P<tspan baseline-shift="sub" font-size="9">4</tspan></text>
<text id="n5" style="text-anchor:middle;font-size:15;fill:blue" x="200" y="400" dx="15" dy="15">P<tspan baseline-shift="sub" font-size="9">5</tspan></text>
</g>
<g id="coordo">
<text id="t0" x="20" y="485">Coordinates A : <tspan id="c0"> 6 ; -6 </tspan></text>
<text id="t1" x="20" y="500">Coordinates P<tspan baseline-shift="sub" font-size="9">1</tspan> : <tspan id="c1"> 6 ; -6 </tspan></text>
<text id="t2" x="20" y="515">Coordinates P<tspan baseline-shift="sub" font-size="9">2</tspan> : <tspan id="c2"> 14 ; 2 </tspan></text>
<text id="t3" x="20" y="530">Coordinates P<tspan baseline-shift="sub" font-size="9">3</tspan> : <tspan id="c3"> 6 ; -6 </tspan></text>
<text id="t4" x="20" y="545">Coordinates P<tspan baseline-shift="sub" font-size="9">4</tspan> : <tspan id="c4"> 6 ; -6 </tspan></text>
<text id="t5" x="20" y="560">Coordinates P<tspan baseline-shift="sub" font-size="9">5</tspan> : <tspan id="c5"> 6 ; -6 </tspan></text>
</g>
<polygon id="polygo" points="225,150 175,300 350,425 450,275 425,175" stroke="black" fill="none"/>
<g id="tri">
<path id="tr1" d="M50 250L225 150 175 300z" fill="red" fill-opacity="0.2" stroke="gray"/>
<path id="tr2" d="M50 250L175 300 350 425z" fill="red" fill-opacity="0.2" stroke="gray"/>
<path id="tr3" d="M50 250L350 425 450 275z" fill="red" fill-opacity="0.2" stroke="gray"/>
<path id="tr4" d="M50 250L450 275 425 175z" fill="red" fill-opacity="0.2" stroke="gray"/>
<path id="tr5" d="M50 250L425 175 225 150z" fill="red" fill-opacity="0.2" stroke="gray"/>
</g>
<rect width="700" height="600" fill="white" fill-opacity="0"/>
<g id="pts" onmousedown="click=true" onmousemove="polygonArea_move(evt)">
<circle id="p0" cx="50" cy="250" r="4" fill="red"/>
<circle id="p1" cx="300" cy="200" r="4" fill="red"/>
<circle id="p2" cx="400" cy="100" r="4" fill="red"/>
<circle id="p3" cx="300" cy="200" r="4" fill="red"/>
<circle id="p4" cx="300" cy="200" r="4" fill="red"/>
<circle id="p5" cx="300" cy="200" r="4" fill="red"/>
</g>
</g>
<text x="540" y="525" text-anchor="middle">Add vertice</text>
<rect onclick="polygonArea_addpoint()" x="490" y="510" width="100" height="20" fill="red" fill-opacity="0.2"/>
<text x="540" y="550" text-anchor="middle">Remove vertice</text>
<rect onclick="polygonArea_removepoint()" x="490" y="535" width="100" height="20" fill="red" fill-opacity="0.2"/>
</svg>