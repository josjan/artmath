<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="url(#Pat01)"/>
<use xlink:href="#system" x="50" y="250"/>
<line x1="0" y1="300" x2="700" y2="300" style="stroke:black;stroke-width:3"/> 
<line id="ka" x1="200" y1="300" x2="200" y2="400" style="stroke:green;stroke-width:2"/> 
<line id="kb" x1="400" y1="300" x2="400" y2="200" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:15" x="200" y="400" dx="-20">k<tspan baseline-shift="sub" font-size="10">A</tspan></text>
<text id="b" style="text-anchor:middle;font-size:15" x="400" y="300" dx="20">k<tspan baseline-shift="sub" font-size="10">B</tspan></text>
<text id="g" style="text-anchor:middle;font-size:15" x="400" y="300" dy="-15">G</text>
<text style="text-anchor:middle;font-size:15;fill:blue" x="200" y="300" dx="-15" dy="-5">A</text>
<text style="text-anchor:middle;font-size:15;fill:blue" x="400" y="300" dx="-15" dy="-5">B</text>
<text x="20" y="20" font-size="15">Coordinates A : 6 , - 2</text>
<text x="20" y="40" font-size="15">Coordinates B : 14 , - 2</text>
<text x="220" y="20" font-size="15">Ratio for A : <tspan id="kat"> -4 </tspan></text>
<text x="220" y="40" font-size="15">Ratio for B : <tspan id="kbt"> 4 </tspan></text>
<text x="380" y="20" font-size="15">Barycenter G : <tspan id="vxt"> 8 </tspan> , - 2</text>
<path id="trace" d="M400 450 L400 250 L200 350 M400 450 L100 300" style="stroke:green;stroke-width:2;fill:none;stroke-dasharray:3 3"/>
<circle cx="200" cy="300" r="4" fill="black"/>
<circle cx="400" cy="300" r="4" fill="black"/>
<circle id="p3" cx="300" cy="300" r="4" fill="black"/>
<g onmousedown="click=true" onmousemove="barycenter_move(evt)">
<circle id="p1" cx="200" cy="400" r="4" fill="red"/>
<circle id="p2" cx="400" cy="200" r="4" fill="red"/>
</g>
</g>
</svg>