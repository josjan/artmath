<svg width="700" height="600" viewBox="0 0 700 600">
 <defs>
<pattern id="Pat01" width="50" height="50" patternUnits="userSpaceOnUse">
	<rect width="50" height="50" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
 <rect width="700" height="600" fill="white"/>
  <text x="20" y="20" font-size="15">
    Here is a simple mathematical function: y(x) = sin(x)
 <tspan x="20" dy="1.5em">To draw graph, we calculate values of y and join points by line ( red graph )</tspan>
 <tspan x="20" dy="1.5em">To draw graph, we calculate values of y and join points by Bezier's cubic ( blue graph )</tspan>
 </text>

   <rect x="20" y="100" width="660" height="200" fill="url(#Pat01)" stroke="black"/>
    <use x="350" y="200" xlink:href="#system" fill="blue"/>
    <path id="graphcompare" d="M0,0 500,0" stroke="blue" stroke-width="2" fill="none" />
    <path id="graph2compare" d="M0,0 500,0" stroke="red" stroke-width="2" fill="none" />
    <path id="graphPntscompare" d="M0,0 Z" stroke="gold" stroke-width="4" stroke-linecap="round" fill="none" />

<g id="compteur" transform="translate(0,350)">
<text x="460" y="20">Step for calculation is Pi / </text>
<text id="step" x="640" y="20" text-anchor="end">4</text>
<rect x="600" y="5" width="50" height="20" stroke="black" fill="none"/>
<rect x="650" y="5" width="20" height="20" stroke="black" fill="lightgray"/>
<path d="M652 7h18 l-9 6z"/>
<path d="M652 23h18 l-9 -6z"/>
<rect onclick="compareInterpo_change_step(-1)" x="650" y="5" width="20" height="10" stroke="black" fill="white" fill-opacity="0"/>
<rect onclick="compareInterpo_change_step(1)" x="650" y="15" width="20" height="10" stroke="black" fill="white" fill-opacity="0"/>
</g>


</svg>
