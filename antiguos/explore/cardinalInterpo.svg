<svg width="700" height="600"  viewBox="0 0 700 600">
  <rect width="700" height="600" fill="white"/>
  <text x="350" y="30" style="fill:black;text-anchor:middle;font-size:16">Cardinal Spline</text>

  <text x="350" y="80" font-size="15" text-anchor="middle" font-style="italic">
    <tspan x="350" dy="0em">A set of data points interpolated by Cardinal spline segments.</tspan>
  </text>

  <g transform="translate(100,130)">
    <rect x="-10" y="-10" width="520" height="120" fill="gainsboro" stroke="black"/>
    <path id="cardinal" d="M20,70 130,50 190,80 300,10 360,70 420,60 480,90" stroke="darkblue" stroke-width="2" fill="none" />
    <path d="M20,70 Z M130,50 Z M190,80 Z M300,10 Z M360,70 Z M420,60 Z M480,90Z" stroke="maroon" stroke-width="6" stroke-linecap="round" fill="none" />
  </g>

  <text x="205" y="275" font-size="16">s = 0</text>
  <text x="470" y="275" font-size="16">1</text>
  <g id="slider" transform="translate(250,260)">
		<rect x="0" y="0" width="210" height="20" style="fill:#c0c0c0" />
    <line style="stroke:black;stroke-width:2;" x1="5" y1="6" x2="205" y2="6" />
    <line style="stroke:white;stroke-width:2;" x1="5" y1="8" x2="205" y2="8" />
    <path style="stroke:black;fill:none;" d="M5,16 5,20 M25,16 25,20 M45,16 45,20 M65,16 65,20 M85,16 85,20 M105,16 105,20 M125,16 125,20 M145,16 145,20 M165,16 165,20 M185,16 185,20 M205,16 205,20" />
    <g id="thumb" transform="translate(100,0)">
      <path style="stroke:none;fill:#c0c0c0;" d="M1,2 1,12 5,15 9,12 9,2 Z" />
      <path style="stroke:white;fill:none;" d="M9,1 1,1 1,11" />
      <path style="stroke:black;fill:none;" d="M5,16 10,12 10,2" />
    </g>
  </g>

  <text x="100" y="350" font-size="16">
    <tspan>function CardinalTangents(x, y, dx, dy, s) {</tspan>
    <tspan x="100" dy="1em">var n = x.length;</tspan>
    <tspan x="100" dx="1em" dy="1em">for (var i=1; i &lt; n-1; i++) {</tspan>
    <tspan x="100" dx="2em" dy="1em">dx[i] = (x[i+1] - x[i-1])*s;</tspan>
    <tspan x="100" dx="2em" dy="1em">dy[i] = (y[i+1] - y[i-1])*s;</tspan>
    <tspan x="100" dx="1em" dy="1em">}</tspan>
    <tspan x="100" dx="1em" dy="1em">dx[0]   = 0.5*(3*(x[1]-x[0]) - dx[1]);</tspan>
    <tspan x="100" dx="1em" dy="1em">dy[0]   = 0.5*(3*(y[1]-y[0]) - dy[1]);</tspan>
    <tspan x="100" dx="1em" dy="1em">dx[n-1] = 0.5*(3*(x[n-1]-x[n-2]) - dx[n-2]);</tspan>
    <tspan x="100" dx="1em" dy="1em">dy[n-1] = 0.5*(3*(y[n-1]-y[n-2]) - dy[n-2]);</tspan>
    <tspan x="100" dx="0em" dy="1em">}</tspan>
  </text>


</svg>
