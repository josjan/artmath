<tspan x="20" dy="1em">if (sum_x == 0)</tspan>
<tspan x="40" dy="1em">alert("You win!")</tspan>
<tspan x="20" dy="1em">else</tspan>
<tspan x="40" dy="1em">alert("x-coordinate of your sum is not 0")</tspan>
