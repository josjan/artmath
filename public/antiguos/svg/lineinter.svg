<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="325" y="125" width="351" height="251" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="372.156" y1="125" x2="675" y2="357.295" style="stroke:green;stroke-width:2"/> 
<line id="v2" x1="372.156" y1="125" x2="675" y2="357.295" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="-5" startOffset="0">C</text>
<text id="d" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">D</text>
<text id="m" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">M</text>
<circle id="p5" cx="423" cy="164" r="4" fill="blue"/>
<rect x="325" y="125" width="351" height="251" fill="yellow" fill-opacity="0.1"/>
<g onmousedown="click=true" onmousemove="svg_lineinter_move(evt)">
<circle id="p1" cx="423" cy="164" r="4" fill="red"/>
<circle id="p2" cx="599" cy="299" r="4" fill="red"/>
<circle id="p3" cx="423" cy="164" r="4" fill="red"/>
<circle id="p4" cx="599" cy="299" r="4" fill="red"/>
</g>
</g>
<text x="20" y="20" font-size="14">How draw intersection of lines in SVG?
<tspan x="20" dy="1.5em">Suppose that line AB is given by equation u1 * x + v1 * y + w1 = 0</tspan>
<tspan x="20" dy="1.5em">Suppose that line CD is given by equation u2 * x + v2 * y + w2 = 0</tspan>
<tspan x="20" dy="1.5em">We search intersection for lines</tspan>
<tspan x="20" dy="2em">Script</tspan>
<tspan x="20" dy="1.5em">// we solve linear system</tspan>
<tspan x="20" dy="1.5em">// u1 * x + v1 * y = - w1</tspan>
<tspan x="20" dy="1.5em">// u2 * x + v2 * y = - w2</tspan>
<tspan x="20" dy="1.5em">// calcul of determinant to begin</tspan>
<tspan x="20" dy="1.5em">det = u1 * v2 - u2 * v1</tspan>
<tspan x="20" dy="1.5em">// if determinant is not null, we can continue</tspan>
<tspan x="20" dy="1.5em">if ( det != 0 )</tspan>
<tspan x="20" dy="1.5em">{</tspan>
<tspan x="40" dy="1.5em">xM = ( v1 * w2 - v2 * w1 ) / det</tspan>
<tspan x="40" dy="1.5em">yM = ( u2 * w1 - u1 * w2 ) / det</tspan>
<tspan x="20" dy="1.5em">}</tspan>
<tspan x="20" dy="3em">// we place M ( it's a circle element )</tspan>
<tspan x="20" dy="1.5em">MyPoint = evt.target.ownerDocument.getElementById("MyPoint")</tspan>
<tspan x="20" dy="1.5em">MyPoint.setAttributeNS(null,"cx",xM)</tspan>
<tspan x="20" dy="1.5em">MyPoint.setAttributeNS(null,"cy",yM)</tspan>

</text>
</svg>
