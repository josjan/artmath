<svg width="600" height="600" >
<g onmouseup="click=false">
<rect x="0" y="0" width="600" height="600" style="fill:white"/> 
<text x="20" y="20" style="text-anchor:left">Quadratic Bezier : construction with barycentres</text>
<text x="20" y="40" startOffset="0">Coefficients for barycenters : <tspan id="code"> 0.66 ; 0.33</tspan></text>
<path d="M69 310 L154 71 L515 310" style="stroke:green;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<path id="tang2" d="M97 229 L274 150" style="stroke:red;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<circle id="D1" cx="97" cy="229" r="3" style="stroke:green; fill:green"/>
<circle id="D2" cx="274" cy="150" r="3" style="stroke:green; fill:green"/>
<circle id="D3" cx="155" cy="202" r="3" style="stroke:green; fill:blue"/>
<path d="M69 310Q154,71 515,310" style="stroke:blue;fill-opacity:0.3; fill:none"/>
<path d="M69 310 L515 310" style="stroke:green;fill-opacity:0.3; fill:none"/>
<circle id="A1" cx="69" cy="310" r="3" style="stroke:blue; fill:blue"/>
<text x="69" y="309" dx="-15">A</text>
<circle id="C1" cx="154" cy="71" r="3" style="stroke:blue; fill:blue"/>
<text x="154" y="71" dx="-15">B</text>
<circle id="A2" cx="515" cy="310" r="3" style="stroke:blue; fill:blue"/>
<text x="515" y="310" dx="5">C</text>
<g onmousedown="click=true" onmousemove="barycenter_svg_move(evt)">
<circle id="B1" cx="217" cy="310" r="4" style="stroke:red; fill:red"/>
</g>
<text id="m" x="217" y="310" dy="15">m</text>
<text id="P" x="97" y="229" dx="-15">P</text>
<text id="Q" x="274" y="150" dx="5">Q</text>
<text id="M" x="155" y="202" dx="-15">M</text>
</g>
<text x="20" y="340" fill="green">Move m on AC to change value of k and see how M describe Bezier curve</text>

<text x="20" y="360">Construction :
<tspan x="20" dy="1.5em">Bezier quadratic is defined by three points A B and C. B is control point.</tspan>
<tspan x="20" dy="1.5em">For a value of k, we place point P barycenter of A ( 1 - k ) and B ( k )</tspan>
<tspan x="20" dy="1.5em">We place point Q barycenter of B ( 1 - k ) and C ( k )</tspan>
<tspan x="20" dy="1.5em">We place point M barycenter of P ( 1 - k ) and Q ( k )</tspan>
<tspan x="20" dy="1.5em">When k take values from 0 to 1, M describe the blue curve, a Bezier quadratic</tspan>
<tspan x="20" dy="1.5em">It's easy to find parametric equation for this curve</tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">P</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">A</tspan> + k * x<tspan baseline-shift="sub" font-size="10">B</tspan> ; y<tspan baseline-shift="sub" font-size="10">P</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">A</tspan> + k * y<tspan baseline-shift="sub" font-size="10">B</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">Q</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">B</tspan> + k * x<tspan baseline-shift="sub" font-size="10">C</tspan> ; y<tspan baseline-shift="sub" font-size="10">Q</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">B</tspan> + k * y<tspan baseline-shift="sub" font-size="10">C</tspan></tspan>
<tspan x="20" dy="1.5em">x<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">P</tspan> + k * x<tspan baseline-shift="sub" font-size="10">P</tspan> ; y<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">P</tspan> + k * y<tspan baseline-shift="sub" font-size="10">Q</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue" >x<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">A</tspan> + 2 * k * ( 1 - k ) * x<tspan baseline-shift="sub" font-size="10">B</tspan> + k<tspan baseline-shift="super" font-size="10">2</tspan> * x<tspan baseline-shift="sub" font-size="10">C</tspan> ; y<tspan baseline-shift="sub" font-size="10">M</tspan> = ( 1 - k )<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">A</tspan> + 2 * k * ( 1 - k ) * y<tspan baseline-shift="sub" font-size="10">B</tspan> + k<tspan baseline-shift="super" font-size="10">2</tspan> * y<tspan baseline-shift="sub" font-size="10">C</tspan></tspan>
<tspan x="20" dy="1.5em">A Bezier's quadratic is a parabola !</tspan>

</text>

</svg>
