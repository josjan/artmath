<svg width="600" height="600" viewBox="0 50 600 600">
<g onmouseup="click=false">
<rect id="bkgrnd" x="0" y="0" width="600" height="650" style="fill:white"/> 
<circle cx="535" cy="465" r="50" stroke="black" fill="none"/>
<circle cx="535" cy="465" r="3" stroke="black" fill="black"/>
<circle cx="585" cy="465" r="3" stroke="black" fill="black"/>
<line id="rxx" x1="20" y1="580" x2="120" y2="580" stroke="black" stroke-width="2"/>
<line id="ryy" x1="20" y1="580" x2="20" y2="500" stroke="black" stroke-width="2"/>
<text x="300" y="70" style="text-anchor:middle">Four possible arcs</text>
<text id="code" x='10' y='90'>Code for path : M200 300A100 80 0 0 0 300 200</text>
<rect x="0" y="0" width="600" height="100" opacity="0"/>
<path id="arc0" d="M200 300A100 80 0 0 0 300 200" stroke="red" fill="none"/>
<path id="arc1" d="M200 300A100 80 0 0 1 300 200" stroke="blue" fill="none"/>
<path id="arc2" d="M200 300A100 80 0 1 0 300 200" stroke="blue" fill="none"/>
<path id="arc3" d="M200 300A100 80 0 1 1 300 200" stroke="blue" fill="none"/>
<g onmousedown="click=true" onmousemove="arc_svg_move(evt)"> 
<circle id="A1" cx="200" cy="300" r="4" style="stroke:green; fill:red"/>
<circle id="A2" cx="300" cy="200" r="4" style="stroke:red; fill:red"/>
<circle id="C1" cx="120" cy="580" r="4" style="stroke:red; fill:red"/>
<circle id="C2" cx="20" cy="500" r="4" style="stroke:red; fill:red"/>
<circle id="C3" cx="585" cy="465" r="4" style="stroke:red; fill:red"/>
</g>
<circle cx="20" cy="580" r="3" style="stroke:black; fill:black"/>
<text x="50" y="575">rx</text>
<text x="30" y="540">ry</text>
<text x="500" y="540" text-anchor="end">x-axis-rotation</text>
<text id="axis" x="510" y="540">0 degrees</text>
<text x="500" y="560" text-anchor="end">large-arc-flag</text>
<text x="500" y="580" text-anchor="end">sweep-flag</text>
<circle cx="520" cy="555" r="5" fill="white" stroke="black"/>
<text x="530" y="560">0</text>
<circle cx="550" cy="555" r="5" fill="white" stroke="black"/>
<text x="560" y="560">1</text>
<circle cx="520" cy="575" r="5" fill="white" stroke="black"/>
<text x="530" y="580">0</text>
<circle cx="550" cy="575" r="5" fill="white" stroke="black"/>
<text x="560" y="580">1</text>
<circle id="sf" cx="520" cy="575" r="3" fill="black"/>
<circle id="lf" cx="520" cy="555" r="3" fill="black"/>
<g onclick="arc_svg_choix(evt)">
<rect id="lf0" x="514" y="548" width="25" height="14" pointer-events="visible" fill="none"/>
<rect id="lf1" x="544" y="548" width="25" height="14" pointer-events="visible" fill="none"/>
<rect id="sf0" x="514" y="568" width="25" height="14" pointer-events="visible" fill="none"/>
<rect id="sf1" x="544" y="568" width="25" height="14" pointer-events="visible" fill="none"/>
</g>
<circle id="D1" cx="297" cy="280" r="3" fill="green"/>
<circle id="D2" cx="203" cy="220" r="3" fill="green"/>
<text x="10" y="610">If rx , ry and x-axis-rotation values are such that there is no solution (basically, the ellipse is not big enough 
</text>
<text x="10" y="625">to reach from (x1, y1) to (x2, y2)) then the ellipse is scaled up uniformly until there is exactly one solution  
</text>
<text x="10" y="640">(until the ellipse is just big enough). Extract of W3C specifications on how to render elliptical arc
</text>
</g>
</svg>

