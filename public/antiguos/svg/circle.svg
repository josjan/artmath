<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="325" y="125" width="351" height="251" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="-5" startOffset="0">C</text>
<text id="d" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="14" dy="-5" startOffset="0">w</text>
<circle id="p4" cx="423" cy="164" r="4" fill="blue"/>
<circle id="circ" cx="423" cy="164" r="4" fill="none" stroke="green"/>
<rect x="325" y="125" width="351" height="251" fill="yellow" fill-opacity="0.1"/>
<g onmousedown="click=true" onmousemove="svg_circle_move(evt)">
<circle id="p1" cx="423" cy="164" r="4" fill="red"/>
<circle id="p2" cx="599" cy="299" r="4" fill="red"/>
<circle id="p3" cx="423" cy="164" r="4" fill="red"/>
</g>
</g>
<text x="20" y="20" font-size="14">How draw circle by 3 points in SVG?
<tspan x="20" dy="1.5em">We know coordinates of A B and C</tspan>
<tspan x="20" dy="2em">Script</tspan>
<tspan x="20" dy="1.5em">// we calculate center coordinates x and y -  we use WA = WB</tspan>
<tspan x="20" dy="1.5em">// (xA - x)<tspan baseline-shift="super" font-size="8">2</tspan> + (yA - y)<tspan baseline-shift="super" font-size="8">2</tspan> = (xB - x)<tspan baseline-shift="super" font-size="8">2</tspan> + (yB - y)<tspan baseline-shift="super" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.5em">// we get first linear equation</tspan>
<tspan x="20" dy="1.5em">// ( xB - xA ) * x + ( yB - yA ) * y = </tspan>
<tspan x="20" dy="1.5em">// ( xB<tspan baseline-shift="super" font-size="8">2</tspan> + yB<tspan baseline-shift="super" font-size="8">2</tspan> - xA<tspan baseline-shift="super" font-size="8">2</tspan> - yA<tspan baseline-shift="super" font-size="8">2</tspan> ) / 2</tspan>
<tspan x="20" dy="1.5em">// we replace B by C and get second equation</tspan>
<tspan x="20" dy="1.5em">// ( xC - xA ) * x + ( yC - yA ) * y = </tspan>
<tspan x="20" dy="1.5em">// ( xC<tspan baseline-shift="super" font-size="8">2</tspan> + yC<tspan baseline-shift="super" font-size="8">2</tspan> - xA<tspan baseline-shift="super" font-size="8">2</tspan> - yA<tspan baseline-shift="super" font-size="8">2</tspan> ) / 2</tspan>
<tspan x="20" dy="1.5em">det = (xB - xA) * (yC - yA) - (xC - xA) * (yB - yA)</tspan>
<tspan x="20" dy="1.5em">if ( det != 0 )</tspan>
<tspan x="20" dy="1.5em">{</tspan>
<tspan x="40" dy="1.5em">w1 = (xB * xB + yB * yB - xA * xA - YA * yA) / 2</tspan>
<tspan x="40" dy="1.5em">w2 = (xC * xC + yC * yC - xA * xA - YA * yA) / 2</tspan>
<tspan x="40" dy="1.5em">x = ( (yB - yA) * w2 - (yC - yA) * w1 ) / det</tspan>
<tspan x="40" dy="1.5em">y = ( (xC - xA) * w1 - (xB - xA) * w2 ) / det</tspan>
<tspan x="40" dy="1.5em">r = Math.sqrt((x - XA) * (x - xA) + (y - yA) * (y - yA))</tspan>
<tspan x="20" dy="1.5em">// we put values in circle element</tspan>
<tspan x="40" dy="1.5em">MyCircle = evt.target.ownerDocument.getElementById("MyCircle")</tspan>
<tspan x="40" dy="1.5em">MyCircle.setAttributeNS(null,"cx",x)</tspan>
<tspan x="40" dy="1.5em">MyCircle.setAttributeNS(null,"cy",y)</tspan>
<tspan x="40" dy="1.5em">MyCircle.setAttributeNS(null,"r",r)</tspan>
<tspan x="20" dy="1.5em">}</tspan>

</text>
</svg>
