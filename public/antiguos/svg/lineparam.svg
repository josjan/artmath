<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="325" y="125" width="351" height="251" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="423" y1="164" x2="599" y2="299" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="423" y="164" dx="-14" dy="10" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="599" y="299" dx="-14" dy="10" startOffset="0">B</text>
<text id="m" style="text-anchor:middle;font-size:14;fill:blue" x="512" y="232" dx="14" dy="-5" startOffset="0">M</text>
<rect x="325" y="125" width="351" height="251" fill="yellow" fill-opacity="0.1"/>
<circle cx="423" cy="164" r="4" fill="blue"/>
<circle cx="599" cy="299" r="4" fill="blue"/>
<circle id="p1" onmousedown="click=true" onmousemove="svg_lineparam_move(evt)" cx="512" cy="232" r="4" fill="red"/>
</g>
<text x="20" y="20" font-size="14">How move a point on a segment in SVG?
<tspan x="20" dy="2em">We know coordinates of A and B</tspan>
<tspan x="20" dy="1.5em">We calculate ratio to put M between A and B</tspan>
<tspan x="20" dy="1.5em">and use parametric equation of line AB</tspan>
<tspan x="20" dy="2em">Script :</tspan>
<tspan x="20" dy="1.5em">xm = evt.clientX</tspan>
<tspan x="20" dy="1.5em">ym = evt.clientY</tspan>
<tspan x="20" dy="1.5em">// length for AM and MB </tspan>
<tspan x="20" dy="1.5em">l1 = Math.sqrt(</tspan>
<tspan x="20" dy="1.5em">(x3 - x1) * (x3 - x1) + (y3 - y1) * (y3 - y1))</tspan>
<tspan x="20" dy="1.5em">l2 = Math.sqrt(</tspan>
<tspan x="20" dy="1.5em">(x3 - x2) * (x3 - x2) + (y3 - y2) * (y3 - y2))</tspan>
<tspan x="20" dy="1.5em">// ratio</tspan>
<tspan x="20" dy="1.5em">k = l1 / (l1 + l2)</tspan>
<tspan x="20" dy="1.5em">// use parametric equation of AB to place M</tspan>
<tspan x="20" dy="1.5em">xm = x1 + k * (x2 - x1)</tspan>
<tspan x="20" dy="1.5em">ym = y1 + k * (y2 - y1)</tspan>
<tspan x="20" dy="1.5em">// we put this values for circle</tspan>
<tspan x="20" dy="1.5em">svgdoc = evt.target.ownerDocument</tspan>
<tspan x="20" dy="1.5em">point = svgdoc.getElementById("MyPoint")</tspan>
<tspan x="20" dy="1.5em">point.setAttributeNS(null, "cx", xm)</tspan>
<tspan x="20" dy="1.5em">point.setAttributeNS(null, "cy", ym)</tspan>

</text>
</svg>
