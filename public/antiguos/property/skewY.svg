<svg width="700" height="600" viewBox="-20 -20 700 600">
<rect x="-20" y="-20" width="700" height="600" style="fill:white"/> 
<path id="objet" d="M 88 67 77 25 347 47 369 117 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 88 118 77 70 347 249 369 332 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<circle id="F" cx="369" cy="117" r="3" style="stroke:red; fill:red"/>
<text x="369" y="117" dx="5">M</text>
<circle id="F1" cx="369" cy="332" r="3" style="stroke:blue; fill:blue"/>  
<text x="369" y="332" dx="5">M'</text>
<circle cx="0" cy="117" r="3" style="stroke:blue; fill:blue"/>  
<text x="0" y="117" dx="-15">m</text>
<text x="0" y="20" dx="-15">y-axis</text>
<path d="M0 -20v250" style="stroke:green;stroke-width:1;fill:none"/>

<path d="M0 117L369 117 L369 332z" style="stroke-dasharray:3 3;stroke:green;stroke-width:1;fill:none"/>
<text x="20" y="250" font-size="15" fill="black">SkewY 
<tspan x="20" dy="1.5em">Angle is A</tspan>
<tspan x="20" dy="1.5em">To draw M' image of M in transformation :</tspan>
<tspan x="20" dy="1.5em">- m is projected of M on y axis</tspan>
<tspan x="20" dy="1.5em">- we rotate line (mM) from angle A with m  as center</tspan>
<tspan x="20" dy="1.5em">- on this line we take point with same coordinate x than M</tspan>
<tspan x="20" dy="1.5em">For our example A is 30 degrees</tspan>
<tspan x="20" dy="1.5em">This transformation preserve only parallelism in shape</tspan>
<tspan x="20" dy="1.5em">To retrieve M from M', we have only to replace angle by - A</tspan>
<tspan x="20" dy="1.5em">If we composite two skewY, we get same transformation but angle is not sum of angles</tspan>
<tspan x="20" dy="1.5em">Angle is atan( 1 + tan( A ) * tan( B ) ) if A and B are angles of transformations</tspan>



</text>
</svg>
