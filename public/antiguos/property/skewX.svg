<svg width="700" height="600" viewBox="-20 -20 700 600">
<rect x="-20" y="-20" width="700" height="600" style="fill:white"/> 

<rect x="440" y="0" width="160" height="50" style="fill:white;fill-opacity:0"/>  
<path id="objet" d="M 360 213 470 249 502 133 352 63 z" style="stroke:blue;fill-opacity:0.3; fill:aqua"/>
<path id="image" d="M 147 213 221 249 369 133 289 63 z" style="stroke:red;fill-opacity:0.3; fill:maroon"/>
<circle cx="470" cy="249" r="3" style="stroke:red; fill:red"/>
<text x="470" y="249" dy="15">M</text>
<circle cx="221" cy="249" r="3" style="stroke:blue; fill:blue"/>
<text x="221" y="249" dy="15">M'</text>
<circle cx="470" cy="0" r="3" style="stroke:blue; fill:green"/>
<text x="470" y="0" dy="-10">m</text>
<path d="M-20 0h700" style="stroke:green;stroke-width:1;fill:none"/>
<text x="200" y="0" dy="15">x-axis</text>

<path d="M470 0L470 249 L221 249z" style="stroke-dasharray:3 3;stroke:green;stroke-width:1;fill:none"/>

<text x="20" y="250" font-size="15" fill="black">SkewX 
<tspan x="20" dy="1.5em">Angle is A</tspan>
<tspan x="20" dy="1.5em">To draw M' image of M in transformation :</tspan>
<tspan x="20" dy="1.5em">- m is projected of M on x axis</tspan>
<tspan x="20" dy="1.5em">- we rotate line (mM) from angle A with m  as center</tspan>
<tspan x="20" dy="1.5em">- on this line we take point with same coordinate y than M</tspan>
<tspan x="20" dy="1.5em">For our example A is 45 degrees</tspan>
<tspan x="20" dy="1.5em">This transformation preserve only parallelism in shape</tspan>
<tspan x="20" dy="1.5em">To retrieve M from M', we have only to replace angle by - A</tspan>
<tspan x="20" dy="1.5em">If we composite two skewX, we get same transformation but angle is not sum of angles</tspan>
<tspan x="20" dy="1.5em">Angle is atan( 1 + tan( A ) * tan( B ) ) if A and B are angles of transformations</tspan>



</text>
</svg>
