<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
<clipPath id="cache">
<rect x="25" y="125" width="651" height="451"/>
</clipPath>
<text id="infini" font-size="15">&#x221E;</text>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="25" y="125" width="651" height="451" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line x1="25" y1="350" x2="675" y2="350" style="stroke:green;stroke-width:2"/> 
<path id="cubic" clip-path="url(#cache)" d="M0 0" style="stroke:blue;stroke-width:2;fill:none"/> 
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="200" y="400" dx="-20" dy="-5">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="400" dx="-20" dy="-5">B</text>
<text id="c" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="400" dx="-20" dy="-5">C</text>
<text id="d" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="400" dx="-20" dy="-5">D</text>
<text x="20" y="20" font-size="15">Equation : <tspan id="u1"> </tspan> * x<tspan baseline-shift="super" font-size="9">3</tspan> <tspan id="v1"> </tspan> * x<tspan baseline-shift="super" font-size="9">2</tspan> <tspan id="w1"> </tspan> * x <tspan id="z1"> </tspan> &gt; 0</text>
<text x="20" y="40" font-size="15">Solution for x : <tspan id="sol1" fill="blue"> </tspan><tspan id="sol2" fill="blue"> </tspan><tspan id="sol3" fill="blue"> </tspan></text>
<g id="solu" visibility="hidden" clip-path="url(#cache)">
<circle id="p5" cx="400" cy="350" r="4" fill="blue"/>
<circle id="p6" cx="400" cy="350" r="4" fill="blue"/>
<circle id="p7" cx="400" cy="350" r="4" fill="blue"/>
<text id="m" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="350" dx="-20" dy="-5">M</text>
<text id="n" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="350" dx="-20" dy="-5">N</text>
<text id="p" style="text-anchor:middle;font-size:15;fill:blue" x="400" y="350" dx="-20" dy="-5">P</text>
</g>
<path id="sol_show" d="M0 0" clip-path="url(#cache)" style="stroke:blue;stroke-width:5;fill:none"/> 
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<g onmousedown="click=true" onmousemove="ineqdegre3_move(evt)">
<circle id="p1" cx="200" cy="400" r="4" fill="red"/>
<circle id="p2" cx="400" cy="400" r="4" fill="red"/>
<circle id="p3" cx="400" cy="400" r="4" fill="red"/>
<circle id="p4" cx="400" cy="400" r="4" fill="red"/>
</g>
</g>
</svg>