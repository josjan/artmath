<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="0" y="0" width="700" height="600" fill="url(#Pat01)"/>
<use x="350" y="300" xlink:href="#system" fill="blue"/>
<text id="a" style="text-anchor:middle;font-size:14;fill:blue" x="480" y="251" dx="-14" dy="-5" startOffset="0">w'</text>
<text id="b" style="text-anchor:middle;font-size:14;fill:blue" x="352" y="200" dx="14" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:14;fill:blue" x="133" y="301" dx="-14" dy="-5" startOffset="0">C</text>
<text id="w" style="text-anchor:middle;font-size:14;fill:blue" x="277" y="299" dx="14" dy="-5" startOffset="0">w</text>
<circle id="circ1" cx="277" cy="299" r="144.014" fill="red" stroke="red" fill-opacity="0.1"/>
<circle id="circ2" cx="277" cy="299" r="144.014" fill="green" stroke="green" fill-opacity="0.1"/>
<g id="inter" visibility="hidden">
<text id="e" style="text-anchor:middle;font-size:14;fill:blue" x="246.97" y="158.152" dx="14" dy="-5" startOffset="0">E</text>
<text id="f" style="text-anchor:middle;font-size:14;fill:blue" x="395.663" y="217.397" dx="14" dy="-5" startOffset="0">F</text>
<circle id="p5" cx="246.97" cy="158.152" r="4" fill="blue"/>
<circle id="p6" cx="395.663" cy="217.397" r="4" fill="blue"/>
</g>
