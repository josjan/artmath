<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
<clipPath id="cache">
<rect x="25" y="125" width="651" height="451"/>
</clipPath>
</defs>
<g onmouseup="click=false">
<rect width="700" height="600" fill="white"/>
<rect x="25" y="125" width="651" height="451" fill="url(#Pat01)"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line x1="25" y1="350" x2="675" y2="350" style="stroke:green;stroke-width:2"/> 
<line id="sec" x1="200" y1="350" x2="300" y2="350" style="stroke:blue;stroke-width:1"/> 
<line id="debline" x1="200" y1="125" x2="200" y2="575" style="stroke:green;stroke-width:2;stroke-dasharray:4 4"/> 
<path id="quadra" clip-path="url(#cache)" d="M 0 0" style="stroke:blue;stroke-width:2;fill:none"/> 
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="201" y="350" dx="-20" dy="-5" startOffset="0">A</text>
<text x="20" y="20" font-size="15" startOffset="0">Calcul from <tspan id="deb" fill="blue">-6</tspan> </text>
<text x="20" y="40" font-size="15" startOffset="0">Approximation for x : <tspan id="sol" fill="blue">-4</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">f(x) : <tspan id="f_x" fill="blue"> </tspan></text>
<circle id="p3" cx="200" cy="350" r="3" fill="blue"/>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<g onmousedown="click=true" onmousemove="newton_move(evt)">
<circle id="p1" cx="200" cy="350" r="4" fill="red"/>
</g>
</g>
<text x="570" y="35" text-anchor="middle">Solution</text>
<text x="570" y="65" text-anchor="middle">Animation</text>
<text x="570" y="95" text-anchor="middle">Step by step</text>
<rect onclick="newton_solve(true,1)" x="520" y="20" width="100" height="20" stroke="black" fill="red" fill-opacity="0.2"/>
<rect onclick="newton_solve(true,1000)" x="520" y="50" width="100" height="20" stroke="black" fill="green" fill-opacity="0.2"/>
<rect onclick="newton_solve(false,0)" x="520" y="80" width="100" height="20" stroke="black" fill="blue" fill-opacity="0.2"/>


</svg>
