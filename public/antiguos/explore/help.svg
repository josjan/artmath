<rect id="rapp" x="225" y="11" width="8" height="8" style="stroke:blue; fill:blue"/>
<rect id="H" x="300" y="11" width="8" height="8" style="stroke:red; fill:red"/>
<circle id="B" cx="6" cy="30" r="3"  style="stroke:red; fill:red"/>
<circle id="A" cx="300" cy="300" r="3" style="stroke:red; fill:red"/>
<circle id="C" cx="350" cy="250" r="3" style="stroke:red; fill:red"/>
<circle id="D" cx="450" cy="320" r="3" style="stroke:red; fill:red"/>
<circle id="E" cx="550" cy="290" r="3" style="stroke:red; fill:red"/>
<circle id="F" cx="400" cy="100" r="3" style="stroke:red; fill:red"/>
