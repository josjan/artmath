<svg width="600" height="500" viewBox="0 0 600 500">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<g onmouseup="click=false">
<rect width="600" height="500" fill="url(#Pat01)"/>
<use x="50" y="250" xlink:href="#system" fill="blue"/>
<line id="v1" marker-end="url(#Marker01)" x1="300" y1="250" x2="425" y2="150" style="stroke:black;stroke-width:4"/> 
<line id="v2" marker-end="url(#green)" x1="300" y1="250" x2="175" y2="350" style="stroke:green;stroke-width:4"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="200" y="400" dx="-20" dy="-10">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="200" dx="20" dy="-10">B</text>
<text x="20" y="20" font-size="15">Coordinates A : <tspan id="xya"> 6 ; -6 </tspan></text>
<text x="20" y="40" font-size="15">Coordinates B : <tspan id="xyb"> 14 ; 2 </tspan></text>
<text x="220" y="20" font-size="15">Vector AB</text>
<text x="220" y="40" font-size="15">Vector Vx : <tspan id="vxt"> 8 </tspan></text>
<text x="220" y="60" font-size="15">Vector Vy : <tspan id="vyt"> 8 </tspan></text>
<text x="220" y="80" font-size="15">Vector length : <tspan id="vl"> 11.31 </tspan></text>
<text x="420" y="20" font-size="15">Vector <tspan id="kt"> -1 </tspan>* AB</text>
<text x="420" y="40" font-size="15">Vector Vx : <tspan id="vxt2"> 8 </tspan></text>
<text x="420" y="60" font-size="15">Vector Vy : <tspan id="vyt2"> 8 </tspan></text>
<text x="420" y="80" font-size="15">Vector length : <tspan id="vl2"> 11.31 </tspan></text>
<g onmousedown="click=true" onmousemove="scalar_move(evt)">
<circle id="p1" cx="300" cy="200" r="4" fill="red"/>
<circle id="p2" cx="400" cy="100" r="4" fill="red"/>
</g>
<g id="slider">
<rect x="100" y="450" width="400" height="10" fill="lightgray" stroke="gray"/>
<path d="M300 448v14 M400 448v14 M500 448v14 M200 448v14 M100 448v14" fill="none" stroke="blue"/>
<text x="100" y="445" style="font-size:15" dx="-5,0,85,0,90,90,90" >-2-1012</text>
<rect x="90" y="430" width="420" height="50" fill="green" fill-opacity="0.1"/>
<rect onmousedown="click=true" onmousemove="scalar_cursor(evt)" id="cursor" x="195" y="447" width="10" height="16" fill="red"/>
</g>
</g>
</svg>