<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="50" height="50" patternUnits="userSpaceOnUse">
	<rect width="50" height="50" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
<g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
<g id="system2">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:1"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:1"/> 
    <circle cx="0" cy="0" r="1.5" stroke="black"/>
</g>
</defs>
 <rect width="700" height="600" fill="white"/>
  <text x="20" y="20" font-size="15">
    Function: y(x) = cos(x)
 <tspan x="20" dy="1.5em">To draw graph, we calculate values of y and join points by Bezier's cubic</tspan>
  </text>
<g onmouseup="click=false">
<rect x="20" y="100" width="660" height="200" fill="url(#Pat01)" stroke="black"/>
<circle cx="100" cy="200" r="50" fill="none" stroke="green"/>
<use x="100" y="200" xlink:href="#system" fill="green"/>
<use x="200" y="200" xlink:href="#system" fill="blue"/>
<path id="graph" d="M0,0 500,0" stroke="darkblue" stroke-width="2" fill="none" />
<path id="graphPnts" d="M0,0 Z" stroke="gold" stroke-width="4" stroke-linecap="round" fill="none" />
<text x="20" y="90" fill="red">Move red circle to change value of angle</text>
<text x="520" y="120">Angle : <tspan id="ag"> 0 </tspan> degrees</text>
<text x="520" y="140">cos ( angle ) : <tspan id="cosin"> 1 </tspan></text>
<circle id="p2" cx="200" cy="150" r="4" fill="green"/>

<line id="l1" x1="20" y1="150" x2="680" y2="150" stroke="black" fill="none" stroke-dasharray="4 4"/>
<line id="l2" x1="150" y1="100" x2="150" y2="300" stroke="black" fill="none" stroke-dasharray="4 4"/>

<circle onmousedown="click=true" onmousemove="cosinus_move(evt)" id="p1" cx="150" cy="200" r="4" fill="red"/>
</g>
<line x1="150" y1="450" x2="200" y2="363" stroke="green" fill="none" stroke-width="2"/>
<path marker-end="url(#green)" d="M 170 450A20 20 0 0 0 160 433" stroke="green" fill="none" stroke-width="2"/>
<circle cx="150" cy="450" r="100" fill="none" stroke="green"/>
<use transform="translate(150,450) scale(2)" xlink:href="#system2" fill="blue"/>
<circle cx="200" cy="363" r="4" fill="green"/>
<line x1="200" y1="350" x2="200" y2="550" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line marker-end="url(#red)" x1="150" y1="450" x2="200" y2="450" stroke="red" fill="none" stroke-width="3"/>
</svg>  

