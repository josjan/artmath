<svg width="600" height="600">
<g onmouseup="click=false">
<rect id="bkgrnd" x="0" y="0" width="600" height="600" style="fill:white"/> 
<text x="20" y="20" style="text-anchor:left">Quadratic Bezier : construction with barycenters</text>
<text x='20' y='40'>Coefficients for barycenters : <tspan id="code">0.5 and 0.5</tspan></text>
<text x='20' y='60'>Code SVG for curve : <tspan id="code_q">M100 300Q200,100 500,300</tspan></text>
<text x="590" y="20" style="text-anchor:end">Barycenters</text>
<text x="590" y="40" style="text-anchor:end">Show</text>
<text x="590" y="60" style="text-anchor:end">Hide</text>
<circle cx="547" cy="35" r="6" style="stroke:black;fill:white"/>
<circle cx="547" cy="55" r="6" style="stroke:black;fill:white"/>
<circle id="choix" cx="547" cy="35" r="4" style="stroke:black;fill:black"/>
<rect onclick="quadratic_change(evt,0)" x="540" y="28" height="15" width="50" opacity="0"/>
<rect onclick="quadratic_change(evt,1)" x="540" y="48" height="15" width="50" opacity="0"/>
<g id="traits" visibility="visible">
<path id="tang" d="M100 300 L200 100 500 300" style="stroke:green;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<path id="tang2" d="M150 200 L350 200" style="stroke:red;stroke-dasharray:10 10;fill-opacity:0.3; fill:none"/>
<circle id="D1" cx="150" cy="200" r="3" style="stroke:green; fill:green"/>
<circle id="D2" cx="350" cy="200" r="3" style="stroke:green; fill:green"/>
<circle id="D3" cx="250" cy="200" r="3" style="stroke:green; fill:blue"/>
</g>
<path id="courbe" d="M100 300Q200,100 500,300" style="stroke:blue;fill-opacity:0.3; fill:none"/>
<path id="tang4" d="M100 300L500 300" style="stroke:green;fill-opacity:0.3; fill:none"/>
<g onmousedown="click=true" onmousemove="quadratic_move(evt)" >
<circle id="A1" cx="100" cy="300" r="4" style="stroke:red; fill:red"/>
<circle id="C1" cx="200" cy="100" r="4" style="stroke:red; fill:red"/>
<circle id="A2" cx="500" cy="300" r="4" style="stroke:red; fill:red"/>
<circle id="B1" cx="300" cy="300" r="4" style="stroke:red; fill:red"/>
</g>
</g>
</svg>

