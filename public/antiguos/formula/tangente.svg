<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="50" height="50" patternUnits="userSpaceOnUse">
	<rect width="50" height="50" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
<marker id="blue" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="blue"/>
</marker><g id="system2">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="50" y2="0" style="stroke:black;stroke-width:1"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-50" style="stroke:black;stroke-width:1"/> 
    <circle cx="0" cy="0" r="1.5" stroke="black"/>
</g>
</defs>
 <rect width="700" height="600" fill="white" onclick="alert(evt.clientX + ' ; ' + evt.clientY)"/>
  <text x="20" y="20" font-size="15">
    Function: y(x) = tan(x)
  </text>


<circle cx="150" cy="150" r="100" fill="none" stroke="green"/>
<use transform="translate(150,150) scale(2)" xlink:href="#system2" fill="blue"/>
<path marker-end="url(#green)" d="M 170 150A20 20 0 0 0 164 136" stroke="green" fill="none" stroke-width="2"/>
<circle cx="221" cy="79" r="4" fill="green"/>
<line x1="50" y1="79" x2="250" y2="79" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="50" y1="221" x2="250" y2="221" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="79" y1="221" x2="250" y2="50" stroke="green" fill="none" stroke-width="2"/>
<line x1="250" y1="20" x2="250" y2="280" stroke="green" fill="none" stroke-width="2"/>
<line x1="79" y1="50" x2="79" y2="250" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="221" y1="50" x2="221" y2="250" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line marker-end="url(#red)" x1="250" y1="150" x2="250" y2="50" stroke="red" fill="none" stroke-width="3"/>
<circle cx="79" cy="221" r="4" fill="green"/>
<circle cx="221" cy="221" r="4" fill="blue"/>
<circle cx="79" cy="79" r="4" fill="blue"/>

<g transform="translate(0,250)">
<circle cx="150" cy="150" r="100" fill="none" stroke="green"/>
<use transform="translate(150,150) scale(2)" xlink:href="#system2" fill="blue"/>
<path marker-end="url(#green)" d="M 170 150A20 20 0 0 0 160 133" stroke="green" fill="none" stroke-width="2"/>
<circle cx="200" cy="63" r="4" fill="green"/>
<circle cx="237" cy="100" r="4" fill="blue"/>
<line x1="50" y1="250" x2="250" y2="50" stroke="green" fill="none" stroke-dasharray="4 4"/>
<line x1="150" y1="150" x2="200" y2="63" stroke="green" fill="none" stroke-width="2"/>
<line marker-end="url(#red)" x1="150" y1="150" x2="150" y2="63" stroke="red" fill="none" stroke-width="3"/>
<line marker-end="url(#blue)" x1="150" y1="150" x2="200" y2="150" stroke="blue" fill="none" stroke-width="3"/>
</g>
<text x="300" y="50">Some properties
<tspan x="300" dy="1.5em">Tangente is red vector, we can see that :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( x ) get any value</tspan> 
<tspan x="300" dy="1.5em">Tangente is periodical :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( x + 2 * Pi ) = tan ( x )</tspan> 
<tspan x="300" dy="1.5em">This two green points give same value</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( x + Pi ) = tan ( x ) - period is Pi</tspan> 
<tspan x="300" dy="1.5em">The two blue points have opposite value :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( - x ) = - tan ( x )</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( Pi - x ) = - tan ( x )</tspan> 
<tspan x="300" dy="1.5em">Some values to know :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( 0 ) = 0 ; tan ( Pi / 2 ) is infinite ; tan ( Pi / 4 ) = 1</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( Pi / 6 ) = . 3 / 3 ; tan ( Pi / 3 ) = . 3</tspan> 
<tspan x="300" dy="1.5em">We can use sinus and cosinus to calculate tangente :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( x ) = sin ( x ) / cos ( x )</tspan> 


<tspan x="300" dy="5em">For blue and green points, sinus and cosinus are exchanged :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">tan ( Pi / 2 - x ) = 1 / tan ( x )</tspan> 
<tspan x="300" dy="5em">Function tan ( x ) can be derivatived :</tspan> 
<tspan x="300" dy="1.5em" fill="blue">Derivative function of tan ( x ) is 1 / cos<tspan baseline-shift="super" font-size="9">2</tspan> ( x ) or 1 + tan<tspan baseline-shift="super" font-size="9">2</tspan> ( x )</tspan> 

</text>
<path d="M374 254l3 12 3 -12h10" fill="none" stroke="blue"/>
<path d="M489 254l3 12 3 -12h10" fill="none" stroke="blue"/>
</svg>  

