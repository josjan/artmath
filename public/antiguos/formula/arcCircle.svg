<svg width="700" height="600">
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<circle cx="580" cy="120" r="100" style="stroke:green; fill:none"/>
<circle cx="580" cy="120" r="3" style="stroke:red; fill:red"/>
<path d="M630 33 A100 100 0 0 0 493 70" stroke="blue" stroke-width="2" fill="none"/>
<path d="M630 33 A100 100 0 1 1 493 70" stroke="green" stroke-width="2" fill="none"/>
<text x="580" y="120" dx="5">C</text>
<circle cx="630" cy="33" r="3" style="fill:green"/>
<circle cx="493" cy="70" r="3" style="fill:red"/>
<text x="630" y="33" dx="5">M</text>
<text x="493" y="70" dx="-15">M'</text>

<text x="20" y="20" font-size="14" fill="black">Circle defined by center C and radius R
<tspan x="20" dy="1.2em">We use parametric equation :</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + R * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + R * sin ( t ) with t from 0 to 2 * PI</tspan>

<tspan x="20" dy="3.2em">Arc is defined by points M and M'.</tspan>
<tspan x="20" dy="1.2em">We have also to choose orientation for arc :</tspan>
<tspan x="20" dy="1.2em">To go from M to M' we have two paths blue and green arcs</tspan>
<tspan x="20" dy="1.2em">M and M' are defined by value of t, A and A' :</tspan>
<tspan x="20" dy="1.2em">We have parametric equation for blue arc:</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + R * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + R * sin ( t ) with t from A to A'</tspan>

<tspan x="20" dy="1.2em">We have parametric equation for green arc:</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + R * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + R * sin ( t ) with t from A' to A</tspan>

<tspan x="20" dy="3.2em">To use A command in SVG, we use coordinates of M and M', radius and flags</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">M</tspan> = x<tspan baseline-shift="sub" font-size="8">C</tspan> + R * cos ( A ) and y<tspan baseline-shift="sub" font-size="8">M</tspan> = y<tspan baseline-shift="sub" font-size="8">C</tspan> + R * sin ( A )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">M'</tspan> = x<tspan baseline-shift="sub" font-size="8">C</tspan> + R * cos ( A' ) and y<tspan baseline-shift="sub" font-size="8">M'</tspan> = y<tspan baseline-shift="sub" font-size="8">C</tspan> + R * sin ( A' )</tspan>
<tspan x="20" dy="1.5em">To draw blue arc we have for parameter d in path :</tspan>
<tspan x="20" dy="1.5em" fill="blue">d = " M x<tspan baseline-shift="sub" font-size="8">M</tspan> y<tspan baseline-shift="sub" font-size="8">M</tspan> A R R 0 0 0 x<tspan baseline-shift="sub" font-size="8">M'</tspan> y<tspan baseline-shift="sub" font-size="8">M' </tspan> "</tspan>

<tspan x="20" dy="1.5em">To draw green arc we have for parameter d in path :</tspan>
<tspan x="20" dy="1.5em" fill="blue">d = " M x<tspan baseline-shift="sub" font-size="8">M</tspan> y<tspan baseline-shift="sub" font-size="8">M</tspan> A R R 0 1 1 x<tspan baseline-shift="sub" font-size="8">M'</tspan> y<tspan baseline-shift="sub" font-size="8">M' </tspan> "</tspan>

</text>
</svg>
