<svg width="700" height="600">
<defs>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker>
<marker id="red" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="red"/>
</marker>
</defs>
<rect x="0" y="0" width="700" height="600" style="fill:white" onclick="alert(evt.clientX + ' ; ' +evt.clientY)"/> 
<circle cx="160" cy="85" r="15" fill="none" stroke="red"/>
<circle cx="62" cy="145" r="15" fill="none" stroke="green"/>
<line marker-end="url(#green)" x1="110" y1="85" x2="185" y2="130" style="stroke:green;stroke-width:1"/> 
<line marker-end="url(#red)" x1="110" y1="115" x2="185" y2="70" style="stroke:red;stroke-width:1"/> 
<ellipse cx="515" cy="366" rx="80" ry="20" fill="yellow" stroke="red" fill-opacity="0.1"/>
<text x="20" y="20" font-size="15" fill="black">Inverse of matrix
<tspan x="20" dy="2em">Matrix need to be square matrix with same number of rows and columns</tspan>
<tspan x="20" dy="1em">Matrix A :</tspan>
<tspan x="50" dy="1.5em">a<tspan baseline-shift="sub" font-size="10">1 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="50" dy="2em">a<tspan baseline-shift="sub" font-size="10">3 1</tspan></tspan>
<tspan x="100">a<tspan baseline-shift="sub" font-size="10">3 2</tspan></tspan>
<tspan x="150">a<tspan baseline-shift="sub" font-size="10">3 3</tspan></tspan>
<tspan x="320" dy="-5em">Matrix identity I :</tspan>
<tspan x="350" dy="1.5em">1</tspan>
<tspan x="400">0</tspan>
<tspan x="450">0</tspan>
<tspan x="350" dy="2em">0</tspan>
<tspan x="400">1</tspan>
<tspan x="450">0</tspan>
<tspan x="350" dy="2em">0</tspan>
<tspan x="400">0</tspan>
<tspan x="450">1</tspan>

<tspan x="20" dy="3em">Matrix inverse A<tspan baseline-shift="super" font-size="10">- 1</tspan> verify A x A<tspan baseline-shift="super" font-size="10">- 1</tspan> = A<tspan baseline-shift="super" font-size="10">- 1</tspan> x A = I :</tspan>
<tspan x="20" dy="1.2em">Determinant D of A must not be equal to 0</tspan>
<tspan x="20" dy="1.2em">All terms have to be divised by D</tspan>

<tspan x="20" dy="2em">Rule to calculate term of inverse :</tspan>
<tspan x="20" dy="1.2em">- associate term symetric by diagonal</tspan>
<tspan x="20" dy="1.2em">- calculate determinant for matrix without row and column of this symetric</tspan>
<tspan x="20" dy="1.2em">- multiply by -1 if row range + column range is odd</tspan>
<tspan x="20" dy="1.2em">- divise term by determinant</tspan>

<tspan x="20" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 2</tspan> * a<tspan baseline-shift="sub" font-size="10">3 3</tspan> - a<tspan baseline-shift="sub" font-size="10">3 2</tspan> * a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="250">- a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 3</tspan> - a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="450">a<tspan baseline-shift="sub" font-size="10">1 2</tspan> * a<tspan baseline-shift="sub" font-size="10">2 3</tspan> - a<tspan baseline-shift="sub" font-size="10">2 2</tspan> * a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>

<tspan x="20" dy="2em">- a<tspan baseline-shift="sub" font-size="10">2 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 3</tspan> + a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">2 3</tspan></tspan>
<tspan x="250">a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 3</tspan> - a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>
<tspan x="450">- a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">2 3</tspan> + a<tspan baseline-shift="sub" font-size="10">2 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 3</tspan></tspan>

<tspan x="20" dy="2em">a<tspan baseline-shift="sub" font-size="10">2 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 2</tspan> - a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">2 2</tspan></tspan>
<tspan x="250">- a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">3 2</tspan> + a<tspan baseline-shift="sub" font-size="10">3 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>
<tspan x="450">a<tspan baseline-shift="sub" font-size="10">1 1</tspan> * a<tspan baseline-shift="sub" font-size="10">2 2</tspan> - a<tspan baseline-shift="sub" font-size="10">2 1</tspan> * a<tspan baseline-shift="sub" font-size="10">1 2</tspan></tspan>

<tspan x="20" dy="3em">Properties</tspan>
<tspan x="20" dy="2em">( k * A )<tspan baseline-shift="super" font-size="10">- 1</tspan> = 1/k * A<tspan baseline-shift="super" font-size="10">- 1</tspan></tspan>
<tspan x="20" dy="2em">( A x B )<tspan baseline-shift="super" font-size="10">- 1</tspan> = B<tspan baseline-shift="super" font-size="10">- 1</tspan> x A<tspan baseline-shift="super" font-size="10">- 1</tspan></tspan>
<tspan x="20" dy="2em">( A<tspan baseline-shift="super" font-size="10">- 1</tspan> )<tspan baseline-shift="super" font-size="10">- 1</tspan> = A</tspan>

</text>
</svg>
