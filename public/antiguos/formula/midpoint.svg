<svg width="600" height="500" viewBox="0 0 600 500">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="600" height="500" fill="url(#Pat01)"/>
<use x="50" y="250" xlink:href="#system" fill="blue"/>
<line id="v1" x1="275" y1="225" x2="375" y2="25" style="stroke:black;stroke-width:4"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="275" y="225" dx="-20" dy="20" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="375" y="25" dx="20" dy="-10" startOffset="0">B</text>
<text id="m" style="text-anchor:middle;font-size:20;fill:blue" x="325" y="125" dx="-20" dy="-10" startOffset="0">M</text>
<text style="text-anchor:middle;font-size:20;fill:blue" x="75" y="100" dx="-20" dy="-10" startOffset="0">O</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">9 ; 1</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">13 ; 9</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Coordinates M : <tspan id="xym">11 ; 5</tspan></text>
<path id="para" d="M75 100L275 225L575 150L375 25zM75 100L575 150" stroke="green" fill="none"/>
<circle id="p3" cx="325" cy="125" r="4" fill="blue"/>
<circle id="p1" cx="275" cy="225" r="4" fill="red"/>
<circle id="p2" cx="375" cy="25" r="4" fill="red"/>
<circle id="p4" cx="75" cy="100" r="4" fill="red"/>
<text x="30" y="300" font-size="18" fill="black">Coordinates of M midpoint for AB</text>
<text x="30" y="325" font-size="18" fill="blue">x<tspan baseline-shift="sub" font-size="11">M</tspan> = ( x<tspan baseline-shift="sub" font-size="11">A</tspan> + x<tspan baseline-shift="sub" font-size="11">B</tspan> ) / 2</text>
<text x="30" y="350" font-size="18" fill="blue">y<tspan baseline-shift="sub" font-size="11">M</tspan> = ( y<tspan baseline-shift="sub" font-size="11">A</tspan> + y<tspan baseline-shift="sub" font-size="11">B</tspan> ) / 2</text>
<text x="30" y="375" font-size="14" fill="black">If from any point O we build parallelogram defined with A and B, diagonals intersect in M</text>
<text x="30" y="400" font-size="14" fill="black">So vector (OM) is half of sum of vectors (OA) and (OB)</text>
<text x="30" y="425" font-size="14" fill="black">If O is origin, we get formula above</text>
</svg>
