<text x="20" y="20" font-size="14" fill="black">Weiler - Atherton algorithm
<tspan x="20" dy="1.5em">We have two polygons, vertices are in order </tspan>
<tspan x="20" dy="1.5em">We calculate intersections of sides</tspan>
<tspan x="20" dy="1.5em">and put them in two lists :</tspan>
<tspan x="20" dy="1.5em" fill="blue">P<tspan baseline-shift="sub" font-size="8">0</tspan> ; I<tspan baseline-shift="sub" font-size="8">1</tspan> ; I<tspan baseline-shift="sub" font-size="8">0</tspan> ; P<tspan baseline-shift="sub" font-size="8">1</tspan> ; I<tspan baseline-shift="sub" font-size="8">2</tspan> ; I<tspan baseline-shift="sub" font-size="8">3</tspan> ; P<tspan baseline-shift="sub" font-size="8">2</tspan> ; I<tspan baseline-shift="sub" font-size="8">4</tspan> ; P<tspan baseline-shift="sub" font-size="8">3</tspan> ; I<tspan baseline-shift="sub" font-size="8">5</tspan> ; P<tspan baseline-shift="sub" font-size="8">4</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">Q<tspan baseline-shift="sub" font-size="8">0</tspan> ; Q<tspan baseline-shift="sub" font-size="8">1</tspan> ; I<tspan baseline-shift="sub" font-size="8">0</tspan> ; I<tspan baseline-shift="sub" font-size="8">2</tspan> ; Q<tspan baseline-shift="sub" font-size="8">2</tspan> ; Q<tspan baseline-shift="sub" font-size="8">3</tspan> ; I<tspan baseline-shift="sub" font-size="8">5</tspan> ; I<tspan baseline-shift="sub" font-size="8">4</tspan> ; I<tspan baseline-shift="sub" font-size="8">3</tspan> ; I<tspan baseline-shift="sub" font-size="8">1</tspan></tspan>
<tspan x="20" dy="2.5em">We have also list of exiting points for P</tspan>
<tspan x="20" dy="1.5em" fill="blue">I<tspan baseline-shift="sub" font-size="8">0</tspan> ; I<tspan baseline-shift="sub" font-size="8">3</tspan> ; I<tspan baseline-shift="sub" font-size="8">5</tspan></tspan>
<tspan x="20" dy="1.5em">We begin with first point of exiting list I<tspan baseline-shift="sub" font-size="8">0</tspan></tspan>
<tspan x="20" dy="1.5em">We take next points on list for P until we get entering  point I<tspan baseline-shift="sub" font-size="8">2</tspan></tspan>
<tspan x="20" dy="1.5em">We go to list for Q and take next point Q<tspan baseline-shift="sub" font-size="8">2</tspan> Q<tspan baseline-shift="sub" font-size="8">3</tspan></tspan>
<tspan x="20" dy="1.5em">As I<tspan baseline-shift="sub" font-size="8">5</tspan> is entering for Q, we go to list for P</tspan>
<tspan x="20" dy="1.5em">We take next points P<tspan baseline-shift="sub" font-size="8">4</tspan> P<tspan baseline-shift="sub" font-size="8">0</tspan></tspan>
<tspan x="20" dy="1.5em">As I<tspan baseline-shift="sub" font-size="8">1</tspan> is entering for P, we go to list for Q</tspan>
<tspan x="20" dy="1.5em">We take next points Q<tspan baseline-shift="sub" font-size="8">0</tspan> Q<tspan baseline-shift="sub" font-size="8">1</tspan></tspan>
<tspan x="20" dy="1.5em">We retrieve point for begining I<tspan baseline-shift="sub" font-size="8">0</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">First area for union is polygon I<tspan baseline-shift="sub" font-size="8">0</tspan> P<tspan baseline-shift="sub" font-size="8">1</tspan> I<tspan baseline-shift="sub" font-size="8">2</tspan> Q<tspan baseline-shift="sub" font-size="8">2</tspan> Q<tspan baseline-shift="sub" font-size="8">3</tspan> I<tspan baseline-shift="sub" font-size="8">5</tspan> P<tspan baseline-shift="sub" font-size="8">4</tspan> P<tspan baseline-shift="sub" font-size="8">0</tspan> I<tspan baseline-shift="sub" font-size="8">1</tspan> Q<tspan baseline-shift="sub" font-size="8">0</tspan> Q<tspan baseline-shift="sub" font-size="8">1</tspan></tspan>
<tspan x="20" dy="1.5em">We delete exiting points in this area I<tspan baseline-shift="sub" font-size="8">0</tspan> and I<tspan baseline-shift="sub" font-size="8">5</tspan> from exiting list</tspan>
<tspan x="20" dy="1.5em">We take last point in exiting list I<tspan baseline-shift="sub" font-size="8">3</tspan></tspan>
<tspan x="20" dy="1.5em">We find on P list P<tspan baseline-shift="sub" font-size="8">2</tspan> then I<tspan baseline-shift="sub" font-size="8">4</tspan></tspan>
<tspan x="20" dy="1.5em">As I<tspan baseline-shift="sub" font-size="8">4</tspan> is entering we go to Q list and find I<tspan baseline-shift="sub" font-size="8">3</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">Second area is I<tspan baseline-shift="sub" font-size="8">3</tspan> P<tspan baseline-shift="sub" font-size="8">2</tspan> I<tspan baseline-shift="sub" font-size="8">4</tspan></tspan>
<tspan x="20" dy="2.5em" fill="red">If polygons are crossed, this algorithm give false results</tspan>
<tspan x="20" dy="2.5em">We can use this algorithm to find intersection of areas, we have only to exchange entering and exiting</tspan>

</text>
</svg>
