<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="535" y1="125" x2="25" y2="408.333" style="stroke:green;stroke-width:2"/> 
<line id="v2" x1="25" y1="186.765" x2="675" y2="301.471" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="175" y="325" dx="-20" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="200" dx="-20" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:20;fill:blue" x="525" y="275" dx="-20" dy="-5" startOffset="0">C</text>
<text id="d" style="text-anchor:middle;font-size:20;fill:blue" x="100" y="200" dx="-20" dy="-5" startOffset="0">D</text>
<text id="m" style="text-anchor:middle;font-size:20;fill:blue" x="327.679" y="240.179" dx="-20" dy="-5" startOffset="0">M</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">-7 ; 1</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">2 ; 6</tspan></text>
<text x="330" y="20" font-size="15" startOffset="0">Coordinates C : <tspan id="xyc">7 ; 3</tspan></text>
<text x="330" y="40" font-size="15" startOffset="0">Coordinates D : <tspan id="xyd">-10 ; 6</tspan></text>
<text x="220" y="20" font-size="15" startOffset="0">AB Vx : <tspan id="vxt">9</tspan></text>
<text x="220" y="40" font-size="15" startOffset="0">AB Vy : <tspan id="vyt">5</tspan></text>
<text x="550" y="20" font-size="15" startOffset="0">CD Vx : <tspan id="vxt2">-17</tspan></text>
<text x="550" y="40" font-size="15" startOffset="0">CD Vy : <tspan id="vyt2">3</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Line (AB) equation : <tspan id="ut">5* x -9 * y + 44 = 0</tspan></text>
<text x="20" y="80" font-size="15" startOffset="0">Line (CD) equation : <tspan id="ut2">3* x + 17 * y -72 = 0</tspan></text>
<text x="20" y="100" font-size="15" fill="blue" startOffset="0">Coordinates M intersection of AB and CD : <tspan id="xym">-0.89 ; 4.39</tspan></text>
<circle id="p5" cx="327.679" cy="240.179" r="4" fill="blue"/>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="175" cy="325" r="4" fill="red"/>
<circle id="p2" cx="400" cy="200" r="4" fill="red"/>
<circle id="p3" cx="525" cy="275" r="4" fill="red"/>
<circle id="p4" cx="100" cy="200" r="4" fill="red"/>
<text x="400" y="320" font-size="15" fill="black">Coordinates of intersection
<tspan x="400" dy="2em">Lines are defined by equations</tspan>
<tspan x="250" dy="1.5em">u * x + v * y + w = 0 for (AB) and u' * x + v' * y + w' = 0 for (CD)</tspan>
<tspan x="250" dy="1.5em">M intersection of files must verify this two equations</tspan>
<tspan x="50" dy="1.5em">We have to solve a system of two linear equations :</tspan>
<tspan x="50" dy="1.5em">We calculate det = u * v' - u' * v</tspan>
<tspan x="50" dy="1.5em">If det = 0 lines are parallels or we have same line</tspan>
<tspan x="50" dy="1.5em">If det is not null, we get coordinates for M :</tspan>
<tspan x="50" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="9">M</tspan> = ( v * w' - w * v' ) / ( u * v' - u' * v )</tspan>
<tspan x="50" dy="1.5em" fill="blue">y<tspan baseline-shift="sub" font-size="9">M</tspan> = ( - u * w' + w * u' ) / ( u * v' - u' * v )</tspan>
</text>
</svg>
