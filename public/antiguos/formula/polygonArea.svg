<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
</defs>
<rect width="700" height="600" fill="url(#Pat01)"/>
<text x="20" y="20" font-size="15" startOffset="0">Areas for triangles : <tspan id="area_t" font-size="12">15 ; 33 ; 8 ; -8 ; -20 ; </tspan> </text>
<text x="20" y="40" font-size="15" startOffset="0">Area for polygone : <tspan id="area">28</tspan> </text>
<text x="20" y="60" font-size="15" startOffset="0">Perimeter for polygone : <tspan id="peri">21.12</tspan> </text>
<text id="n0" style="text-anchor:middle;font-size:15;fill:blue" x="675" y="25" dx="-15" dy="-10" startOffset="0">A</text>
<text id="n1" style="text-anchor:middle;font-size:15;fill:blue" x="425" y="25" dx="-15" dy="-10" startOffset="0">P<tspan baseline-shift="sub" font-size="9">1</tspan></text>
<text id="n2" style="text-anchor:middle;font-size:15;fill:blue" x="375" y="100" dx="-15" dy="-10" startOffset="0">P<tspan baseline-shift="sub" font-size="9">2</tspan></text>
<text id="n3" style="text-anchor:middle;font-size:15;fill:blue" x="425" y="225" dx="-15" dy="10" startOffset="0">P<tspan baseline-shift="sub" font-size="9">3</tspan></text>
<text id="n4" style="text-anchor:middle;font-size:15;fill:blue" x="475" y="225" dx="15" dy="15" startOffset="0">P<tspan baseline-shift="sub" font-size="9">4</tspan></text>
<text id="n5" style="text-anchor:middle;font-size:15;fill:blue" x="525" y="125" dx="15" dy="15" startOffset="0">P<tspan baseline-shift="sub" font-size="9">5</tspan></text>
<polygon id="polygo" points="425,25 375,100 425,225 475,225 525,125 " stroke="black" fill="none"/>
<path id="tr1" d="M675 25L425 25 375 100z" fill="red" opacity="0.2" stroke="black"/>
<path id="tr2" d="M675 25L375 100 425 225z" fill="red" opacity="0.2" stroke="black"/>
<path id="tr3" d="M675 25L425 225 475 225z" fill="red" opacity="0.2" stroke="black"/>
<path id="tr4" d="M675 25L475 225 525 125z" fill="yellow" opacity="0.2" stroke="black"/>
<path id="tr5" d="M675 25L525 125 425 25z" fill="yellow" opacity="0.2" stroke="black"/>
<circle id="p0" cx="675" cy="25" r="4" fill="red"/>
<circle id="p1" cx="425" cy="25" r="4" fill="red"/>
<circle id="p2" cx="375" cy="100" r="4" fill="red"/>
<circle id="p3" cx="425" cy="225" r="4" fill="red"/>
<circle id="p4" cx="475" cy="225" r="4" fill="red"/>
<circle id="p5" cx="525" cy="125" r="4" fill="red"/>
<text x="20" y="220" font-size="15" fill="black">Area of polygon ( convex or not but not crossed ) :
<tspan x="20" dy="2em">We know coordinates of vertices</tspan>
<tspan x="20" dy="1.5em">From any point A, we draw triangles AP<tspan baseline-shift="sub" font-size="9">1</tspan>P<tspan baseline-shift="sub" font-size="9">2</tspan>, AP<tspan baseline-shift="sub" font-size="9">2</tspan>P<tspan baseline-shift="sub" font-size="9">3</tspan>, ... AP<tspan baseline-shift="sub" font-size="9">n</tspan>P<tspan baseline-shift="sub" font-size="9">1</tspan></tspan>
<tspan x="20" dy="1.5em">Area are positive or negative ( depend of direction for P<tspan baseline-shift="sub" font-size="9">i</tspan>P<tspan baseline-shift="sub" font-size="9">i+1</tspan> )</tspan>
<tspan x="20" dy="1.5em">On this example area AP<tspan baseline-shift="sub" font-size="9">1</tspan>P<tspan baseline-shift="sub" font-size="9">2</tspan> is positive and area AP<tspan baseline-shift="sub" font-size="9">4</tspan>P<tspan baseline-shift="sub" font-size="9">5</tspan> is negative</tspan>
<tspan x="20" dy="1.5em">We sum all areas of triangles and with absolute value get area of polygon</tspan>
<tspan x="20" dy="1.5em">To calculate area of triangles we use cross product of vectors AP<tspan baseline-shift="sub" font-size="9">1</tspan> and AP<tspan baseline-shift="sub" font-size="9">2</tspan> ....</tspan>
<tspan x="20" dy="1.5em">To get formula, we can put A at origin</tspan>
<tspan x="20" dy="2em" fill="blue">Area triangle AP<tspan baseline-shift="sub" font-size="9">1</tspan>P<tspan baseline-shift="sub" font-size="9">2</tspan> = 0.5 * ( x<tspan baseline-shift="sub" font-size="9">P1</tspan> * y<tspan baseline-shift="sub" font-size="9">P2</tspan> - x<tspan baseline-shift="sub" font-size="9">P2</tspan> * y<tspan baseline-shift="sub" font-size="9">P1</tspan> )</tspan>
<tspan x="20" dy="2em" fill="blue">Area polygon = 0.5 * ( x<tspan baseline-shift="sub" font-size="9">P1</tspan> * y<tspan baseline-shift="sub" font-size="9">P2</tspan> - x<tspan baseline-shift="sub" font-size="9">P2</tspan> * y<tspan baseline-shift="sub" font-size="9">P1</tspan> + x<tspan baseline-shift="sub" font-size="9">P2</tspan> * y<tspan baseline-shift="sub" font-size="9">P3</tspan> - x<tspan baseline-shift="sub" font-size="9">P3</tspan> * y<tspan baseline-shift="sub" font-size="9">P2</tspan> + .... + x<tspan baseline-shift="sub" font-size="9">Pn</tspan> * y<tspan baseline-shift="sub" font-size="9">P1</tspan> - x<tspan baseline-shift="sub" font-size="9">P1</tspan> * y<tspan baseline-shift="sub" font-size="9">Pn</tspan> )</tspan>
<tspan x="20" dy="2em" fill="red">*** This method give false result for crossed polygon</tspan>
<tspan x="20" dy="2em">For perimeter, we calculate P<tspan baseline-shift="sub" font-size="9">1</tspan>P<tspan baseline-shift="sub" font-size="9">2</tspan>, P<tspan baseline-shift="sub" font-size="9">2</tspan>P<tspan baseline-shift="sub" font-size="9">3</tspan>, ... P<tspan baseline-shift="sub" font-size="9">n</tspan>P<tspan baseline-shift="sub" font-size="9">1</tspan></tspan>
</text>
</svg>
