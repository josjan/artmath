<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<clipPath id="cache">
<rect x="25" y="125" width="651" height="451"/>
</clipPath>
</defs>
<rect width="700" height="600" fill="white" onclick="alert(evt.clientX + ' ; ' + evt.clientY)"/>
<rect x="325" y="125" width="351" height="451" fill="url(#Pat01)"/>
<line x1="325" y1="350" x2="675" y2="350" style="stroke:green;stroke-width:2"/> 
<path id="parabole" clip-path="url(#cache)" d="M648.328586084516,575Q520.9773577066888,-173.3615756844756 393.6261293288616,575" style="stroke:blue;stroke-width:2;fill:none"/> 
<text id="a" style="text-anchor:middle;font-size:15;fill:blue" x="429" y="396" dx="-20" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:15;fill:blue" x="618" y="418" dx="-20" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:15;fill:blue" x="498" y="213" dx="-20" dy="-5" startOffset="0">C</text>
<text x="400" y="20" font-size="15" startOffset="0">Equation : <tspan id="u1">-0.58</tspan> * x<tspan baseline-shift="super" font-size="9">2</tspan> <tspan id="v1"> + 7.89</tspan> * x <tspan id="w1">-21.01</tspan> = 0</text>
<text x="400" y="40" font-size="15" startOffset="0">Discriminant : <tspan id="det" fill="blue">13.77</tspan></text>
<text x="400" y="60" font-size="15" startOffset="0">Solution for x : <tspan id="sol1" fill="blue">10.06</tspan></text>
<text x="400" y="80" font-size="15" startOffset="0">Solution for x : <tspan id="sol2" fill="blue">3.62</tspan></text>
<circle id="p4" cx="601.389" cy="350" r="4" fill="blue"/>
<circle id="p5" cx="440.566" cy="350" r="4" fill="blue"/>
<text id="m" style="text-anchor:middle;font-size:15;fill:blue" x="601.389" y="350" dx="-20" dy="-5" startOffset="0">M</text>
<text id="n" style="text-anchor:middle;font-size:15;fill:blue" x="440.566" y="350" dx="-20" dy="-5" startOffset="0">N</text>
<rect x="325" y="125" width="351" height="451" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="429" cy="396" r="4" fill="red"/>
<circle id="p2" cx="618" cy="418" r="4" fill="red"/>
<circle id="p3" cx="498" cy="213" r="4" fill="red"/>
<text x="20" y="20" font-size="14" fill="black">Solve a * x<tspan baseline-shift="super" font-size="8">2</tspan> + b * x + c = 0
<tspan x="20" dy="1.5em">We suppose that a is not equal to 0</tspan>
<tspan x="20" dy="1.5em">We factorize part of this equation</tspan>
<tspan x="20" dy="1.5em">a * ( x<tspan baseline-shift="super" font-size="8">2</tspan> + ( b / a ) * x + c / a ) = 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="super" font-size="8">2</tspan> + ( b / a ) * x + c / a = 0</tspan>
<tspan x="20" dy="1.5em">We use square of ( x + b / ( 2 * a ) )</tspan>
<tspan x="20" dy="1.5em">( x + b / ( 2 * a ) )<tspan baseline-shift="super" font-size="8">2</tspan> - b<tspan baseline-shift="super" font-size="8">2</tspan> / ( 4 * a<tspan baseline-shift="super" font-size="8">2</tspan> ) + c / a = 0</tspan>
<tspan x="20" dy="1.5em" fill="blue">( x + b / ( 2 * a ) )<tspan baseline-shift="super" font-size="8">2</tspan> = ( b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c ) / ( 4 * a<tspan baseline-shift="super" font-size="8">2</tspan> )</tspan>
<tspan x="20" dy="1.5em">All depend of sign of b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c</tspan>
<tspan x="20" dy="1.5em">If b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c &gt; 0, we have two solutions</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">1</tspan> = ( - b - . b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c ) / ( 2 * a )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">2</tspan> = ( - b + . b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c ) / ( 2 * a )</tspan>
<tspan x="20" dy="1.5em">If b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c is equal to 0</tspan>
<tspan x="20" dy="1.5em">Parabola is tangent to x axis,</tspan>
<tspan x="20" dy="1.5em">we have only a solution</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">12</tspan> = - b / ( 2 * a )</tspan>
<tspan x="20" dy="1.5em">If b<tspan baseline-shift="super" font-size="8">2</tspan> - 4 * a * c &lt; 0</tspan>
<tspan x="20" dy="1.5em">Parabola don't intersect x axis</tspan>
<tspan x="20" dy="1.5em" fill="blue">No real value for x is solution</tspan>
</text>
<path d="M82 215l5 15 5 -15h80" fill="none" stroke="blue"/>
<path d="M85 236l5 15 5 -15h80" fill="none" stroke="blue"/>
