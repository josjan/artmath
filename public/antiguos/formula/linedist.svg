<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<rect x="25" y="125" width="651" height="151" fill="url(#Pat01)"/>
<line id="v1" x1="25" y1="125" x2="675" y2="233.333" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="175" y="150" dx="-20" dy="20" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="475" y="200" dx="20" dy="-10" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:20;fill:blue" x="300" y="250" dx="-20" dy="-10" startOffset="0">C</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">-7 ; 8</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">5 ; 6</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Coordinates C : <tspan id="xyc">-2 ; 4</tspan></text>
<text x="320" y="20" font-size="15" startOffset="0">Vector Vx : <tspan id="vxt">12</tspan></text>
<text x="320" y="40" font-size="15" startOffset="0">Vector Vy : <tspan id="vyt">-2</tspan></text>
<text x="320" y="60" font-size="15" startOffset="0">Line (AB) equation : <tspan id="ut">-2* x -12 * y + 82 = 0</tspan></text>
<text x="20" y="90" font-size="15" fill="blue" startOffset="0">Distance C to line (AB) : <tspan id="dist">3.123</tspan></text>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1" onclick="alert(evt.clientX +';' +evt.clientY)"/>
<circle cx="175" cy="150" r="4" fill="red"/>
<circle cx="475" cy="200" r="4" fill="red"/>
<circle cx="300" cy="250" r="4" fill="red"/>
<circle cx="313" cy="173" r="4" fill="green"/>
<text style="text-anchor:middle;font-size:20;fill:blue" x="313" y="173" dx="20" dy="-10" startOffset="0">h</text>
<line x1="313" y1="173" x2="300" y2="250" style="stroke:green;fill:none;stroke-dasharray:3 3"/>
<text x="50" y="280" font-size="15" fill="black">Distance from C to line (AB)
<tspan x="50" dy="2em">Line is defined by equation u * x + v * y + w = 0</tspan>
<tspan x="50" dy="1.5em">We project C on line, we get point h, distance is length of Ch</tspan>
<tspan x="50" dy="1.5em">For line Ch, we use parametric equation :</tspan>
<tspan x="50" dy="1.5em">x = xC + k * u ; y = yC + k * v</tspan>
<tspan x="50" dy="1.5em">h is on line AB so u * ( xC + k * u ) + v * ( yC + k * v ) + w = 0</tspan>
<tspan x="50" dy="1.5em" fill="blue">k = ( u * xC + v * yC + w ) / ( u<tspan baseline-shift="super" font-size="8">2</tspan> + v<tspan baseline-shift="super" font-size="8">2</tspan> )</tspan>
<tspan x="50" dy="1.5em">Square of distance Ch is ( xh - xC)<tspan baseline-shift="super" font-size="8">2</tspan> + ( yh - yC )<tspan baseline-shift="super" font-size="8">2</tspan></tspan>
<tspan x="50" dy="1.5em" fill="blue">d<tspan baseline-shift="super" font-size="8">2</tspan> = k<tspan baseline-shift="super" font-size="8">2</tspan> * ( u<tspan baseline-shift="super" font-size="8">2</tspan> + v<tspan baseline-shift="super" font-size="8">2</tspan> )</tspan>
<tspan x="50" dy="1.5em" fill="blue">d<tspan baseline-shift="super" font-size="8">2</tspan> = ( u * xC + v * yC + w )<tspan baseline-shift="super" font-size="8">2</tspan> / ( u<tspan baseline-shift="super" font-size="8">2</tspan> + v<tspan baseline-shift="super" font-size="8">2</tspan> )</tspan>
<tspan x="50" dy="1.5em">We can see that if C is on line AB, u * xC + v * yC + w = 0 and d = 0</tspan>
<tspan x="50" dy="1.5em" fill="blue">d = | u * xC + v * yC + w | / . ( u<tspan baseline-shift="super" font-size="8">2</tspan> + v<tspan baseline-shift="super" font-size="8">2</tspan> )</tspan>
</text>
<path d="M228 520 l5 15 5 -15 h60" fill="none" stroke="blue"/>
</svg>
