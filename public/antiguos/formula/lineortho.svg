<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="none" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<use x="350" y="350" xlink:href="#system" fill="blue"/>
<line id="v1" x1="32.1429" y1="575" x2="289.286" y2="125" style="stroke:green;stroke-width:2"/> 
<line id="v2" x1="193.75" y1="125" x2="675" y2="400" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="175" y="325" dx="-20" dy="-5" startOffset="0">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="275" y="150" dx="-20" dy="-5" startOffset="0">B</text>
<text id="c" style="text-anchor:middle;font-size:20;fill:blue" x="500" y="300" dx="10" dy="-5" startOffset="0">C</text>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : <tspan id="xya">-7 ; 1</tspan></text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : <tspan id="xyb">-3 ; 8</tspan></text>
<text x="20" y="60" font-size="15" startOffset="0">Coordinates C : <tspan id="xyc">6 ; 2</tspan></text>
<text x="320" y="20" font-size="15" startOffset="0">Vector Vx : <tspan id="vxt">4</tspan></text>
<text x="320" y="40" font-size="15" startOffset="0">Vector Vy : <tspan id="vyt">7</tspan></text>
<text x="20" y="80" font-size="15" startOffset="0">Line (AB) equation : <tspan id="ut">7* x -4 * y + 53 = 0</tspan></text>
<text x="20" y="100" font-size="15" startOffset="0">Line perpendicular equation : <tspan id="ut2">4* x + 7 * y -38 = 0</tspan></text>
<rect x="25" y="125" width="651" height="451" fill="yellow" fill-opacity="0.1"/>
<circle id="p1" cx="175" cy="325" r="4" fill="red"/>
<circle id="p2" cx="275" cy="150" r="4" fill="red"/>
<circle id="p3" cx="500" cy="300" r="4" fill="red"/>
<text x="380" y="350" font-size="15" fill="black">Equation of perpendicular
<tspan x="250" dy="2em">Line (AB) is defined by equation u * x + v * y + w = 0</tspan>
<tspan x="250" dy="1.5em">We know coordinates of C : x<tspan baseline-shift="sub" font-size="9">C</tspan> and y<tspan baseline-shift="sub" font-size="9">C</tspan></tspan>
<tspan x="140" dy="1.5em">For perpendicular vector with u and v as coordinates give direction</tspan>
<tspan x="120" dy="1.5em">Equation begin by v * x - u * y ....</tspan>
<tspan x="120" dy="1.5em">C is on perpendicular and verify this equation :</tspan>
<tspan x="120" dy="1.5em" fill="blue">v * x - u * y + u * y<tspan baseline-shift="sub" font-size="9">C</tspan> - v * x<tspan baseline-shift="sub" font-size="9">C</tspan> = 0</tspan>
<tspan x="120" dy="1.5em">If (AB) equation is given as y = a * x + b with a not null</tspan>
<tspan x="120" dy="1.5em" fill="blue">y = ( - 1 / a ) * x + y<tspan baseline-shift="sub" font-size="9">C</tspan> - x<tspan baseline-shift="sub" font-size="9">C</tspan> / a <tspan fill="black"> is equation for perpendicular</tspan></tspan>
</text>
</svg>
