<text x="20" y="20" font-size="14" fill="black">Circle C defined by center W and B, circle C' by centre W' and C
<tspan x="20" dy="2.5em">We calculate coordinates of E and F as in previous item</tspan>
<tspan x="20" dy="2.5em">We draw common area using arc in path element:</tspan>
<tspan x="20" dy="1.5em">We know points and radius, remain problem of flags ...</tspan>
<tspan x="20" dy="2.5em">We know angle ag2 between WM and WE</tspan>
<tspan x="20" dy="1.5em">We calculate angle ag3 between W'M and W'E</tspan>
<tspan x="20" dy="2.5em">if (ag2 &lt;= Math.PI / 2)</tspan>
<tspan x="60" dy="1.5em">sweep1 = 1</tspan>
<tspan x="20" dy="1.5em">else</tspan>
<tspan x="60" dy="1.5em">sweep1 = 0</tspan>
<tspan x="20" dy="1.5em">if (ag3 &lt;= Math.PI / 2)</tspan>
<tspan x="60" dy="1.5em">sweep2 = 0</tspan>
<tspan x="20" dy="1.5em">else</tspan>
<tspan x="60" dy="1.5em">sweep2 = 1</tspan>
<tspan x="20" dy="1.5em">str = "M" + xE  +","+ yE  + " A " + R + "," + R + " 0 " + sweep1 + " 0 "</tspan>
<tspan x="20" dy="1.5em">str += xF  + ","+ yF  + " A " + R' + "," + R' + " 0 " + sweep2 + " 0 " + xE  + "," + yE + " z"</tspan>
<tspan x="20" dy="2.5em">When there is not common point for circles</tspan>
<tspan x="20" dy="1.5em">We test if a circle is interior using length WW' and radius</tspan>
<tspan x="20" dy="1.5em">If WW' &lt; R + R' circle is interior</tspan>
<tspan x="20" dy="1.5em">If R &lt; R' circle defined by W and B is interior</tspan>
<tspan x="20" dy="1.5em">If R &gt; R' circle defined by W' and C is interior</tspan>
<tspan x="20" dy="1.5em">We can define this circle by a path element</tspan>
<tspan x="20" dy="1.5em">str = "M" + ( xW'  + R' ) + "," + yW' + "A" + R' + "," + R' +" 0 0 0 " + ( xW' - R' ) + "," + yW'</tspan>
<tspan x="20" dy="1.5em">str += "A" + R' + "," + R' +" 0 0 0 " + ( xW' + R' ) + "," + yW' + "z"</tspan>
	
					
				
						
	
</text>
