<path id="lunule" d="M573.80070839454,175.72370851364516A114.86513831445988,114.86513831445988 0 0 0 524.7121217941392,31.11138582597755A81.78630692236932,81.78630692236932 0 0 0 573.80070839454,175.72370851364516 z" fill="yellow" stroke="blue" fill-opacity="0.3" visibility="visible"/>
