<svg width="600" height="500" viewBox="0 0 600 500">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="10" markerHeight="6" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" />
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" 
            	markerUnits="strokeWidth" markerWidth="20" markerHeight="12" 
	        orient="auto">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="600" height="500" fill="url(#Pat01)"/>
<use x="50" y="250" xlink:href="#system" fill="blue"/>
<line id="v1" marker-end="url(#Marker01)" x1="200" y1="400" x2="400" y2="250" style="stroke:black;stroke-width:4"/> 
<line id="ry" x1="400" y1="0" x2="400" y2="500" style="stroke:blue;stroke-width:1;stroke-dasharray:3 3"/> 
<line id="rx" x1="0" y1="250" x2="600" y2="250" style="stroke:blue;stroke-width:1;stroke-dasharray:3 3"/> 
<line id="cx" marker-end="url(#green)" x1="200" y1="400" x2="400" y2="400" style="stroke:green;stroke-width:2"/> 
<line id="cy" marker-end="url(#green)" x1="200" y1="400" x2="200" y2="250" style="stroke:green;stroke-width:2"/> 
<text id="vx" style="text-anchor:middle;font-size:18" x="300" y="400" dy="20">V<tspan baseline-shift="sub">x</tspan></text>
<text id="vy" style="text-anchor:middle;font-size:18" x="200" y="325" dx="-30">V<tspan baseline-shift="sub">y</tspan></text>
<text id="a" style="text-anchor:middle;font-size:20;fill:blue" x="200" y="400" dx="-20" dy="20">A</text>
<text id="b" style="text-anchor:middle;font-size:20;fill:blue" x="400" y="250" dx="20" dy="-10">B</text>
<text x="20" y="20" font-size="15">Coordinates A : <tspan id="xya"> 6 ; -6 </tspan></text>
<text x="20" y="40" font-size="15">Coordinates B : <tspan id="xyb"> 14 ; 0 </tspan></text>
<text x="320" y="20" font-size="15">Vector Vx : <tspan id="vxt"> 8 </tspan></text>
<text x="320" y="40" font-size="15">Vector Vy : <tspan id="vyt"> 6 </tspan></text>
<text x="320" y="60" font-size="15">Vector length : <tspan id="vl"> 10 </tspan></text>
<text x="320" y="80" font-size="15">Vector angle : <tspan id="agt"> 36 </tspan> degrees</text>
<circle id="p1" cx="200" cy="400" r="4" fill="red"/>
<circle id="p2" cx="400" cy="250" r="4" fill="red"/>
<path id="ag" marker-end="url(#green)" d="M275 400a75 75 0 0 0 -16 -44" style="stroke:green;stroke-width:2;fill:none"/>

<text x="50" y="100" font-size="18" fill="blue">Vector's coordinates</text>
<text x="50" y="125" font-size="18" fill="blue">V<tspan baseline-shift="sub">x</tspan> = L * cos ( angle )</text>
<text x="50" y="150" font-size="18" fill="blue">V<tspan baseline-shift="sub">y</tspan> = L * sin ( angle )</text>
<text x="350" y="100" font-size="18" fill="blue">Vector's polar</text>
<text x="400" y="140" font-size="18" fill="blue">V<tspan baseline-shift="sub">x</tspan> <tspan baseline-shift="super">2</tspan> + V<tspan baseline-shift="sub">y</tspan> <tspan baseline-shift="super">2</tspan></text>
<text x="350" y="140" font-size="18" fill="blue">L = </text>
<path d="M380 113l10 30 10 -30 h100" fill="none" stroke="blue"/>

<text x="350" y="175" font-size="18" fill="blue">angle = arctan (<tspan dx="28">)</tspan></text>
<text x="480" y="162" font-size="18" fill="blue">V<tspan baseline-shift="sub">y</tspan></text>
<text x="480" y="190" font-size="18" fill="blue">V<tspan baseline-shift="sub">x</tspan></text>
<path d="M480 172h25" fill="none" stroke="blue"/>

</svg>