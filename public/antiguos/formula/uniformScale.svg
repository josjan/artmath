<text x="20" y="250" font-size="15" fill="blue">Uniform scale on shape
<tspan x="20" dy="2em" fill="black">Center is in x<tspan baseline-shift="sub">c</tspan> , y<tspan baseline-shift="sub">c</tspan> - Ratio is k</tspan>
<tspan x="20" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * k + x<tspan baseline-shift="sub">c</tspan> * ( 1 - k )</tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  y<tspan baseline-shift="sub">m</tspan> * k + y<tspan baseline-shift="sub">c</tspan> * ( 1 - k )</tspan>
<tspan x="20" dy="2em" fill="black">Matrix for uniform scale is : </tspan>
<tspan x="100" dy="2em">k</tspan>
<tspan x="200">0 </tspan>
<tspan x="300">x<tspan baseline-shift="sub">c</tspan> * ( 1 - k )</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="200">k</tspan>
<tspan x="300">y<tspan baseline-shift="sub">c</tspan> * ( 1 - k )</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="200">0</tspan>
<tspan x="340">1</tspan>
</text>
