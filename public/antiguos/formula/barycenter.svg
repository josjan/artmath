<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
<marker id="Marker01" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="10" markerHeight="6" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z"/>
</marker>
<marker id="green" viewBox="-15 -5 20 20" refX="0" refY="0" markerUnits="strokeWidth" markerWidth="20" markerHeight="12" orient="auto" preserveAspectRatio="xMidYMid meet">
    		    <path d="M -15 -5 L 0 0 L -15 5 z" fill="green"/>
</marker><g id="system">
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="25" y2="0" style="stroke:black;stroke-width:2"/> 
    <line marker-end="url(#Marker01)" x1="0" y1="0" x2="0" y2="-25" style="stroke:black;stroke-width:2"/> 
    <circle cx="0" cy="0" r="3" stroke="black"/>
</g>
</defs>
<rect width="700" height="600" fill="white"/>
<rect x="25" y="50" width="651" height="251" fill="url(#Pat01)"/>
<g transform="translate(0,-175)">
<line x1="25" y1="300" x2="675" y2="300" style="stroke:black;stroke-width:3"/> 
<line id="ka" x1="200" y1="300" x2="200" y2="450" style="stroke:green;stroke-width:2"/> 
<line id="kb" x1="400" y1="300" x2="400" y2="250" style="stroke:green;stroke-width:2"/> 
<text id="a" style="text-anchor:middle;font-size:15" x="200" y="375" dx="-20" startOffset="0">k<tspan baseline-shift="sub" font-size="10">A</tspan></text>
<text id="b" style="text-anchor:middle;font-size:15" x="400" y="275" dx="20" startOffset="0">k<tspan baseline-shift="sub" font-size="10">B</tspan></text>
<text id="g" style="text-anchor:middle;font-size:15" x="100" y="300" dy="-15" startOffset="0">G</text>
<text style="text-anchor:middle;font-size:15;fill:blue" x="200" y="300" dx="-15" dy="-5" startOffset="0">A</text>
<text style="text-anchor:middle;font-size:15;fill:blue" x="400" y="300" dx="-15" dy="-5" startOffset="0">B</text>
<path id="trace" d="M400 450V250L200 350z M200 300V350L100 300" style="stroke:green;stroke-width:2;fill:none;stroke-dasharray:3 3"/>
<circle cx="200" cy="300" r="4" fill="black"/>
<circle cx="400" cy="300" r="4" fill="black"/>
<circle id="p3" cx="100" cy="300" r="4" fill="black"/>
<circle id="p1" cx="200" cy="450" r="4" fill="red"/>
<circle id="p2" cx="400" cy="250" r="4" fill="red"/>
</g>
<text x="20" y="20" font-size="15" startOffset="0">Coordinates A : 6 , - 2</text>
<text x="20" y="40" font-size="15" startOffset="0">Coordinates B : 14 , - 2</text>
<text x="220" y="20" font-size="15" startOffset="0">Ratio for A : <tspan id="kat">-6</tspan></text>
<text x="220" y="40" font-size="15" startOffset="0">Ratio for B : <tspan id="kbt">2</tspan></text>
<text x="380" y="20" font-size="15" startOffset="0">Barycenter G : <tspan id="vxt">2</tspan> , - 2</text>
<text x="20" y="320" font-size="15">Barycenter of points A ( ratio k1 ) and B ( ratio k2 )
<tspan x="20" dy="1.3em">The barycenter G verify k1 * vector GA + k2 * vector GB = vecteur null</tspan>
<tspan x="20" dy="1.3em">For any point M, ( k1 + k2 ) * vector MG =  k1 * vector MA + k2 * vector MB</tspan>
<tspan x="20" dy="1.3em">If M is origin, we get coordinates of G :</tspan>
<tspan x="20" dy="1.3em" fill="blue">x<tspan baseline-shift="sub" font-size="10">G</tspan> = ( k1 * x<tspan baseline-shift="sub" font-size="10">A</tspan> + k2 * x<tspan baseline-shift="sub" font-size="10">B</tspan> ) / ( k1 + k2 )</tspan>
<tspan x="20" dy="1.3em" fill="blue">y<tspan baseline-shift="sub" font-size="10">G</tspan> = ( k1 * y<tspan baseline-shift="sub" font-size="10">A</tspan> + k2 * y<tspan baseline-shift="sub" font-size="10">B</tspan> ) / ( k1 + k2 )</tspan>
<tspan x="20" dy="1.3em">We can use same formula for any number of points</tspan>
<tspan x="20" dy="1.3em">If k1 = k2 barycenter is midpoint for segment AB</tspan>

</text>

</svg>
