<text x="20" y="20" font-size="14" fill="black">Solve a * x<tspan baseline-shift="super" font-size="8">3</tspan> + b * x<tspan baseline-shift="super" font-size="8">2</tspan> + c * x + d &gt; 0
<tspan x="20" dy="1.5em">We suppose that a is not equal to 0</tspan>
<tspan x="20" dy="1.5em">We solve equation and get one or three solutions</tspan>
<tspan x="20" dy="1.5em">Sign of a give two cases</tspan>
<tspan x="20" dy="1.5em">On example a is negative</tspan>
<tspan x="20" dy="1.5em">Set of solutions begin with - &#x221E;</tspan>
<tspan x="20" dy="1.5em">If equation has single solution x<tspan baseline-shift="sub" font-size="8">1</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">S = ] - &#x221E; , x<tspan baseline-shift="sub" font-size="8">1</tspan> [</tspan>
<tspan x="20" dy="1.5em">If equation has three solutions x<tspan baseline-shift="sub" font-size="8">1</tspan> , x<tspan baseline-shift="sub" font-size="8">2</tspan> and x<tspan baseline-shift="sub" font-size="8">3</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">S = ] - &#x221E; , x<tspan baseline-shift="sub" font-size="8">1</tspan> [ U ] x<tspan baseline-shift="sub" font-size="8">2</tspan> , x<tspan baseline-shift="sub" font-size="8">3</tspan> [</tspan>
<tspan x="20" dy="1.5em">If a is positive</tspan>
<tspan x="20" dy="1.5em">Set of solutions end with + &#x221E;</tspan>
<tspan x="20" dy="1.5em">If equation has single solution x<tspan baseline-shift="sub" font-size="8">1</tspan></tspan>
<tspan x="20" dy="1.5em" fill="blue">S = ] x<tspan baseline-shift="sub" font-size="8">1</tspan> , + &#x221E; [</tspan>
<tspan x="20" dy="1.5em">If equation has three solutions x<tspan baseline-shift="sub" font-size="8">1</tspan> , x<tspan baseline-shift="sub" font-size="8">2</tspan> and x<tspan baseline-shift="sub" font-size="8">3</tspan></tspan>
