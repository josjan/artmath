<svg width="700" height="600" viewBox="0 0 700 600">
<defs>
<pattern id="Pat01" width="25" height="25" patternUnits="userSpaceOnUse" preserveAspectRatio="xMidYMid meet">
	<rect width="25" height="25" fill="white" stroke="#000000" stroke-width="0.1"/>
</pattern>
</defs>
<rect width="700" height="600" fill="url(#Pat01)"/>
<text x="20" y="20" font-size="14" startOffset="0">Radius for ellipse : rx = <tspan id="rx">7.56</tspan> and ry = <tspan id="ry">3.44</tspan>
<tspan x="20" dy="1.3em">Area of ellipse : <tspan id="area">81.7</tspan></tspan>
<tspan x="20" dy="1.3em">Perimeter for ellipse : <tspan id="perimeter">36.90</tspan></tspan>
</text>
<rect id="box" x="233" y="39" width="378" height="172" fill="none" stroke="green" stroke-dasharray="4 4"/>
<ellipse id="ellipse" cx="422" cy="125" rx="189" ry="86" fill="yellow" stroke="blue" fill-opacity="0.2"/>
<circle id="p2" cx="422" cy="125" r="4" fill="red"/>
<circle id="p3" transform="rotate(0,422,125)" cx="611" cy="211" r="4" fill="red"/>
<text x="20" y="260" font-size="15" fill="black">Ellipse id defined by semi-axis R<tspan baseline-shift="sub" font-size="9">X</tspan> and R<tspan baseline-shift="sub" font-size="9">Y</tspan>
<tspan x="20" dy="2em">Ellipse area :</tspan>
<tspan x="20" dy="2em">Pi is ratio between ellipse's area and rectangle with R<tspan baseline-shift="sub" font-size="9">X</tspan> and R<tspan baseline-shift="sub" font-size="9">Y</tspan> as width and height</tspan>
<tspan x="20" dy="1.5em" fill="blue">Area ellipse = Pi * R<tspan baseline-shift="sub" font-size="9">X</tspan> * R<tspan baseline-shift="sub" font-size="9">Y</tspan></tspan>
<tspan x="20" dy="2em">For perimeter, we use same formula as circle but circle's radius is square root of ( R<tspan baseline-shift="sub" font-size="9">X</tspan><tspan baseline-shift="super" font-size="9">2</tspan> + R<tspan baseline-shift="sub" font-size="9">Y</tspan><tspan baseline-shift="super" font-size="9">2</tspan> ) / 2</tspan>
<tspan x="20" dy="2em" fill="blue">Perimeter ellipse = Pi * <tspan dx="15"> 2 * ( R<tspan baseline-shift="sub" font-size="9">X</tspan><tspan baseline-shift="super" font-size="9">2</tspan> + R<tspan baseline-shift="sub" font-size="9">Y</tspan><tspan baseline-shift="super" font-size="9">2</tspan> )</tspan></tspan>
</text>
<path d="M175 385 l7 20 l7 -20 h110" stroke="blue" fill="none"/>
</svg>
