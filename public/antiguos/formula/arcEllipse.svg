<svg width="700" height="600">
<rect x="0" y="0" width="700" height="600" style="fill:white"/> 
<ellipse cx="580" cy="120" rx="100" ry="75" style="stroke:green; fill:none"/>
<circle cx="580" cy="120" r="3" style="stroke:red; fill:red"/>
<path d="M630 55 A100 75 0 0 0 493 83" stroke="blue" stroke-width="2" fill="none"/>
<path d="M630 55 A100 75 0 1 1 493 83" stroke="green" stroke-width="2" fill="none"/>
<text x="580" y="120" dx="5">C</text>
<circle cx="630" cy="55" r="3" style="fill:green"/>
<circle cx="493" cy="83" r="3" style="fill:red"/>
<text x="630" y="55" dx="5">M</text>
<text x="493" y="83" dx="-15">M'</text>

<g transform="translate(0,250)">
<circle cx="580" cy="120" r="100" style="stroke:green; fill:none"/>
<ellipse cx="580" cy="120" rx="100" ry="75" style="stroke:blue; fill:none"/>
<circle cx="580" cy="120" r="3" style="stroke:red; fill:red"/>
<text x="580" y="120" dx="5">C</text>
<circle cx="630" cy="55" r="3" style="fill:green"/>
<circle cx="493" cy="83" r="3" style="fill:red"/>
<text x="630" y="55" dx="5">M</text>
<text x="493" y="83" dx="-15">M'</text>
<path d="M460 120h240" stroke="red"/>
<path d="M630 10v220" stroke="green" stroke-dasharray="3 3"/>
<path d="M493 10v220" stroke="green" stroke-dasharray="3 3"/>
<circle cx="630" cy="33" r="3" style="fill:green"/>
<circle cx="493" cy="70" r="3" style="fill:red"/>
<text x="630" y="33" dx="5">m</text>
<text x="493" y="70" dx="-15">m'</text>
<path d="M493 70L580 120 630 33" stroke="blue" fill="none"/>

</g>


<text x="20" y="20" font-size="14" fill="black">Ellipse is defined by center C and radius a and b
<tspan x="20" dy="1.2em">We use parametric equation :</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + a * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + b * sin ( t ) with t from 0 to 2 * PI</tspan>
<tspan x="20" dy="3.2em">Arc is defined by points M and M'.</tspan>
<tspan x="20" dy="1.2em">We have also to choose orientation for arc :</tspan>
<tspan x="20" dy="1.2em">To go from M to M' we have two paths blue and green arcs</tspan>
<tspan x="20" dy="1.2em">M and M' are defined by value of t, A and A' :</tspan>
<tspan x="20" dy="1.2em">We have parametric equation for blue arc:</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + a * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + b * sin ( t ) with t from A to A'</tspan>
<tspan x="20" dy="1.2em">We have parametric equation for green arc:</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + a * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + b * sin ( t ) with t from A' to A</tspan>
<tspan x="20" dy="3.2em">To use A command in SVG, we use coordinates of M and M', radius and flags</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">M</tspan> = x<tspan baseline-shift="sub" font-size="8">C</tspan> + a * cos ( A ) and y<tspan baseline-shift="sub" font-size="8">M</tspan> = y<tspan baseline-shift="sub" font-size="8">C</tspan> + b * sin ( A )</tspan>
<tspan x="20" dy="1.5em" fill="blue">x<tspan baseline-shift="sub" font-size="8">M'</tspan> = x<tspan baseline-shift="sub" font-size="8">C</tspan> + a * cos ( A' ) and y<tspan baseline-shift="sub" font-size="8">M'</tspan> = y<tspan baseline-shift="sub" font-size="8">C</tspan> + b * sin ( A' )</tspan>
<tspan x="20" dy="1.5em">To draw blue arc we have for parameter d in path :</tspan>
<tspan x="20" dy="1.5em" fill="blue">d = " M x<tspan baseline-shift="sub" font-size="8">M</tspan> y<tspan baseline-shift="sub" font-size="8">M</tspan> A a b 0 0 0 x<tspan baseline-shift="sub" font-size="8">M'</tspan> y<tspan baseline-shift="sub" font-size="8">M' </tspan> "</tspan>
<tspan x="20" dy="1.5em">To draw green arc we have for parameter d in path :</tspan>
<tspan x="20" dy="1.5em" fill="blue">d = " M x<tspan baseline-shift="sub" font-size="8">M</tspan> y<tspan baseline-shift="sub" font-size="8">M</tspan> A a b 0 1 1 x<tspan baseline-shift="sub" font-size="8">M'</tspan> y<tspan baseline-shift="sub" font-size="8">M' </tspan> "</tspan>

<tspan x="20" dy="3.2em" fill="red">Caution, angles are not what we are waiting for :</tspan>
<tspan x="20" dy="1.2em">In this parametric equation for ellipse</tspan>
<tspan x="20" dy="1.2em" fill="blue">x = x<tspan baseline-shift="sub" font-size="8">C</tspan> + a * cos ( t ) and y = y<tspan baseline-shift="sub" font-size="8">C</tspan> + b * sin ( t ) with t from 0 to 2 * PI</tspan>
<tspan x="20" dy="1.2em">Value of t is not given by M on ellipse, but by m on circle with a as radius</tspan>
<tspan x="20" dy="1.2em">Angle defined by CM with horizontal axis is atan ( tan ( t ) * b / a )</tspan>

</text>
</svg>
