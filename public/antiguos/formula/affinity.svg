<text x="350" y="250" font-size="15" fill="blue">Affinity on shape
<tspan x="310" dy="2em" fill="black">Affinity need axis and direction - Ratio is k</tspan>
<tspan x="310" dy="1em" fill="black">Axis : u * x + v * y + w = 0</tspan>
<tspan x="310" dy="1em" fill="black">Vector for direction is ud , vd</tspan>
<tspan x="310" dy="1em" fill="black">We calculate det = u * ud + v * vd</tspan>
<tspan x="310" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * ( k * u * ud + v * vd ) / det + y<tspan baseline-shift="sub">m</tspan> * (( k - 1 ) * v * ud) / det + (( 1 - k ) * ud * w) / det</tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  y<tspan baseline-shift="sub">m</tspan> * (( k - 1 ) * u * vd) / det + y<tspan baseline-shift="sub">m</tspan> * ( u * ud + k * vd * v ) / det + (( 1 - k ) * vd * w) / det</tspan>
<tspan x="20" dy="2em" fill="black">Matrix for affinity ( all values have to be divised by u * ud + v * vd ) : </tspan>
<tspan x="50" dy="2em">k * u * ud + v * vd</tspan>
<tspan x="200">( k - 1 ) * v * ud) </tspan>
<tspan x="350">( 1 - k ) * ud * w)</tspan>
<tspan x="50" dy="2em">( k - 1 ) * u * vd</tspan>
<tspan x="200">u * ud + k * vd * v</tspan>
<tspan x="350">( 1 - k ) * vd * w)</tspan>
<tspan x="100" dy="2em">0</tspan>
<tspan x="250">0</tspan>
<tspan x="400">1</tspan>
</text>
