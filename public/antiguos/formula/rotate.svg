<text x="20" y="250" font-size="15" fill="blue">Rotate shape
<tspan x="20" dy="2em" fill="black">Angle is A - Center is in x<tspan baseline-shift="sub">c</tspan> , y<tspan baseline-shift="sub">c</tspan></tspan>
<tspan x="20" dy="2em" fill="black">Point M in x<tspan baseline-shift="sub">m</tspan> , y<tspan baseline-shift="sub">m</tspan> give point M' in x<tspan baseline-shift="sub">m'</tspan> , y<tspan baseline-shift="sub">m'</tspan></tspan>
<tspan x="20" dy="2em">x<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * cos ( A ) - y<tspan baseline-shift="sub">m</tspan> * sin ( A ) + x<tspan baseline-shift="sub">c</tspan> * ( 1 - cos ( A ) ) + y<tspan baseline-shift="sub">c</tspan> * sin ( A )</tspan>
<tspan x="20" dy="2em">y<tspan baseline-shift="sub">m'</tspan> =  x<tspan baseline-shift="sub">m</tspan> * sin ( A ) + y<tspan baseline-shift="sub">m</tspan> * cos ( A ) - x<tspan baseline-shift="sub">c</tspan> * sin ( A ) + y<tspan baseline-shift="sub">c</tspan> * ( 1 - cos ( A ) )</tspan>
<tspan x="20" dy="2em" fill="black">Matrix for rotation is : </tspan>
<tspan x="100" dy="2em">cos ( A ) </tspan>
<tspan x="200">- sin ( A ) </tspan>
<tspan x="300">x<tspan baseline-shift="sub">c</tspan> * ( 1 - cos ( A ) ) + y<tspan baseline-shift="sub">c</tspan> * sin ( A )</tspan>
<tspan x="100" dy="2em">sin ( A ) </tspan>
<tspan x="210">cos ( A ) </tspan>
<tspan x="300">- x<tspan baseline-shift="sub">c</tspan> * sin ( A ) + y<tspan baseline-shift="sub">c</tspan> * ( 1 - cos ( A ) )</tspan>
<tspan x="120" dy="2em">0</tspan>
<tspan x="220">0</tspan>
<tspan x="410">1</tspan>
</text>
